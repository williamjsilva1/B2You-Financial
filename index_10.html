<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>B2You Financial Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Quagga2 — leitor de código de barras universal (iOS + Android + Chrome) -->
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.4.4/dist/quagga.min.js" crossorigin="anonymous"></script>
<!-- SheetJS para exportação Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase SDK via CDN (compat mode — funciona como script global) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* ══════════════════════════════════════════════════════
   B2YOU FINANCIAL — Paleta Dourada · Sofisticada · Elegante
   Inspiração: Private banking, Amex Black, Rolex aesthetic
══════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}

/* Google Fonts — Playfair Display para títulos + Inter para corpo */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  /* ── Backgrounds — champagne claro elegante ── */
  --bg:#f7f4ef;          /* creme champagne */
  --bg2:#ffffff;         /* branco puro para cards */
  --bg3:#faf8f4;         /* superfície secundária */
  --bg4:#f2ede5;         /* inputs hover */

  /* ── Textos ── */
  --text:#1c1810;        /* marrom muito escuro */
  --text2:#6b5e45;       /* marrom médio */
  --text3:#a8957a;       /* muted dourado */

  /* ── Borders ── */
  --border:rgba(160,130,70,0.14);
  --border2:rgba(160,130,70,0.28);
  --border3:rgba(160,130,70,0.50);

  /* ── Ouro — paleta central ── */
  --gold:#b8922e;         /* ouro principal */
  --gold-l:#c9a84c;       /* ouro médio */
  --gold-d:#7a5e14;       /* ouro escuro */
  --gold-bg:rgba(184,146,46,0.10);
  --gold-bg2:rgba(184,146,46,0.06);

  /* ── Status vibrantes ── */
  --green:#16794a;  --green-bg:rgba(22,121,74,0.10);  --green-t:#0d5c38;
  --red:#b83232;    --red-bg:rgba(184,50,50,0.10);    --red-t:#8b2020;
  --blue:#2558a8;   --blue-bg:rgba(37,88,168,0.10);   --blue-t:#1a3f7a;
  --purple:#6b3fa8; --purple-bg:rgba(107,63,168,0.10);--purple-t:#4e2b80;
  --amber:#a06b14;  --amber-bg:rgba(160,107,20,0.10); --amber-t:var(--gold);
  --teal:#1a7070;   --teal-bg:rgba(26,112,112,0.10);  --teal-t:#0d4f4f;
  --pink:#a83070;   --pink-bg:rgba(168,48,112,0.10);  --pink-t:#7a1f52;
  --gray-bg:rgba(100,90,70,0.10);                      --gray-t:#7a7060;

  /* ── Gradientes dourados ── */
  --grad-gold:linear-gradient(135deg,#c9a84c 0%,#e8d080 50%,#b8922e 100%);
  --grad-sidebar:linear-gradient(180deg,#1c1810 0%,#231e12 100%);
  --grad-green:linear-gradient(135deg,rgba(22,121,74,0.12),rgba(22,121,74,0.04));
  --grad-red:linear-gradient(135deg,rgba(184,50,50,0.12),rgba(184,50,50,0.04));
  --grad-blue:linear-gradient(135deg,rgba(37,88,168,0.12),rgba(37,88,168,0.04));

  /* ── Geometria ── */
  --r:10px;--rl:14px;--r2:20px;

  /* ── Sombras suaves (modo claro) ── */
  --shadow:0 2px 16px rgba(100,80,30,.10);
  --shadow-gold:0 4px 20px rgba(184,146,46,0.18);
  --shadow-lg:0 8px 40px rgba(100,80,30,.15);
}

/* ── Fonte base ── */
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  font-size:14px;
}

/* Títulos com serifas elegantes */
.pt,.ct,.mt{font-family:'Playfair Display',Georgia,serif !important}

.app{display:flex;min-height:100vh}

/* ══════════════════════════════════════════════════════
   SIDEBAR — dark with gold accents
══════════════════════════════════════════════════════ */
.sb{
  width:244px;
  background:var(--grad-sidebar);
  border-right:none;
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;
  overflow:hidden;z-index:50;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.main{margin-left:244px;flex:1;min-height:100vh}

/* Logo */
.sb-logo{
  padding:22px 18px 18px;
  display:flex;align-items:center;gap:13px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sb-logo::after{
  content:'';position:absolute;bottom:0;left:18px;right:18px;
  height:1px;background:var(--grad-gold);opacity:.3;
}
.sb-logo-icon{
  width:38px;height:38px;
  background:var(--grad-gold);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:#1a1610;font-size:14px;font-weight:800;
  flex-shrink:0;
  box-shadow:var(--shadow-gold);
  font-family:'Playfair Display',serif;
}
.sb-logo-txt{
  font-size:13px;font-weight:700;
  font-family:'Playfair Display',serif;
  color:var(--text);letter-spacing:.2px;
}
.sb-logo-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}

/* Filial selector */
.sb-filial{padding:12px 14px;border-bottom:1px solid var(--border)}
.sb-filial-lbl{
  font-size:9px;color:var(--gold);
  text-transform:uppercase;letter-spacing:1.5px;
  font-weight:600;margin-bottom:6px;
}
.sb-sel{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(201,168,76,0.25);border-radius:8px;
  padding:7px 10px;font-size:12px;color:#e8dfc8;
  cursor:pointer;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.sb-sel:focus{border-color:var(--gold);outline:none}
.sb-sel option{background:#1c1810;color:#f5f0e8}

/* Nav */
nav{padding:10px 8px;flex:1;overflow-y:auto;min-height:0}
nav::-webkit-scrollbar{width:0}

.ni{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--text2);
  border:none;background:none;width:100%;text-align:left;
  transition:all .18s;margin-bottom:2px;position:relative;
}
.ni:hover{background:rgba(201,168,76,0.07);color:var(--text)}
.ni.act{
  background:rgba(201,168,76,0.12);
  color:var(--gold-l);font-weight:600;
  border:1px solid rgba(201,168,76,0.18);
}
.ni.act::before{
  content:'';position:absolute;left:0;top:25%;bottom:25%;
  width:3px;background:var(--grad-gold);border-radius:0 3px 3px 0;
}
.ni-ic{
  font-size:15px;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border-radius:7px;transition:all .15s;
}
.ni.act .ni-ic{
  background:rgba(201,168,76,0.15);
}

.sep{
  height:1px;margin:8px 4px;
  background:linear-gradient(90deg,transparent,var(--border3),transparent);
}

/* User section */
.sb-user{
  padding:14px;border-top:1px solid var(--border);
  flex-shrink:0;background:rgba(0,0,0,.2);
}
.sb-usr-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;min-width:0}
.av{
  width:34px;height:34px;border-radius:50%;
  background:var(--grad-gold);
  color:#1a1610;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
  box-shadow:0 2px 10px rgba(201,168,76,.3);
}
.sb-out{
  width:100%;background:transparent;
  color:var(--text3);border:1px solid var(--border);
  border-radius:8px;padding:8px;font-size:12px;
  cursor:pointer;font-weight:500;transition:all .15s;
  letter-spacing:.3px;
}
.sb-out:hover{background:var(--red-bg);color:var(--red-t);border-color:rgba(139,46,46,.3)}

/* ══════════════════════════════════════════════════════
   PAGE
══════════════════════════════════════════════════════ */
.page{padding:30px 34px;min-height:100vh}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px}
.pt{
  font-size:24px;font-weight:700;letter-spacing:-.3px;
  color:var(--text);
}
.ps{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.3px}

/* ══════════════════════════════════════════════════════
   BOTÕES
══════════════════════════════════════════════════════ */
.btn{
  padding:9px 18px;border-radius:9px;
  font-size:13px;font-weight:500;cursor:pointer;
  border:1px solid var(--border2);
  background:rgba(201,168,76,0.06);
  color:var(--text2);transition:all .18s;letter-spacing:.2px;
}
.btn:hover{background:rgba(201,168,76,0.12);color:var(--text);border-color:var(--border3)}
.btn:active{transform:scale(.98)}

/* Botão primário — dourado */
.btn-p{
  background:var(--grad-gold);
  color:#1a1610;border:none;font-weight:700;
  box-shadow:var(--shadow-gold);letter-spacing:.3px;
}
.btn-p:hover{
  filter:brightness(1.1);
  box-shadow:0 6px 24px rgba(201,168,76,.35);
}
.btn-d{background:var(--red-bg);color:var(--red-t);border-color:rgba(139,46,46,.25)}
.btn-s{background:var(--green-bg);color:var(--green-t);border-color:rgba(45,122,79,.25)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}

/* ══════════════════════════════════════════════════════
   SUMMARY CARDS — gold accent style
══════════════════════════════════════════════════════ */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.sc{
  border-radius:var(--rl);padding:18px 20px;
  border:1px solid var(--border);
  background:var(--bg3);
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
/* Ornamento dourado no canto */
.sc::after{
  content:'';position:absolute;
  top:0;right:0;width:60px;height:60px;
  background:var(--grad-gold);
  opacity:.04;border-radius:0 var(--rl) 0 100%;
}
.sl{
  font-size:10px;color:var(--text3);
  margin-bottom:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
}
.sv{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1}

/* Variantes */
.sc-gold{border-top-color:var(--gold)!important;background:linear-gradient(145deg,rgba(184,146,46,.08),rgba(184,146,46,.02))}
.sc-green{border-top-color:var(--green)!important;background:var(--grad-green)}
.sc-red{border-top-color:var(--red)!important;background:var(--grad-red)}
.sc-blue{border-top-color:var(--blue)!important;background:var(--grad-blue)}

/* ══════════════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════════════ */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--rl);padding:22px;margin-bottom:16px;
  position:relative;
  box-shadow:0 1px 4px rgba(100,80,30,.06);
}
/* Linha dourada no topo de cards importantes */
.card-gold::before{
  content:'';position:absolute;top:0;left:24px;right:24px;
  height:1px;background:var(--grad-gold);opacity:.5;
}
.ct{
  font-size:15px;font-weight:700;margin-bottom:18px;
  letter-spacing:.1px;color:var(--text);
}

/* ══════════════════════════════════════════════════════
   TABELAS
══════════════════════════════════════════════════════ */
table{width:100%;border-collapse:collapse}
th{
  font-size:9px;color:var(--gold);font-weight:700;
  text-transform:uppercase;letter-spacing:1.2px;
  padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border2);
}
td{
  font-size:13px;padding:13px 14px;
  border-bottom:1px solid rgba(201,168,76,0.04);
  color:var(--text);vertical-align:middle;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,0.03)}
.empty{
  text-align:center;padding:52px;
  color:var(--text3);font-size:13px;
  font-style:italic;letter-spacing:.3px;
}

/* ══════════════════════════════════════════════════════
   BADGES — pílulas elegantes
══════════════════════════════════════════════════════ */
.bdg{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;
}
.bg{background:var(--green-bg);color:var(--green-t)}
.ba{background:rgba(201,168,76,0.15);color:var(--gold-l)}
.br{background:var(--red-bg);color:var(--red-t)}
.bb{background:var(--blue-bg);color:var(--blue-t)}
.bgr{background:var(--gray-bg);color:var(--gray-t)}

/* ══════════════════════════════════════════════════════
   TABS
══════════════════════════════════════════════════════ */
.tabs{
  display:flex;gap:2px;
  background:rgba(201,168,76,0.05);
  border:1px solid var(--border);
  border-radius:10px;padding:3px;
  width:fit-content;margin-bottom:18px;flex-wrap:wrap;
}
.tab{
  padding:7px 16px;border-radius:8px;border:none;
  background:none;font-size:12px;color:var(--text3);
  cursor:pointer;font-weight:500;transition:all .15s;
  letter-spacing:.2px;
}
.tab.act{
  background:var(--bg2);color:var(--gold-l);font-weight:700;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  border:1px solid var(--border2);
}

/* ══════════════════════════════════════════════════════
   FILTROS
══════════════════════════════════════════════════════ */
.fr{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.fr select,.fr input[type=month],.fr input[type=date]{
  background:rgba(201,168,76,0.05);
  border:1px solid var(--border2);border-radius:8px;
  padding:7px 10px;font-size:12px;color:var(--text);min-width:120px;
}
.fr select:focus,.fr input:focus{border-color:var(--gold);outline:none}
.fr select option{background:#ffffff;color:#1c1810}

/* ══════════════════════════════════════════════════════
   MODAIS
══════════════════════════════════════════════════════ */
.ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:16px;
  backdrop-filter:blur(6px);
}
.modal{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r2);
  width:100%;max-width:650px;
  max-height:92vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.08);
  animation:modalIn .22s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.mh{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
  position:relative;
}
.mh::after{
  content:'';position:absolute;bottom:0;left:24px;right:24px;
  height:1px;background:var(--grad-gold);opacity:.25;
}
.mt{font-size:16px;font-weight:700;letter-spacing:.1px;color:var(--text)}
.mc{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;transition:color .15s}
.mc:hover{color:var(--gold-l)}
.mb{padding:24px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.gf{grid-column:span 2}
.gf3{grid-column:span 3}

/* ══════════════════════════════════════════════════════
   FORMULÁRIOS
══════════════════════════════════════════════════════ */
.f{display:flex;flex-direction:column;gap:6px}
.f label{
  font-size:10px;color:var(--text3);font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;
}
input:not([type=radio]):not([type=checkbox]),select,textarea{
  width:100%;padding:10px 13px;
  border:1px solid var(--border2);border-radius:9px;
  font-size:13px;background:#fff;
  color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
  font-family:'Inter',system-ui,sans-serif;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(184,146,46,0.12);
  background:#fff;
}
select option{background:#ffffff;color:#1c1810}
textarea{resize:vertical;min-height:70px}
.fa{
  display:flex;gap:10px;justify-content:flex-end;
  margin-top:20px;padding-top:16px;
  border-top:1px solid var(--border);
}
.ar{display:flex;gap:6px;align-items:center}
.em{
  background:var(--red-bg);color:var(--red-t);
  border:1px solid rgba(139,46,46,.3);
  border-radius:9px;padding:10px 14px;font-size:13px;
}

/* ══════════════════════════════════════════════════════
   LOGIN — noir elegante
══════════════════════════════════════════════════════ */
.lw{
  min-height:100vh;display:flex;
  align-items:center;justify-content:center;
  background:var(--bg);padding:16px;
  background-image:
    radial-gradient(ellipse at 15% 50%,rgba(184,146,46,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 20%,rgba(184,146,46,.06) 0%,transparent 45%);
}
.lc{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--r2);padding:38px;
  width:100%;max-width:420px;
  box-shadow:var(--shadow-lg);
  position:relative;overflow:hidden;
}
/* Ornamento dourado no topo do card de login */
.lc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--grad-gold);opacity:.7;
}
.ll{text-align:center;margin-bottom:30px}
.li{
  width:60px;height:60px;
  background:var(--grad-gold);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  color:#1a1610;font-size:22px;font-weight:800;
  margin:0 auto 16px;
  box-shadow:0 8px 28px rgba(201,168,76,.35);
  font-family:'Playfair Display',serif;
}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:26px}
.auth-tab{
  flex:1;padding:11px;border:none;background:none;
  color:var(--text3);font-size:13px;font-weight:500;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;letter-spacing:.2px;
}
.auth-tab.act{color:var(--gold-l);border-bottom-color:var(--gold)}
.btn-google{
  width:100%;padding:13px;
  border:1px solid var(--border2);
  background:rgba(201,168,76,0.05);
  border-radius:10px;color:var(--text);
  font-size:14px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .15s;letter-spacing:.2px;
}
.btn-google:hover{background:rgba(201,168,76,0.10);border-color:var(--border3)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.auth-divider{
  display:flex;align-items:center;gap:14px;
  color:var(--text3);font-size:11px;margin:8px 0;
  letter-spacing:.5px;text-transform:uppercase;
}
.auth-divider::before,.auth-divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
}
.auth-success{
  background:rgba(45,122,79,.12);
  border:1px solid rgba(45,122,79,.3);
  border-radius:9px;padding:10px 14px;
  color:var(--green-t);font-size:13px;text-align:center;
}
.auth-link{
  background:none;border:none;color:var(--gold);
  font-size:12px;cursor:pointer;padding:0;font-weight:600;
  letter-spacing:.2px;transition:color .15s;
}
.auth-link:hover{color:var(--gold-l)}
.auth-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;color:var(--text2);font-size:13px}
.auth-loading-spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}

/* ══════════════════════════════════════════════════════
   FINANCEIRO NAV
══════════════════════════════════════════════════════ */
.fin-wrap{display:flex;flex-direction:column;min-height:100vh}
.fin-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:30;
  box-shadow:0 1px 8px rgba(100,80,30,.08);
}

<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAHm-78QNkFI93Gi9fa9yK7ne2atQINnK8",
  authDomain:        "b2youfinancialcontrol.firebaseapp.com",
  projectId:         "b2youfinancialcontrol",
  storageBucket:     "b2youfinancialcontrol.firebasestorage.app",
  messagingSenderId: "120136860530",
  appId:             "1:120136860530:web:da6c8312cf7135d8a813eb"
};

// ── INSTÂNCIAS GLOBAIS ──
let _fbApp=null, _fbAuth=null, _fbDb=null, _fbReady=false;
let _cache={};           // cache em memória
let _fbUid=null;         // uid do usuário Firebase autenticado

function initFirebase(){
  if(_fbReady) return true;
  try{
    _fbApp  = firebase.initializeApp(firebaseConfig);
    _fbAuth = firebase.auth();
    _fbDb   = firebase.firestore();
    // Configurações do Firestore — sem persistência offline para garantir dados sempre frescos
    _fbDb.settings({
      cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED,
      merge: true
    });
    // NÃO ativamos enablePersistence pois causa dados stale no mobile
    // Os listeners onSnapshot com includeMetadataChanges:false garantem dados do servidor
    _fbReady = true;
    console.info('[Firebase] ✅ Inicializado — projeto: b2youfinancialcontrol');
    return true;
  }catch(e){
    console.error('[Firebase] Falha:',e);
    return false;
  }
}

// ── FIRESTORE: caminhos ──
// IMPORTANTE: dados ficam em /empresa/main/ — compartilhado entre todos os usuários
// Cada usuário autenticado acessa os mesmos dados da empresa
const FS_COLS=['cp','cr','despesas','vendas','escala','forn','colab','prest','atrac',
               'hosp','pousada','voo','prod','ent','said','cont','pedidos',
               'rh_func','rh_folha','rh_ferias','rh_ponto','rh_deslig','docs'];

// ══════════════════════════════════════════════════════════════
// CAMINHOS FIRESTORE — coleção única 'dados', 2 segmentos cada
// UMA regra no Firestore cobre TUDO: match /dados/{doc}
//
// GLOBAIS:  dados/g__fil  dados/g__usr  dados/g__pc  dados/g__app
// FILIAIS:  dados/f1__cp  dados/f1__cr  dados/f1__rh_func
// ══════════════════════════════════════════════════════════════
const _fsGlobalPath=(key)=>`dados/g__${key.replace(/^__(.+)__$/,'$1')}`;
const _fsFilialPath=(fid,col)=>`dados/${fid}__${col}`;

// ══════════════════════════════════════════════════════════════
// CAMADA DE DADOS — Firestore como fonte única de verdade
// localStorage = cache local para leitura rápida offline
// Toda escrita vai ao Firestore E ao localStorage simultaneamente
// ══════════════════════════════════════════════════════════════
const K='gf_v3';
let _cacheLoaded=false;

// Lê do cache em memória (sempre atualizado pelos listeners)
const ld=()=>{
  if(_cacheLoaded) return _cache;
  try{return JSON.parse(localStorage.getItem(K)||'{}')}catch{return{}}
};

// Salva NO CACHE + localStorage + Firestore (todas as filiais)
const sv=d=>{
  _cache=d;_cacheLoaded=true;
  localStorage.setItem(K,JSON.stringify(d));
  _syncToFirestore(d);
};

// Escrita direta no Firestore — chamada por sv() e pelos setters específicos
function _syncToFirestore(d){
  if(!_fbReady) return;
  const ts=firebase.firestore.FieldValue.serverTimestamp();
  // Globais
  ['__fil__','__usr__','__pc__','__app__'].forEach(k=>{
    if(d[k]!==undefined)
      _fbDb.doc(_fsGlobalPath(k)).set({data:d[k],updatedAt:ts})
        .catch(()=>{});
  });
  // TODAS as filiais
  (d['__fil__']||[]).forEach(fil=>{
    const fid=fil.id;
    if(!d[fid]) return;
    FS_COLS.forEach(col=>{
      if(d[fid][col]!==undefined)
        _fbDb.doc(_fsFilialPath(fid,col)).set({lista:d[fid][col]||[],updatedAt:ts})
          .catch(()=>{});
    });
  });
}

// Escrita direta de uma única coleção de filial (mais rápido para saves individuais)
function _syncCol(fid,col,data){
  if(!_fbReady) return;
  _fbDb.doc(_fsFilialPath(fid,col))
    .set({lista:data||[],updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .catch(()=>{});
}

const gfd=(db,fid,col)=>(db[fid]&&db[fid][col])||[];

// ── LOG DO SISTEMA ──
// Registra todas as ações de usuários no localStorage + Firestore
function addLog(acao, modulo, detalhe, extra){
  try{
    const user=S.user;
    const entry={
      id:uid(),
      ts:new Date().toISOString(),         // timestamp ISO
      data:td(),                            // data YYYY-MM-DD
      hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      userId:user?.id||'?',
      userName:user?.nome||'Sistema',
      userEmail:user?.email||'',
      acao,      // 'Criou','Editou','Excluiu','Login','Logout','Gerou PDF',...
      modulo,    // 'Contas a Pagar','RH - Férias','Estoque',...
      detalhe,   // nome/descrição do registro
      extra:extra||'',  // info adicional (valor, status, etc.)
      filial:gfil().find(f=>f.id===S.fid)?.nome||'',
    };
    // Salva no localStorage
    const K_LOG='gf_logs_v1';
    let logs=[];
    try{ logs=JSON.parse(localStorage.getItem(K_LOG)||'[]'); }catch{}
    logs.unshift(entry); // mais recente primeiro
    if(logs.length>5000) logs=logs.slice(0,5000); // máx 5000 entradas
    localStorage.setItem(K_LOG,JSON.stringify(logs));
    // Salva no Firestore em background
    if(_fbReady){
      // Firestore: /empresa/main/logs/{autoId}
      _fbDb.collection('logs').add(entry)
        .catch(()=>{}); // silencioso
    }
  }catch(e){}
}
function getLogs(){
  try{ return JSON.parse(localStorage.getItem('gf_logs_v1')||'[]'); }
  catch{ return []; }
}
const sfd=(db,fid,col,d)=>{if(!db[fid])db[fid]={};db[fid][col]=d};

// ── FIRESTORE: salvar um documento específico (robusto, sem batch) ──
async function _fsSet(path, data){
  if(!_fbReady||!_fbUid) return;
  try{
    await _fbDb.doc(path).set(data);
  }catch(e){
    console.warn('[FS] set erro em',path,e.code||e.message);
    throw e;
  }
}

// Sincroniza TODOS os dados com Firestore (caminho compartilhado)
async function _fbSyncAll(db){
  if(!_fbReady) return;
  const writes=[];
  const ts=firebase.firestore.FieldValue.serverTimestamp();

  // Dados globais
  for(const k of['__fil__','__usr__','__pc__','__app__']){
    if(db[k]!==undefined){
      writes.push(
        _fbDb.doc(_fsGlobalPath(k))
          .set({data:db[k], updatedAt:ts})
          .catch(e=>console.warn('[FS] sync global',k,e.code))
      );
    }
  }

  // Dados por filial
  const fils=db['__fil__']||[];
  for(const fil of fils){
    const fid=fil.id;
    if(!db[fid]) continue;
    for(const col of FS_COLS){
      if(db[fid][col]!==undefined){
        writes.push(
          _fbDb.doc(_fsFilialPath(fid,col))
            .set({lista:db[fid][col]||[], updatedAt:ts})
            .catch(e=>console.warn('[FS] sync filial',fid,col,e.code))
        );
      }
    }// Force refresh from server on mobile when app comes to foreground
if(document.visibilityState === "visible"){
  localStorage.removeItem('gf_v3'); // Remove cache antigo
  location.reload(); // Recarrega a página
}
  }

  await Promise.all(writes);
  console.info('[Firebase] ✅ Sincronizado —',writes.length,'documentos no caminho compartilhado');
}

// Carrega dados globais do Firestore (rápido — apenas 4 documentos)
async function _fbLoadGlobal(){
  if(!_fbReady) return false;
  const GLOBAL_KEYS=["__fil__","__usr__","__pc__","__app__"];
  // SEMPRE começa com objeto limpo do localStorage para preservar dados locais
  // mas SOBRESCREVE com dados do Firestore (mais autoritativo)
  const local=JSON.parse(localStorage.getItem(K)||'{}');
  const db={...local}; // cópia do local como base
  // Forçar busca no servidor (não cache local do Firestore)
  const snaps=await Promise.all(
    GLOBAL_KEYS.map(k=>_fbDb.doc(_fsGlobalPath(k)).get().catch(()=>null))
  );
  let fsHasData=false;
  GLOBAL_KEYS.forEach((k,i)=>{
    const snap=snaps[i];
    if(snap&&snap.exists){
      const d=snap.data();
      if(d&&d.data!==undefined){
        db[k]=d.data; // Firestore é a fonte da verdade
        fsHasData=true;
        console.info('[FS] Global carregado:',k,Array.isArray(d.data)?d.data.length+' itens':typeof d.data);
      }
    }
  });
  if(!db["__fil__"]||!db["__fil__"].length)
    db["__fil__"]=[{id:"f1",nome:"Filial Principal",modulos:[]}];
  _cache=db;_cacheLoaded=true;
  localStorage.setItem(K,JSON.stringify(db));
  return fsHasData;
}

// Carrega dados das filiais em background (não bloqueia a UI)
async function _fbLoadFiliais(renderCallback){
  if(!_fbReady) return;
  const fils=gfil();
  const db=ld();
  for(const fil of fils){
    const fid=fil.id;
    db[fid]=db[fid]||{}; // preserva dados locais se Firestore não tiver
    const snaps=await Promise.all(
      FS_COLS.map(col=>_fbDb.doc(_fsFilialPath(fid,col)).get().catch(()=>null))
    );
    let changed=false;
    FS_COLS.forEach((col,i)=>{
      const snap=snaps[i];
      // Só sobrescreve se Firestore tem dados (não apaga dados locais com array vazio)
      if(snap&&snap.exists){
        const d=snap.data();
        if(Array.isArray(d.lista)){
          db[fid][col]=d.lista; // Firestore é autoritativo
          changed=true;
        }
      }
    });
    if(changed){
      _cache=db;_cacheLoaded=true;
      localStorage.setItem(K,JSON.stringify(db));
      // Re-render ao terminar cada filial
      if(typeof renderCallback==="function") renderCallback();
    }
  }
  console.info("[Firebase] ✅ Dados completos carregados");
}

// Migração automática: copia dados do caminho antigo para o novo
async function _migrarDadosAntigos(uid){
  if(!_fbReady||!uid) return false;
  let migrou=false;
  const ts=firebase.firestore.FieldValue.serverTimestamp();
  const GLOBAL_KEYS=['__fil__','__usr__','__pc__','__app__'];

  // Tenta ler do caminho antigo (sistema/{uid}/global/)
  for(const k of GLOBAL_KEYS){
    try{
      const oldSnap=await _fbDb.doc(`sistema/${uid}/global/${k}`).get();
      if(oldSnap.exists){
        const d=oldSnap.data();
        if(d&&d.data!==undefined){
          // Copia para o novo caminho compartilhado
          await _fbDb.doc(_fsGlobalPath(k)).set({data:d.data,updatedAt:ts});
          console.info('[FS] Migrado:',k,'→ empresa/main/global/'+k);
          migrou=true;
        }
      }
    }catch(e){ /* sem acesso ao caminho antigo é normal */ }
  }

  // Tenta migrar dados das filiais
  try{
    const filSnap=await _fbDb.doc(`sistema/${uid}/global/__fil__`).get();
    if(filSnap.exists){
      const fils=filSnap.data()?.data||[];
      for(const fil of fils){
        const fid=fil.id;
        for(const col of FS_COLS){
          try{
            const oldSnap=await _fbDb.doc(`dados/${uid}/${fid}/${col}`).get();
            if(oldSnap.exists){
              const d=oldSnap.data();
              if(d&&Array.isArray(d.lista)&&d.lista.length>0){
                await _fbDb.doc(_fsFilialPath(fid,col)).set({lista:d.lista,updatedAt:ts});
                console.info('[FS] Migrado filial:',fid,col,'('+d.lista.length+' registros)');
                migrou=true;
              }
            }
          }catch(e){}
        }
      }
    }
  }catch(e){}

  if(migrou) console.info('[Firebase] ✅ Migração concluída — dados copiados para empresa/main/');
  return migrou;
}

// Força upload do localStorage para o Firestore (garante que dados locais vão para nuvem)
async function _uploadLocalParaFirestore(){
  if(!_fbReady) return;
  const db=JSON.parse(localStorage.getItem(K)||'{}');
  const ts=firebase.firestore.FieldValue.serverTimestamp();
  const writes=[];

  // Só faz upload se tem dados locais relevantes
  const GLOBAL_KEYS=['__fil__','__usr__','__pc__','__app__'];
  for(const k of GLOBAL_KEYS){
    if(db[k]!==undefined){
      // Verifica se o Firestore já tem dado — só sobrescreve se local for mais recente
      try{
        const snap=await _fbDb.doc(_fsGlobalPath(k)).get();
        if(!snap.exists){
          writes.push(_fbDb.doc(_fsGlobalPath(k)).set({data:db[k],updatedAt:ts})
            .then(()=>console.info('[FS] Upload local→FS:',k)));
        }
      }catch(e){}
    }
  }

  const fils=db['__fil__']||[];
  for(const fil of fils){
    const fid=fil.id;
    if(!db[fid]) continue;
    for(const col of FS_COLS){
      if(db[fid][col]&&db[fid][col].length>0){
        try{
          const snap=await _fbDb.doc(_fsFilialPath(fid,col)).get();
          if(!snap.exists){
            writes.push(_fbDb.doc(_fsFilialPath(fid,col)).set({lista:db[fid][col],updatedAt:ts})
              .then(()=>console.info('[FS] Upload filial local→FS:',fid,col)));
          }
        }catch(e){}
      }
    }
  }

  if(writes.length>0){
    await Promise.all(writes);
    console.info('[Firebase] ✅ Upload local→Firestore:',writes.length,'documentos');
  }
}

// Garante que QUALQUER login (email, Google, etc.) aparece em
// Configurações → Usuários com todas as permissões editáveis
// ══════════════════════════════════════════════════════════════
async function _registrarUsuario(fbUser){
  if(!fbUser) return null;
  const db=ld();
  if(!db['__fil__']||!db['__fil__'].length)
    db['__fil__']=[{id:'f1',nome:'Filial Principal',modulos:[]}];
  if(!db['__usr__']) db['__usr__']=[];

  const users=db['__usr__'];
  const idx=users.findIndex(x=>
    x.id===fbUser.uid ||
    (x.email||'').toLowerCase()===(fbUser.email||'').toLowerCase()
  );

  let u;
  if(idx>=0){
    // Já existe — atualiza dados do Firebase Auth mas preserva permissões
    u=users[idx];
    u.id=fbUser.uid;             // garante id correto (uid Firebase)
    u.email=fbUser.email;
    // Atualiza nome só se ainda não foi personalizado
    if(!u.nomePersonalizado && fbUser.displayName){
      u.nome=fbUser.displayName;
    }
    u.fotoUrl=fbUser.photoURL||u.fotoUrl||'';
    u.ultimoAcesso=new Date().toISOString();
    u.provedor=fbUser.providerData?.[0]?.providerId||'password';
    users[idx]=u;
  } else {
    // Novo usuário — primeiro acesso
    const isFirst=users.length===0;
    u={
      id:fbUser.uid,
      nome:fbUser.displayName||fbUser.email.split('@')[0],
      email:fbUser.email,
      perfil:isFirst?'admin':'usuario',   // primeiro usuário é admin
      filiais:[],
      modulos:[],
      fotoUrl:fbUser.photoURL||'',
      provedor:fbUser.providerData?.[0]?.providerId||'password',
      criadoEm:new Date().toISOString(),
      ultimoAcesso:new Date().toISOString(),
      nomePersonalizado:false,
    };
    users.push(u);
    console.info('[Auth] Novo usuário registrado:',u.email,'(perfil:',u.perfil+')');
  }

  db['__usr__']=users;
  _cache=db;_cacheLoaded=true;
  localStorage.setItem('gf_v3',JSON.stringify(db));

  // Sincroniza imediatamente para o Firestore
  if(_fbReady){
    try{
      await _fbDb.doc(_fsGlobalPath('__usr__')).set({
        data:users,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      console.info('[FS] ✅ Usuários sincronizados:',users.length);
    }catch(e){
      console.warn('[Firebase] Sync usuário:',e.code||e.message);
    }
  }

  return u;
}

const maskCNPJ=v=>{v=v.replace(/\D/g,'').slice(0,14);if(v.length<=2)return v;if(v.length<=5)return v.replace(/(\d{2})(\d+)/,'$1.$2');if(v.length<=8)return v.replace(/(\d{2})(\d{3})(\d+)/,'$1.$2.$3');if(v.length<=12)return v.replace(/(\d{2})(\d{3})(\d{3})(\d+)/,'$1.$2.$3/$4');return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d+)/,'$1.$2.$3/$4-$5')};

const maskCPFouCNPJ=v=>{const d=v.replace(/\D/g,'');return d.length<=11?maskCPF(v):maskCNPJ(v)};

// ── LISTENERS em tempo real — somente docs globais + filial ativa ──
// (não abre 22+ conexões — abre apenas o necessário)
let _listeners=[];
let _lastServerUpdate={};

function _startRealtimeListeners(){
  if(!_fbReady){ console.warn("[FS RT] Firebase não pronto"); return; }
  _stopRealtimeListeners();

  // 1. Escuta os 4 documentos globais (filiais, usuários, config)
  const GLOBAL_KEYS=["__fil__","__usr__","__pc__","__app__"];
  GLOBAL_KEYS.forEach(key=>{
    const unsub=_fbDb.doc(_fsGlobalPath(key))
      .onSnapshot({includeMetadataChanges:false},snap=>{
        if(!snap.exists) return;
        const d=snap.data();
        if(!d||d.data===undefined) return;
        // Atualiza _cache diretamente (fonte de verdade)
        if(!_cacheLoaded) _cache=JSON.parse(localStorage.getItem(K)||'{}');
        _cache[key]=d.data;
        _cacheLoaded=true;
        localStorage.setItem(K,JSON.stringify(_cache));
        console.info('[FS RT]',key,'←',Array.isArray(d.data)?d.data.length+' itens':typeof d.data);
        if(typeof render==='function') render();
      },()=>{}); // erros de listener ignorados (coleção pode não existir ainda)
    _listeners.push(unsub);
  });

  // 2. Escuta coleções de TODAS as filiais (sync bidirecional completa)
  const todasFils=gfil();
  todasFils.forEach(fil=>_listenFilialCols(fil.id));

  console.info("[Firebase] ✅",_listeners.length,"listeners ativos (globais + todas filiais)");
}

function _listenFilialCols(fid){
  if(!fid||!_fbReady) return;
  // Para listeners de filial anteriores (mantém globais)
  const globCount=4;
  _listeners.slice(globCount).forEach(u=>{try{u();}catch(e){}});
  _listeners=_listeners.slice(0,globCount);

  // Escuta TODAS as coleções da filial ativa
  FS_COLS.forEach(col=>{
    const unsub=_fbDb.doc(_fsFilialPath(fid,col))
      .onSnapshot({includeMetadataChanges:false},snap=>{
        if(!snap.exists) return;
        const d=snap.data();
        if(!d||!Array.isArray(d.lista)) return;
        if(!_cacheLoaded) _cache=JSON.parse(localStorage.getItem(K)||'{}');
        if(!_cache[fid]) _cache[fid]={};
        _cache[fid][col]=d.lista;
        _cacheLoaded=true;
        localStorage.setItem(K,JSON.stringify(_cache));
        if(S.fid===fid&&typeof render==='function') render();
      },()=>{});
    _listeners.push(unsub);
  });
}

function _stopRealtimeListeners(){
  _listeners.forEach(u=>{try{u();}catch(e){}});
  _listeners=[];
  _lastServerUpdate={};
}

function bindLogin(){
  // Tabs: Login / Criar Conta
  document.querySelectorAll('[data-auth-tab]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      S._authTab=e.currentTarget.dataset.authTab;
      render();
    });
  });

  // Mostrar/ocultar senha
  by('btn-show-pw')?.addEventListener('click',()=>{
    const pw=by('l-pw');if(!pw)return;
    pw.type=pw.type==='password'?'text':'password';
    by('btn-show-pw').textContent=pw.type==='password'?'👁':'🙈';
  });

  const errEl=by('l-err'),okEl=by('l-ok');
  const setErr=msg=>{if(errEl){errEl.style.display='block';errEl.textContent=msg;}if(okEl)okEl.style.display='none';};
  const setOk=msg=>{if(okEl){okEl.style.display='block';okEl.textContent=msg;}if(errEl)errEl.style.display='none';};
  const clearMsg=()=>{if(errEl)errEl.style.display='none';if(okEl)okEl.style.display='none';};
  const setLoading=v=>{const b=by('btn-login');if(b){b.disabled=v;b.style.opacity=v?'.6':'1';}};

  // ── Mensagens de erro Firebase traduzidas ──
  const fbMsg={
    'auth/user-not-found':'Usuário não encontrado.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-credential':'Email ou senha incorretos.',
    'auth/email-already-in-use':'Este email já está cadastrado.',
    'auth/weak-password':'Senha fraca (mínimo 6 caracteres).',
    'auth/invalid-email':'Formato de email inválido.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.',
    'auth/network-request-failed':'Sem conexão. Verifique sua internet.',
    'auth/popup-closed-by-user':'Login cancelado.',
    'auth/popup-blocked':'Popup bloqueado. Permita popups neste site.',
    'auth/cancelled-popup-request':'Login cancelado.',
  };

  // ── Função de login bem-sucedido ──
  const onLoginOk=async(fbUser)=>{
    setLoading(true);
    _fbUid=fbUser.uid;

    // Carrega dados do novo caminho compartilhado
    try{ await _fbLoadGlobal(); }
    catch(e){ console.warn("[Firebase] Usando cache local:",e.code||e.message); }

    // Migração automática se não há dados no novo caminho
    const temDados=gfil().some(f=>f.id!=='f1'||f.nome!=='Filial Principal');
    if(!temDados){
      const migrou=await _migrarDadosAntigos(fbUser.uid);
      if(migrou) await _fbLoadGlobal();
      else{ await _uploadLocalParaFirestore(); await _fbLoadGlobal(); }
    }

    // Registra usuário e renderiza IMEDIATAMENTE
    const u=await _registrarUsuario(fbUser);
    S.ok=true;S.user=u;
    render();

    // Carrega dados das filiais em background
    _fbLoadFiliais(()=>{ if(S.ok) render(); }).catch(e=>console.warn("[FS]",e.message));

    // Listeners em tempo real
    _startRealtimeListeners();
  };

  // ── LOGIN COM EMAIL E SENHA ──
  const doEmailLogin=async()=>{
    clearMsg();
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    const pw=(by('l-pw')?.value||'').replace(/\s+$/,'');
    if(!em){setErr('Informe o email.');return;}
    if(!pw){setErr('Informe a senha.');return;}
    if(!_fbReady){
      // Fallback local
      const users=gus();
      const u=users.find(x=>(x.email||'').replace(/\s/g,'').toLowerCase()===em&&(x.senha||'').replace(/\s+$/,'')===pw);
      if(u){S.ok=true;S.user=u;render();}
      else setErr('Email ou senha incorretos. (Modo offline)');
      return;
    }
    setLoading(true);
    try{
      const cred=await _fbAuth.signInWithEmailAndPassword(em,pw);
      await onLoginOk(cred.user);
    }catch(err){
      setLoading(false);
      setErr(fbMsg[err.code]||'Erro: '+err.message);
    }
  };

  // ── CRIAR CONTA ──
  const doRegister=async()=>{
    clearMsg();
    const nome=(by('l-nome')?.value||'').trim();
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    const pw=(by('l-pw')?.value||'').replace(/\s+$/,'');
    const pw2=(by('l-pw2')?.value||'').replace(/\s+$/,'');
    if(!nome){setErr('Informe seu nome.');return;}
    if(!em){setErr('Informe o email.');return;}
    if(!pw||pw.length<6){setErr('Senha deve ter pelo menos 6 caracteres.');return;}
    if(pw!==pw2){setErr('As senhas não coincidem.');return;}
    if(!_fbReady){setErr('Firebase não está disponível. Verifique sua conexão.');return;}
    setLoading(true);
    try{
      const cred=await _fbAuth.createUserWithEmailAndPassword(em,pw);
      // Salva nome no perfil
      await cred.user.updateProfile({displayName:nome}).catch(()=>{});
      setOk('✅ Conta criada! Fazendo login...');
      await onLoginOk({...cred.user,displayName:nome});
    }catch(err){
      setLoading(false);
      setErr(fbMsg[err.code]||'Erro: '+err.message);
    }
  };

  // ── LOGIN COM GOOGLE ──
  by('btn-google')?.addEventListener('click',async()=>{
    clearMsg();
    if(!_fbReady){setErr('Firebase não disponível.');return;}
    setLoading(true);
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({prompt:'select_account'});
      const result=await _fbAuth.signInWithPopup(provider);
      await onLoginOk(result.user);
    }catch(err){
      setLoading(false);
      if(err.code!=='auth/popup-closed-by-user'&&err.code!=='auth/cancelled-popup-request')
        setErr(fbMsg[err.code]||'Erro Google: '+err.message);
    }
  });

  // ── ESQUECI A SENHA ──
  by('btn-forgot')?.addEventListener('click',async()=>{
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    if(!em){setErr('Digite seu email para recuperar a senha.');return;}
    if(!_fbReady){setErr('Firebase não disponível.');return;}
    clearMsg();
    try{
      await _fbAuth.sendPasswordResetEmail(em);
      setOk('✅ Email de recuperação enviado para '+em+'. Verifique sua caixa de entrada.');
    }catch(err){
      setErr(fbMsg[err.code]||'Erro: '+err.message);
    }
  });

  // ── SUBMIT com Enter ──
  const tab=S._authTab||'login';
  by('btn-login')?.addEventListener('click',tab==='register'?doRegister:doEmailLogin);
  by('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')(tab==='register'?doRegister:doEmailLogin)();});
  by('l-em')?.addEventListener('keydown',e=>{if(e.key==='Enter')by('l-pw')?.focus();});
  by('l-pw2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
}

/* ══════════════════════════════════════════════════════════════
   CÁLCULO DE FÉRIAS — CLT + Tabelas 2026
   INSS: Método alíquota × base − dedução acumulada (2026)
   Validado: base R$ 2.000 → R$ 2.000×9% − R$ 24,32 = R$ 155,68
   IRRF: Lei 14.848/2024 | FGTS: Lei 8.036/90 — 8% patronal
══════════════════════════════════════════════════════════════ */
function calcINSS(base){
  // Tabela INSS 2026 — alíquota da faixa × base − dedução acumulada
  // Faixas reajustadas pelo INPC (~6,8% sobre tabela 2025)
  // Dedução = diferença acumulada das alíquotas nas faixas anteriores
  //
  // Faixa 1: até R$ 1.621,33 → 7,5% − R$ 0,00
  // Faixa 2: até R$ 3.082,16 → 9,0% − R$ 24,32  ← ex: R$2.000×9%−24,32=R$155,68 ✓
  // Faixa 3: até R$ 4.476,23 → 12%  − R$ 116,78
  // Faixa 4: até R$ 8.712,93 → 14%  − R$ 206,30
  const T=[
    {ate:1621.33, aliq:0.075, ded:  0.00},
    {ate:3082.16, aliq:0.090, ded: 24.32},
    {ate:4476.23, aliq:0.120, ded:116.78},
    {ate:8712.93, aliq:0.140, ded:206.30},
  ];
  for(const f of T){
    if(base<=f.ate) return Math.max(0,parseFloat((base*f.aliq-f.ded).toFixed(2)));
  }
  return parseFloat((8712.93*0.14-206.30).toFixed(2)); // teto máximo
}

function calcIRRF(baseCalculo){
  // Tabela IRRF 2026 — Lei 14.848/2024
  // Isento até R$ 2.428,80 (atualizado 2026)
  const T=[
    {ate:2428.80,  aliq:0.000, ded:   0.00},  // isento
    {ate:2826.65,  aliq:0.075, ded: 182.16},
    {ate:3751.05,  aliq:0.150, ded: 394.16},
    {ate:4664.68,  aliq:0.225, ded: 675.49},
    {ate:Infinity, aliq:0.275, ded: 908.73},
  ];
  for(const f of T){
    if(baseCalculo<=f.ate)
      return Math.max(0,parseFloat((baseCalculo*f.aliq-f.ded).toFixed(2)));
  }
  return 0;
}

function calcFerias(salario, dias){
  // 1. Valor proporcional (CLT Art. 129 — salário/30 × dias)
  const valorDiario = parseFloat((salario/30).toFixed(6));
  const valorFerias = parseFloat((valorDiario*dias).toFixed(2));

  // 2. 1/3 constitucional (CF/88 Art. 7º, XVII)
  const tercoConstitucional = parseFloat((valorFerias/3).toFixed(2));

  // 3. Total bruto (base de cálculo)
  const totalBruto = parseFloat((valorFerias+tercoConstitucional).toFixed(2));

  // 4. INSS — incide sobre o total bruto das férias
  const inss = calcINSS(totalBruto);

  // 5. FGTS — 8% sobre total bruto (encargo do empregador, não desconta do funcionário)
  const fgts = parseFloat((totalBruto*0.08).toFixed(2));

  // 6. Base IRRF = total bruto − INSS
  const baseIRRF = parseFloat((totalBruto-inss).toFixed(2));

  // 7. IRRF
  const irrf = calcIRRF(baseIRRF);

  // 8. Líquido a receber
  const liquido = parseFloat((totalBruto-inss-irrf).toFixed(2));

  return{
    valorDiario:parseFloat(valorDiario.toFixed(2)),
    valorFerias, tercoConstitucional, totalBruto,
    inss, fgts, baseIRRF, irrf, liquido
  };
}

/* ══════════════════════════════════════════════════════════════
   CÁLCULO DE RESCISÃO — CLT 2026
   Arts. 477, 478, 479, 480, 484-A, 487, 488 e 496 da CLT
   Lei 8.036/90 (FGTS) | Lei 9.491/97 | Dec. 99.684/90
══════════════════════════════════════════════════════════════ */
function calcRescisao(sal, mesesTrab, motivo, avisoPrevioTrabalhado, saldoDias, feriasVencDias, feriasProDias){
  const r2=v=>parseFloat(v.toFixed(2));
  const sd=Number(saldoDias||0);
  const fv=Number(feriasVencDias||0);
  const fp=Number(feriasProDias||0);
  const dm=new Date().getDate();

  // ── Saldo de salário (dias trabalhados no mês de desligamento) ──
  const saldoSalario = r2(sal/30*sd);

  // ── Aviso Prévio (CLT Art. 487 + Lei 12.506/2011) ──
  // 30 dias + 3 dias por ano trabalhado, máximo 90 dias
  const diasAviso=Math.min(90, 30+Math.floor(mesesTrab/12)*3);
  const valorAviso=r2(sal/30*diasAviso);

  // ── 13º Salário proporcional (Lei 4.090/62) ──
  const meses13=Math.min(12, mesesTrab%12||12);
  const decimo3=r2(sal/12*meses13);

  // ── Férias vencidas + 1/3 (CLT Art. 148) ──
  const valorFeriasVenc=fv>0?r2(sal/30*fv):0;
  const tercoFV=r2(valorFeriasVenc/3);

  // ── Férias proporcionais + 1/3 (CLT Art. 147) ──
  const valorFeriasProp=fp>0?r2(sal/30*fp):0;
  const tercoFP=r2(valorFeriasProp/3);

  // ── FGTS sobre saldo (Lei 8.036/90 — 8% mês a mês) ──
  const fgtsAcumulado=r2(sal*mesesTrab*0.08); // estimativa

  // ── Multa FGTS (Dec. 99.684/90) ──
  let multaFGTS=0;
  if(motivo==='Sem Justa Causa') multaFGTS=r2(fgtsAcumulado*0.40);  // 40% (empregador paga)
  else if(motivo==='Acordo Mutuo') multaFGTS=r2(fgtsAcumulado*0.20); // 20% acordo mútuo

  // ── O que o funcionário RECEBE por tipo de desligamento ──
  let recebeSaldoSal=false,recebeAviso=false,recebe13=false;
  let recebeFV=false,recebeFP=false,recebeMulta=false,deveAviso=false;

  if(motivo==='Sem Justa Causa'){
    recebeSaldoSal=true;recebeAviso=true;recebe13=true;recebeFV=true;recebeFP=true;recebeMulta=true;
  } else if(motivo==='Com Justa Causa'){
    recebeSaldoSal=true; // só saldo de dias trabalhados
    // Não recebe: aviso prévio, 13º, férias proporcionais, multa FGTS
    recebeFV=true; // férias vencidas sempre (Súmula 171 TST)
  } else if(motivo==='Pedido de Demissao'){
    recebeSaldoSal=true;recebe13=true;recebeFV=true;recebeFP=true;
    // Aviso: se não trabalhar, desconta do acerto
    if(!avisoPrevioTrabalhado) deveAviso=true;
  } else if(motivo==='Acordo Mutuo'){
    recebeSaldoSal=true;recebe13=true;recebeFV=true;recebeFP=true;recebeMulta=true;
    recebeAviso=true; // 50% do aviso (art. 484-A)
  } else if(motivo==='Aposentadoria'||motivo==='Termino Contrato'){
    recebeSaldoSal=true;recebe13=true;recebeFV=true;recebeFP=true;
  }

  // ── Totais brutos ──
  const totalBruto=r2(
    (recebeSaldoSal?saldoSalario:0)+
    (recebeAviso?(motivo==='Acordo Mutuo'?valorAviso*0.5:valorAviso):0)+
    (recebe13?decimo3:0)+
    (recebeFV?(valorFeriasVenc+tercoFV):0)+
    (recebeFP?(valorFeriasProp+tercoFP):0)-
    (deveAviso?valorAviso:0)
  );

  // ── Descontos ──
  const inssResc=calcINSS(totalBruto>0?totalBruto:0);
  const baseIRRF=r2(totalBruto-inssResc);
  const irrfResc=calcIRRF(baseIRRF>0?baseIRRF:0);
  const liquido=r2(totalBruto-inssResc-irrfResc);

  return{
    saldoSalario,valorAviso:recebeAviso?(motivo==='Acordo Mutuo'?r2(valorAviso*0.5):valorAviso):0,
    decimo3:recebe13?decimo3:0,diasAviso,
    valorFeriasVenc:recebeFV?valorFeriasVenc:0,tercoFV:recebeFV?tercoFV:0,
    valorFeriasProp:recebeFP?valorFeriasProp:0,tercoFP:recebeFP?tercoFP:0,
    fgtsAcumulado,multaFGTS,
    deveAviso:deveAviso?valorAviso:0,
    totalBruto,inssResc,irrfResc,liquido,
    recebeSaldoSal,recebeAviso,recebe13,recebeFV,recebeFP,recebeMulta,deveAviso
  };
}

function renderCalcRescisao(c, sal, meses, motivo, aviso){
  const row=(l,v,color)=>`<div class="calc-row" ${color?`style="color:${color}"`:''}><span>${l}</span><span>${fmt(v)}</span></div>`;
  const sep=`<div style="border-top:1px solid var(--border);margin:4px 0"></div>`;
  let html='';
  html+=`<div class="calc-row" style="color:var(--text3);font-size:10px"><span>Salário base:</span><span>${fmt(sal)} | ${meses}m serviço</span></div>`;
  html+=sep;
  if(c.recebeSaldoSal) html+=row('Saldo de Salário',c.saldoSalario);
  if(c.recebeAviso)    html+=row('Aviso Prévio ('+c.diasAviso+'d)'+(motivo==='Acordo Mutuo'?' 50%':''),c.valorAviso);
  if(c.recebe13)       html+=row('13º Salário Proporcional',c.decimo3);
  if(c.recebeFV&&c.valorFeriasVenc>0) html+=row('Férias Vencidas',c.valorFeriasVenc)+row('+ 1/3 Férias Vencidas',c.tercoFV);
  if(c.recebeFP&&c.valorFeriasProp>0) html+=row('Férias Proporcionais',c.valorFeriasProp)+row('+ 1/3 Férias Proporcionais',c.tercoFP);
  if(c.deveAviso>0)    html+=row('− Aviso Prévio não cumprido',-c.deveAviso,'var(--red-t)');
  html+=sep;
  html+=row('<strong>= Total Bruto</strong>',c.totalBruto);
  html+=row('− INSS (progressivo)',c.inssResc,'var(--red-t)');
  html+=row('− IRRF',c.irrfResc,'var(--red-t)');
  html+=`<div class="calc-row" style="border-top:2px solid var(--border);padding-top:6px;margin-top:4px"><span style="font-size:13px"><strong>= Líquido Rescisório</strong></span><span style="color:var(--green-t);font-weight:700;font-size:15px">${fmt(c.liquido)}</span></div>`;
  html+=sep;
  html+=`<div style="background:rgba(251,191,36,.08);border-radius:6px;padding:8px 10px;margin-top:4px">`;
  html+=`<div style="font-size:10px;font-weight:700;color:var(--amber-t);margin-bottom:4px">FGTS (encargo patronal)</div>`;
  html+=row('FGTS acumulado estimado (8%)',c.fgtsAcumulado,'var(--amber-t)');
  if(c.multaFGTS>0) html+=row('Multa FGTS ('+(motivo==='Acordo Mutuo'?'20%':'40%')+')',c.multaFGTS,'var(--amber-t)');
  html+=`</div>`;
  return html;
}

  // Agrupamento por dia

function pgDRE(db,fid,fil){
  // ── Coleta de dados ──
  const cpAll  = gfd(db,fid,'cp');
  const crAll  = gfd(db,fid,'cr');
  const venAll = gfd(db,fid,'vendas');

  // ── Filtro de período ──
  // S.drePeriodo: '' = todos | 'YYYY' = ano | 'YYYY-MM' = mês
  const periodo = S.drePeriodo || '';

  // Para CR: usa dataRecebimento se existir, senão vencimento, senão criadoEm
  const dataCR  = i => ((i.dataRecebimento||i.vencimento||i.criadoEm||'').slice(0,10));
  // Para CP: usa dataPagamento se existir, senão vencimento
  const dataCP  = i => ((i.dataPagamento||i.vencimento||'').slice(0,10));
  // Para Vendas: usa dataEmissao, senão vencimento
  const dataVen = i => ((i.dataEmissao||i.vencimento||'').slice(0,10));

  const okData = d => {
    if (!periodo) return true;
    const s = (d || '').slice(0,10);
    if (!s) return true; // sem data: inclui no "todos"
    if (periodo.length === 4) return s.startsWith(periodo);
    return s.slice(0,7) === periodo;
  };

  // Filtra por data relevante de cada coleção
  const cp  = cpAll.filter(i => okData(dataCP(i)));
  const cr  = crAll.filter(i => okData(dataCR(i)));
  const ven = venAll.filter(i => okData(dataVen(i)));

  // ── RECEITAS ──
  const crBruto     = cr.reduce((s,i)  => s + Number(i.valor||0), 0);
  const crRecebido  = cr.filter(i => i.status==='Recebido').reduce((s,i) => s + Number(i.valor||0), 0);
  const crPendente  = crBruto - crRecebido;

  const venBruto    = ven.reduce((s,i) => s + Number(i.valor||0), 0);
  const venPago     = ven.filter(i => i.status==='Paga').reduce((s,i) => s + Number(i.valor||0), 0);
  const venPend     = venBruto - venPago;

  const recBruta     = crBruto + venBruto;
  const recRealizada = crRecebido + venPago;
  const recPendente  = recBruta - recRealizada;

  // ── DESPESAS ──
  const despTotal = cp.reduce((s,i) => s + Number(i.valor||0), 0);
  const despPago  = cp.filter(i => i.status==='Pago').reduce((s,i) => s + Number(i.valor||0), 0);
  const despPend  = cp.filter(i => i.status==='Pendente'||i.status==='Vencido').reduce((s,i) => s + Number(i.valor||0), 0);
  const despCanc  = cp.filter(i => i.status==='Cancelado').reduce((s,i) => s + Number(i.valor||0), 0);
  const despLiq   = despTotal - despCanc;

  // ── RESULTADO ──
  const lucroOp  = recBruta     - despLiq;
  const lucroLiq = recRealizada - despPago;

  // ── Labels ──
  const NOMES_MES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const periodoLabel = !periodo ? 'Todos os períodos'
    : periodo.length===4 ? 'Ano ' + periodo
    : (NOMES_MES[Number(periodo.slice(5,7))-1] + ' / ' + periodo.slice(0,4));

  const ANOS     = ['2025','2026','2027','2028'];
  const monthVal = periodo.length===7 ? periodo : '';
  const anoVal   = periodo.length===4 ? periodo : '';

  const nCR  = crAll.length;
  const nVen = venAll.length;
  const nCP  = cpAll.length;

  return`<div class="page">
  <div class="ph">
    <div>
      <div class="pt">DRE — Demonstrativo de Resultados</div>
      <div class="ps">${esc(fil.nome)} · ${periodoLabel}
        <span style="font-size:10px;color:var(--text3);margin-left:8px">
          (${nCP} desp. · ${nCR} receb. · ${nVen} vendas)
        </span>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" id="btn-dre-excel">📊 Excel</button>
      <button class="btn btn-sm" id="btn-dre-pdf">📄 PDF</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card" style="padding:14px 18px;margin-bottom:14px">
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div style="display:flex;flex-direction:column;gap:5px">
        <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Mês / Ano específico</label>
        <input type="month" id="f-dre-mes" value="${monthVal}" min="2025-01"
          style="height:36px;padding:0 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:#fff;color:var(--text);outline:none;min-width:170px"/>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Ou somente Ano</label>
        <select id="f-dre-ano" style="height:36px;padding:0 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:#fff;color:var(--text);outline:none;min-width:150px">
          <option value="">— Todos os anos —</option>
          ${ANOS.map(a=>`<option value="${a}"${anoVal===a?' selected':''}>${a}</option>`).join('')}
        </select>
      </div>
      <button id="btn-dre-limpar" class="btn btn-sm" style="align-self:flex-end;height:36px;white-space:nowrap">✕ Limpar</button>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text3);line-height:1.6">
      ${periodo
        ? `<span style="color:var(--gold-d);background:var(--gold-bg);border-radius:6px;padding:3px 10px;font-weight:600">📅 ${periodoLabel}</span>
           &nbsp;· CR filtrado por: data de recebimento &nbsp;· CP filtrado por: data de pagamento`
        : `Exibindo todos os registros. CR usa data de recebimento; CP usa data de pagamento.`}
    </div>
  </div>

  <!-- Cards resumo -->
  <div class="sg" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
    <div class="sc sc-green" style="border-top:2px solid var(--green)">
      <div class="sl">Receita Bruta Total</div>
      <div class="sv" style="color:var(--green-t)">${fmt(recBruta)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Realizada: <strong style="color:var(--green-t)">${fmt(recRealizada)}</strong></div>
    </div>
    <div class="sc sc-red" style="border-top:2px solid var(--red)">
      <div class="sl">Total Despesas</div>
      <div class="sv" style="color:var(--red-t)">${fmt(despLiq)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Pago: <strong style="color:var(--red-t)">${fmt(despPago)}</strong></div>
    </div>
    <div class="sc" style="border-top:2px solid ${lucroLiq>=0?'var(--green)':'var(--red)'}">
      <div class="sl">Lucro Líquido</div>
      <div class="sv" style="color:${lucroLiq>=0?'var(--green-t)':'var(--red-t)'}">${fmt(lucroLiq)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Operacional: <strong style="color:${lucroOp>=0?'var(--green-t)':'var(--red-t)'}">${fmt(lucroOp)}</strong></div>
    </div>
  </div>

  <!-- Demonstrativo -->
  <div class="card" style="padding:0;overflow:hidden">

    <div class="dre-sec">RECEITAS</div>

    <div class="dre-row" style="background:rgba(22,121,74,.03)">
      <span style="font-weight:600">Contas a Receber <span style="font-size:10px;font-weight:400;color:var(--text3)">(${cr.length} registro${cr.length!==1?'s':''})</span></span>
      <span style="color:var(--green-t);font-weight:700">${fmt(crBruto)}</span>
    </div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Recebido</span>
      <span style="color:var(--green-t)">${fmt(crRecebido)}</span>
    </div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Pendente / A Receber</span>
      <span style="color:var(--amber-t)">${fmt(crPendente)}</span>
    </div>

    <div class="dre-row" style="background:rgba(22,121,74,.03)">
      <span style="font-weight:600">Vendas / Faturamento <span style="font-size:10px;font-weight:400;color:var(--text3)">(${ven.length} registro${ven.length!==1?'s':''})</span></span>
      <span style="color:var(--green-t);font-weight:700">${fmt(venBruto)}</span>
    </div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Pago / Quitado</span>
      <span style="color:var(--green-t)">${fmt(venPago)}</span>
    </div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Pendente / Em aberto</span>
      <span style="color:var(--amber-t)">${fmt(venPend)}</span>
    </div>

    <div class="dre-row tot" style="background:rgba(22,121,74,.06)">
      <span>Total Receita Bruta &nbsp;<span style="font-size:11px;font-weight:400;color:var(--text3)">(CR + Vendas)</span></span>
      <span style="color:var(--green-t)">${fmt(recBruta)}</span>
    </div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">(−) A Receber / Pendente</span>
      <span style="color:var(--amber-t)">${fmt(recPendente)}</span>
    </div>
    <div class="dre-row tot">
      <span style="padding-left:18px">(=) Receita Realizada</span>
      <span style="color:var(--green-t)">${fmt(recRealizada)}</span>
    </div>

    <div class="dre-sec">DESPESAS &nbsp;<span style="font-size:9px;font-weight:400">(Contas a Pagar — ${cp.length} registro${cp.length!==1?'s':''})</span></div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Pagas</span>
      <span style="color:var(--red-t)">${fmt(despPago)}</span>
    </div>
    <div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Pendentes / Vencidas</span>
      <span style="color:var(--amber-t)">${fmt(despPend)}</span>
    </div>
    ${despCanc>0?`<div class="dre-row">
      <span style="padding-left:22px;color:var(--text2)">↳ Canceladas (excluídas do resultado)</span>
      <span style="color:var(--gray-t)">${fmt(despCanc)}</span>
    </div>`:''}
    <div class="dre-row tot" style="background:rgba(184,50,50,.04)">
      <span>Total Despesas &nbsp;<span style="font-size:11px;font-weight:400;color:var(--text3)">(sem canceladas)</span></span>
      <span style="color:var(--red-t)">${fmt(despLiq)}</span>
    </div>

    <div class="dre-sec">RESULTADO</div>
    <div class="dre-row tot">
      <span>Lucro Operacional <span style="font-size:11px;font-weight:400;color:var(--text3)">(Rec. Bruta − Total Despesas)</span></span>
      <span style="color:${lucroOp>=0?'var(--green-t)':'var(--red-t)'};">${fmt(lucroOp)}</span>
    </div>
    <div class="dre-row tot" style="background:${lucroLiq>=0?'rgba(22,121,74,.06)':'rgba(184,50,50,.06)'}">
      <span>Lucro Líquido <span style="font-size:11px;font-weight:400;color:var(--text3)">(Rec. Realizada − Desp. Pagas)</span></span>
      <span style="color:${lucroLiq>=0?'var(--green-t)':'var(--red-t)'};">${fmt(lucroLiq)}</span>
    </div>

  </div>
</div>`;
}

/* ── DESPESAS ── */
function pgDesp(db,fid,fil){
  let lista=gfd(db,fid,'cp');
  const cats=[...new Set(lista.map(i=>i.categoria).filter(Boolean))];
  if(S.fs)lista=lista.filter(i=>i.status===S.fs);
  if(S.fc)lista=lista.filter(i=>i.categoria===S.fc);
  if(S.fm)lista=lista.filter(i=>(i.vencimento||'').slice(0,7)===S.fm);
  const tot=lista.reduce((s,i)=>s+Number(i.valor||0),0);
  const pago=lista.filter(i=>i.status==='Pago').reduce((s,i)=>s+Number(i.valor||0),0);
  return`<div class="page">
  <div class="ph"><div><div class="pt">Despesas</div><div class="ps">Resumo de contas a pagar — ${esc(fil.nome)}</div></div></div>
  <div class="sg">
    <div class="sc"><div class="sl">Total</div><div class="sv" style="color:var(--red-t)">${fmt(tot)}</div></div>
    <div class="sc"><div class="sl">Pago</div><div class="sv" style="color:var(--green-t)">${fmt(pago)}</div></div>
    <div class="sc"><div class="sl">Pendente</div><div class="sv" style="color:var(--amber-t)">${fmt(tot-pago)}</div></div>
    <div class="sc"><div class="sl">Registros</div><div class="sv">${lista.length}</div></div>
  </div>
  <div class="card" style="padding:12px 16px">
    <div class="fr">
      <select id="f-status"><option value="">Todos os status</option>${['Pago','Pendente','Vencido','Cancelado'].map(s=>`<option${S.fs===s?' selected':''}>${s}</option>`).join('')}</select>
      <select id="f-cat"><option value="">Todas categorias</option>${cats.map(c=>`<option${S.fc===c?' selected':''}>${c}</option>`).join('')}</select>
      <input id="f-mes" type="month" value="${S.fm}"/>
    </div>
  </div>
  <div class="card">${lista.length===0?`<div class="empty">Nenhuma despesa.</div>`:`
  <table><thead><tr><th>Nome</th><th>Categoria</th><th>Plano de Contas</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr></thead><tbody>
  ${lista.map(i=>`<tr><td>${esc(i.nome)}</td><td>${esc(i.categoria||'—')}</td><td>${esc(i.planoConta||'—')}</td><td style="color:var(--red-t);font-weight:700">${fmt(i.valor)}</td><td>${fmtD(i.vencimento)}</td><td>${bdg(i.status)}</td></tr>`).join('')}
  </tbody></table>`}</div></div>`;
}

/* ── CONTAS A PAGAR ── */
function pgCP(db,fid,fil){
  const CATS=['','Fornecedor','Colaborador','Prestador de Serviço','Atração Artística','Operacional','Administrativo','Folha de Pagamento','Férias','Outros'];
  let lista=gfd(db,fid,'cp');

  // ── Filtros ──
  const fs=S.fs||'', fc=S.fc||'';

  if(fdAte) lista=lista.filter(i=>i.vencimento&&i.vencimento<=fdAte);

      <div class="sl">Pago</div>
      <div class="sv" style="color:var(--green-t)">${fmt(totPago)}</div>
    </div>
    <div class="sc" style="border-top:2px solid var(--gold);background:linear-gradient(145deg,rgba(201,168,76,.08),rgba(201,168,76,.02))">

      <div class="sv" style="color:var(--gold-l)">${fmt(totPend)}</div>
    </div>
    <div class="sc sc-red" style="border-top:2px solid var(--red)">
      <div class="sl">Vencido</div>
      <div class="sv" style="color:var(--red-t)">${fmt(totVenc)}</div>
    </div>
  </div>

  <!-- Barra de filtros -->
  <div class="card" style="padding:12px 16px;margin-bottom:0">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div class="f" style="flex:1;min-width:130px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Status</label>
        <select id="f-status">
          <option value="">Todos</option>
          ${['Pago','Pendente','Vencido','Cancelado'].map(s=>`<option${fs===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="f" style="flex:1;min-width:150px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Categoria</label>
        <select id="f-cat">
          <option value="">Todas</option>
          ${CATS.filter(Boolean).map(c=>`<option${fc===c?' selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="f" style="min-width:130px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Venc. de</label>
        <input type="date" id="f-cp-de" value="${fdDe}" style="min-width:130px"/>
      </div>
      <div class="f" style="min-width:130px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Venc. até</label>
        <input type="date" id="f-cp-ate" value="${fdAte}" style="min-width:130px"/>
      </div>
      <button class="btn btn-sm" id="btn-cp-limpar" style="white-space:nowrap;align-self:flex-end">✕ Limpar</button>

  <!-- Tabela -->
  <div class="card">${lista.length===0?`<div class="empty">Nenhuma conta encontrada com os filtros aplicados.</div>`:`

    <th>Nome</th><th>Categoria</th><th>Referência</th><th>Valor</th>
    <th>Vencimento</th><th>Pgto</th><th>Parcelas</th><th>Status</th><th>Anexo</th><th></th>

  ${lista.map(i=>{

    return`<tr${atrasado?' style="background:rgba(239,68,68,.06)"':''}>

      <td>${i.dataPagamento?fmtD(i.dataPagamento):'—'}</td>
      <td style="font-size:11px">${esc(i.parcelamento||'À vista')}</td>

        ${i.anexo?`<a href="${i.anexo}" download="${esc(i.anexoNome||'comprovante.pdf')}" class="btn btn-sm" title="Baixar PDF" style="color:var(--blue-t)">📄</a>`:(!i.foto?'<span style="color:var(--text3);font-size:11px">—</span>':'')}

      <td><div class="ar">
        <button class="btn btn-sm" data-ed="${i.id}" data-col="cp">✏</button>
        <button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="cp">✕</button>

  </tbody></table>`}</div>
  </div>`;
}

/* ── CADASTROS ── */
function pgCad(db,fid,fil){
  const tab=S.tab||'forn';
  const TIPOS={
    forn:{label:'Fornecedores',icon:'🏭',col:'forn'},
    colab:{label:'Colaboradores',icon:'👥',col:'colab'},
    prest:{label:'Prestadores',icon:'🔧',col:'prest'},
    atrac:{label:'Atrações',icon:'🎭',col:'atrac'},
    hosp:{label:'Hóspedes',icon:'🏨',col:'hosp'},
  };
  const t=TIPOS[tab]||TIPOS.forn;
  let lista=gfd(db,fid,t.col);
  if(S.fb)lista=lista.filter(i=>i.nome?.toLowerCase().includes(S.fb.toLowerCase()));
  // Ordenação A-Z / Z-A
  const ord=S.op||'az';
  lista=[...lista].sort((a,b)=>ord==='za'
    ?(b.nome||'').localeCompare(a.nome||'','pt-BR')
    :(a.nome||'').localeCompare(b.nome||'','pt-BR'));
  const colsMap={
    forn:[{k:'nome',l:'Nome'},{k:'cpfCnpj',l:'CPF/CNPJ'},{k:'categoria',l:'Categoria'},{k:'planoConta',l:'Plano de Contas'},{k:'telefone',l:'Telefone'}],

    prest:[{k:'nome',l:'Nome'},{k:'cpfCnpj',l:'CPF/CNPJ'},{k:'categoria',l:'Categoria'},{k:'planoConta',l:'Plano de Contas'},{k:'dadosPagamento',l:'Dados Pgto'}],
    atrac:[{k:'nome',l:'Nome'},{k:'cpfCnpj',l:'CPF/CNPJ'},{k:'categoria',l:'Categoria'},{k:'planoConta',l:'Plano de Contas'}],
    hosp:[{k:'nome',l:'Nome'},{k:'cpf',l:'CPF'},{k:'celular',l:'Celular'},{k:'email',l:'Email'}],
  };
  const cols=colsMap[tab]||colsMap.forn;
  return`<div class="page">

      <button class="btn btn-p" id="btn-new">+ Novo Cadastro</button>

  <!-- Abas por tipo -->
  <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap">
    ${Object.entries(TIPOS).map(([k,v])=>{
      const n=gfd(db,fid,v.col).length;
      return`<button data-tab="${k}" class="tab${tab===k?' act':''}" style="display:flex;align-items:center;gap:6px">
        <span>${v.icon}</span><span>${v.label}</span>
        ${n>0?`<span style="background:${tab===k?'rgba(184,146,46,.3)':'var(--border2)'};color:${tab===k?'var(--gold-d)':'var(--text3)'};font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700">${n}</span>`:''}
      </button>`;
    }).join('')}
  </div>

  <!-- Busca + Ordenação A-Z -->
  <div class="card" style="padding:12px 16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:180px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="f-busca" placeholder="Buscar ${t.label.toLowerCase()}..." value="${esc(S.fb||'')}" style="border:none;background:transparent;box-shadow:none;padding:0;font-size:13px;flex:1;outline:none"/>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:11px;color:var(--text3)">Ordenar:</span>
        <button class="btn btn-sm${(S.op||'az')==='az'?' btn-p':''}" id="btn-ord-az" style="padding:4px 10px;font-size:11px">A→Z</button>
        <button class="btn btn-sm${S.op==='za'?' btn-p':''}" id="btn-ord-za" style="padding:4px 10px;font-size:11px">Z→A</button>
      </div>
      <div style="font-size:11px;color:var(--text3);white-space:nowrap">${lista.length} registro${lista.length!==1?'s':''}</div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="card" style="padding:0;overflow:hidden">
    ${lista.length===0
      ?`<div class="empty">${t.icon} Nenhum registro em ${t.label}.<br><br>Clique em <strong>+ Novo Cadastro</strong> para adicionar.</div>`
      :`<table>
        <thead><tr>${cols.map(c=>`<th>${c.l}</th>`).join('')}<th style="width:90px"></th></tr></thead>
        <tbody>${lista.map(i=>`<tr>
          ${cols.map(c=>`<td data-label="${c.l}">${c.b?bdg(i[c.k]):esc(i[c.k]||'—')}</td>`).join('')}

            <button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="${t.col}" title="Excluir">✕</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table>`
    }
  </div></div>`;
}
