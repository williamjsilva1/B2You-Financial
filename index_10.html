  /* SALVAR MODAL */
  (function attachSave(){
    const btn=document.getElementById('modal-save');
    if(!btn)return;
    btn.onclick=null;
    btn.onclick=function(e){
      e.preventDefault();e.stopPropagation();
      const m=S.modal,eid=S.eid,fid=S.fid;
      if(!m)return;

      // Coleta dados — isolado para não travar se collectForm falhar
      let data={};
      try{ data=collectForm()||{}; }
      catch(err){ console.error('[Save] collectForm erro:',err); }

      // Validações que mantêm o modal aberto
      if(m==='filial'&&(!data||!data.nome)){alert('Informe o nome da filial.');return;}
      if(m==='usuario'){
        if(!data.nome){alert('Informe o nome.');return;}
        if(!data.email){alert('Informe o email.');return;}
        if(!eid&&!data.senha){alert('Informe a senha.');return;}
        if(!eid&&gus().find(u=>(u.email||'').toLowerCase()===data.email)){alert('Email já cadastrado.');return;}
      }
      if(m==='plano'&&(!data.codigo||!data.nome)){alert('Preencha código e nome.');return;}

      // Salva — qualquer erro é capturado para garantir que o modal feche
      try{
        if(m==='filial'){
          const fs=gfil();
          if(eid){const i=fs.findIndex(f=>f.id===eid);if(i>=0)fs[i]={...fs[i],nome:data.nome,modulos:data.modulos};}
          else fs.push({id:uid(),nome:data.nome,modulos:data.modulos||[]});
          sfil(fs);
        } else if(m==='usuario'){
          const us=gus();
          if(eid){
            const i=us.findIndex(u=>u.id===eid);
            if(i>=0){const sf=data.senha||us[i].senha||'';us[i]={...us[i],...data,senha:sf};}
          } else {
            // Usuário criado pelo admin via painel = aprovado automaticamente
            us.push({id:uid(),...data,statusAcesso:'aprovado'});
          }
          sus(us);
        } else if(m==='plano'){
          const pc=gpc();
          if(eid){const i=pc.findIndex(p=>p.id===eid);if(i>=0)pc[i]={...pc[i],...data};}
          else pc.push({id:uid(),...data});
          spc(pc);
        } else if(m==='said'){
          const db2=ld();
          let saids=gfd(db2,fid,'said'),prods=gfd(db2,fid,'prod');
          if(eid){
            const old=saids.find(s=>s.id===eid);
            if(old){const pi=prods.findIndex(p=>p.id===old.prodId);if(pi>=0)prods[pi].quantidade=Number(prods[pi].quantidade||0)+Number(old.quantidade||0);}
            saids=saids.map(s=>s.id===eid?{...s,...data}:s);
          } else saids.push({id:uid(),...data});
          const pi=prods.findIndex(p=>p.id===data.prodId);
          if(pi>=0){
            const ns=Math.max(0,Number(prods[pi].quantidade||0)-Number(data.quantidade||0));
            prods[pi].quantidade=ns;
            const uc=gfd(db2,fid,'cont').filter(c=>c.prodId===data.prodId&&c.status==='Aprovado').sort((a,b)=>b.data>a.data?1:-1)[0];
            prods[pi]._divergencia=!!(uc&&Math.abs(ns-Number(uc.quantidadeContada||0))>0);
            if(prods[pi]._divergencia)prods[pi]._divergenciaDiff=ns-Number(uc.quantidadeContada);
            else delete prods[pi]._divergencia;
          }
          sfd(db2,fid,'said',saids);sfd(db2,fid,'prod',prods);
        _cache=db2;_cacheLoaded=true;localStorage.setItem(K,JSON.stringify(db2));
        _syncCol(fid,'said',saids);_syncCol(fid,'prod',prods);
        } else if(m==='escala'){
          saveRec('escala',data,eid);
          if(!eid&&Number(data.valor)>0){
            const db2=ld(),cp=gfd(db2,fid,'cp');
            cp.push({id:uid(),nome:data.nome||data.colaboradorNome,categoria:'Colaborador',
              referencia:('Escala '+fmtD(data.dataTrabalho)+' — '+(data.funcao||'')).trim().replace(/—\s*$/,''),
              valor:Number(data.valor),vencimento:data.vencimentoCP,
              status:'Pendente',parcelamento:'À vista',origem:'escala',observacoes:data.observacoes||''});
            sfd(db2,fid,'cp',cp);sv(db2);
          }
        } else if(m==='rh_ferias'){
          const db2=ld();
          let ferias=gfd(db2,fid,'rh_ferias');
          const novoId=uid();
          if(eid){ferias=ferias.map(f=>f.id===eid?{...f,...data}:f);}
          else ferias.push({id:novoId,...data});
          const idFer=eid||novoId;
          const fer=ferias.find(f=>f.id===idFer);
          if(fer&&data.status==='Aprovada'&&!fer.cpId){
            const cpId=uid(),cp=gfd(db2,fid,'cp');
            cp.push({id:cpId,nome:fer.nomeFuncionario,categoria:'Férias',
              referencia:'Férias '+fmtD(fer.dataInicio)+' a '+fmtD(fer.dataFim)+' ('+(fer.dias||0)+' dias)',
              planoConta:'Folha de Pagamento',valor:Number(fer.valor||0),
              vencimento:fer.dataInicio||td(),dataPagamento:'',parcelamento:'À vista',status:'Pendente',
              origem:'rh_ferias',origemId:idFer});
            ferias=ferias.map(f=>f.id===idFer?{...f,cpId}:f);
            sfd(db2,fid,'cp',cp);
          }
          sfd(db2,fid,'rh_ferias',ferias);sv(db2);
        } else if(m==='pousada'){
          salvarPousada(data,eid);
        } else if(m==='voo'){
          salvarVoo(data,eid);
        } else if(m==='cad'){
          // Cadastro unificado — roteia para a coleção correta pelo tipo selecionado
          const colCad=data._tipo||S.form._tipo||'forn';
          // Remove _tipo antes de salvar (campo interno de controle de UI)
          const {_tipo,...dadosCad}=data;
          saveRec(colCad,dadosCad,eid);
          S.tab=colCad; // exibe a aba correta após salvar
        } else if(m==='pedidos'&&!eid){
          // Novo pedido: gera número sequencial
          const db2=ld(),existPeds=gfd(db2,fid,'pedidos');
          const maxNum=existPeds.reduce((mx,p)=>Math.max(mx,Number(p.numPedido||0)),0);
          data.numPedido=maxNum+1;
          saveRec(m,data,eid);
        } else if(m==='cp'&&!eid){
          // CP — verifica parcelamento no momento do save (lê DOM diretamente)
          const fParcEl=document.getElementById('f-parc');
          const nParcelas=fParcEl?Number(fParcEl.value)||1:Number(data.parcelas||1);
          const fPeriodEl=document.getElementById('f-period');
          const nPeriodicidade=fPeriodEl?Number(fPeriodEl.value)||30:Number(data.periodicidade||30);

          if(nParcelas>1){
            // Gera uma entrada por parcela com valor e vencimento corretos
            const n=nParcelas;
            const d=nPeriodicidade;
            const valTotal=parseFloat(Number(data.valor||0).toFixed(2));
            const valParcela=parseFloat((valTotal/n).toFixed(2));
            const baseDate=data.vencimento||td();
            const db3=ld(),fid3=S.fid;
            const cpList=gfd(db3,fid3,'cp');
            const grupoId=uid();
            // Garante leitura direta do DOM para categoria e plano — evita perda por re-render
            const catSalva=gv('f-modal-cat')||data.categoria||'';
            const pcIdSalvo=gv('f-pc')||data.planoContaId||'';
            const pc3=gpc();
            const pcNomeSalvo=pcIdSalvo?(pc3.find(p=>p.id===pcIdSalvo)?.nome||data.planoConta||''):data.planoConta||'';
            for(let i=0;i<n;i++){
              const dt=new Date(baseDate+'T12:00:00');
              dt.setDate(dt.getDate()+d*i);
              const venc=dt.toISOString().slice(0,10);
              const valorParcela=i===n-1
                ?parseFloat((valTotal-(valParcela*(n-1))).toFixed(2))
                :valParcela;
              cpList.push({
                id:uid(),
                nome:data.nome,
                categoria:catSalva,
                planoContaId:pcIdSalvo,
                planoConta:pcNomeSalvo,
                valor:valorParcela,
                referencia:`${data.referencia||data.nome||''} (${i+1}/${n})`,
                vencimento:venc,
                dataPagamento:'',
                parcelamento:`${n}x`,
                parcelas:n,
                numeroParcela:i+1,
                totalParcelamento:valTotal,
                grupoParcelamento:grupoId,
                periodicidade:d,
                status:'Pendente',
                anexo:data.anexo||'',
                anexoNome:data.anexoNome||'',
                foto:data.foto||'',
              });
            }
            sfd(db3,fid3,'cp',cpList);
            _cache=db3;_cacheLoaded=true;localStorage.setItem(K,JSON.stringify(db3));
            _syncCol(fid3,'cp',cpList);
            addLog('Criou','Contas a Pagar',data.nome||'',`${n}x de ${fmt(valParcela)} = ${fmt(valTotal)}`);
          } else {
            // À vista — save normal com parcelamento = 'À vista'
            saveRec('cp',{...data,parcelamento:'À vista',parcelas:1},eid);
          }
        } else if(m==='com'){
          // Comissão — save direto
          saveRec('com',data,eid);
        } else {
          // Genérico: rh_func, rh_folha, rh_ponto, rh_deslig, cr, prod, cp edição, etc.
          saveRec(m,data,eid);
        }
      } catch(err){
        console.error('[Save] Erro ao salvar',m,':',err);
      }

      // SEMPRE fecha o modal e redesenha — independente de erros
      S.modal=null;S.eid=null;S.form={};
      render();
    };
  })();

    bindMasks();
}

/* ═══════════════════════════════════════════════
   PDF HELPERS
═══════════════════════════════════════════════ */
function pdfAddHeader(doc,titulo,subtitulo,landscape){
  const PW=landscape?297:210;
  doc.setFillColor(13,35,56);doc.rect(0,0,PW,16,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');
  const tit=String(titulo).slice(0,60);
  doc.text(tit,18,10);
  if(subtitulo){doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text(String(subtitulo).slice(0,80),PW-18,10,{align:'right'});}
  doc.setTextColor(40,40,40);
  return 26;
}
function pdfTable(doc,y,headers,rows,colWidths,landscape){
  const ML=18;
  const TW=colWidths.reduce((a,b)=>a+b,0);
  const HEAD_H=8;
  const pageH=landscape?210:297;
  const FS=6.5; // font size para células
  const LINE_H=FS*0.352778+1.4; // altura por linha de texto
  const PAD=2; // padding interno célula

  // Cabeçalho
  doc.setFillColor(26,47,74);doc.rect(ML,y,TW,HEAD_H,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
  let x=ML;
  headers.forEach((h,i)=>{
    const lines=doc.splitTextToSize(String(h||''),colWidths[i]-PAD*2);
    doc.text(lines[0],x+PAD,y+5.5);
    x+=colWidths[i];
  });
  y+=HEAD_H;

  // Linhas de dados
  doc.setFont('helvetica','normal');
  rows.forEach((row,ri)=>{
    // Calcula altura necessária para esta linha (célula com mais linhas determina)
    doc.setFontSize(FS);
    const cellLines=row.map((cell,i)=>{
      const txt=String(cell===undefined||cell===null?'—':cell);
      return doc.splitTextToSize(txt,colWidths[i]-PAD*2);
    });
    const maxLines=Math.max(...cellLines.map(l=>l.length),1);
    const rowH=Math.max(maxLines*LINE_H+PAD*2,7);

    // Quebra de página
    if(y+rowH>pageH-14){
      doc.addPage();
      y=pdfAddHeader(doc,'(continuação)','',landscape);
      // Redesenha cabeçalho
      doc.setFillColor(26,47,74);doc.rect(ML,y,TW,HEAD_H,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
      let hx=ML;
      headers.forEach((h,i)=>{doc.text(String(h||''),hx+PAD,y+5.5);hx+=colWidths[i];});
      y+=HEAD_H;
      doc.setFont('helvetica','normal');doc.setFontSize(FS);
    }

    // Fundo alternado
    const bgR=ri%2===0?245:255,bgG=ri%2===0?248:255,bgB=ri%2===0?252:255;
    doc.setFillColor(bgR,bgG,bgB);
    doc.rect(ML,y,TW,rowH,'F');
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.1);
    doc.rect(ML,y,TW,rowH);

    // Texto de cada célula (com wrap)
    doc.setTextColor(40,40,40);doc.setFontSize(FS);
    x=ML;
    cellLines.forEach((lines,i)=>{
      // Desenha cada linha de texto dentro da célula
      lines.forEach((ln,li)=>{
        doc.text(ln,x+PAD,y+PAD+LINE_H*(li+0.8));
      });
      // Linha vertical separadora entre colunas
      if(i<colWidths.length-1){
        doc.setDrawColor(230,230,230);doc.setLineWidth(0.05);
        doc.line(x+colWidths[i],y,x+colWidths[i],y+rowH);
      }
      x+=colWidths[i];
    });

    y+=rowH;
  });
  return y+4;
}

/* ── PDF genérico com título, subtítulo, tabela e rodapé ── */
function pdfRelatorio(titulo,subtitulo,headers,rows,colWidths,nomeArq){
  const{jsPDF}=window.jspdf;
  const landscape=colWidths.reduce((a,b)=>a+b,0)>170;
  const doc=new jsPDF({orientation:landscape?'landscape':'portrait',unit:'mm',format:'a4'});
  const app=gapp();
  let y=pdfAddHeader(doc,app.nome||'Gestão Financeira',titulo,landscape);
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
  doc.text(titulo,18,y);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,100,100);
  doc.text(subtitulo+' | Gerado em: '+fmtD(td()),18,y+5);
  y+=14;
  pdfTable(doc,y,headers,rows,colWidths,landscape);
  // Rodapé
  const PW=landscape?297:210,PH=landscape?210:297;
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text('Total: '+rows.length+' registros  ·  '+app.nome,PW/2,PH-8,{align:'center'});
  doc.save(nomeArq||'relatorio_'+td()+'.pdf');
}

function gerarPdfCadastros(tab,lista,colsMap){
  const nomes={forn:'Fornecedores',colab:'Colaboradores',prest:'Prestadores',atrac:'Atrações',hosp:'Hóspedes'};
  const nome=nomes[tab]||tab;
  const cols=colsMap[tab]||[];
  if(!cols.length){alert('Nenhuma coluna configurada para este cadastro.');return;}
  const TW=261; // landscape usable width (297-18-18)
  const colW=Math.floor(TW/cols.length);
  const headers=cols.map(c=>c.l);
  const colWidths=cols.map(()=>colW);
  const rows=lista.map(i=>cols.map(c=>String(i[c.k]||'—')));
  pdfRelatorio('Cadastros — '+nome,'Total: '+lista.length+' registros',headers,rows,colWidths,'cadastros_'+tab+'_'+td()+'.pdf');
}

/* ── PDF de Estoque ── */
function gerarPdfEstoque(tab,db,fid){
  const nomes={prod:'Produtos',ent:'Entradas',said:'Saídas/Vendas',cont:'Contagens',pedidos:'Pedidos'};
  const nome=nomes[tab]||tab;
  let headers,rows,colWidths;
  if(tab==='prod'){
    const lista=gfd(db,fid,'prod');
    const saids=gfd(db,fid,'said');
    headers=['Produto','Categoria','Saldo','Saídas','Custo','Venda','Últ. Contagem','Data Ajuste','Motivo do Ajuste'];
    colWidths=[42,26,18,18,22,22,24,22,45];
    rows=lista.map(p=>{
      const totalSaid=saids.filter(s=>s.prodId===p.id).reduce((a,s)=>a+Number(s.quantidade||0),0);
      const aj=p._ajuste;
      return[p.produto||'—',p.categoria||'—',String(p.quantidade||0),String(totalSaid),p.valorCusto?'R$'+Number(p.valorCusto).toFixed(2):'—',p.valorVenda?'R$'+Number(p.valorVenda).toFixed(2):'—',fmtD(p.dataUltimaContagem),aj?fmtD(aj.data):'—',aj?(aj.obs||'Ajustado sem motivo'):'Sem ajuste'];
    });
  } else if(tab==='ent'){
    const lista=gfd(db,fid,'ent');
    headers=['Produto','Qtd','Data','Responsável','Fornecedor/Origem','Status'];
    colWidths=[70,22,28,45,55,22];
    rows=lista.map(i=>[i.prodNome||'—',String(i.quantidade||'—'),fmtD(i.data),i.responsavel||'—',i.pedidoDesc?'Pedido: '+i.pedidoDesc:i.fornecedor||'—',i.status||'—']);
  } else if(tab==='said'){
    const lista=gfd(db,fid,'said');
    headers=['Produto','Qtd Saída','Saldo Ant.','Saldo Novo','Data','Responsável','Motivo'];
    colWidths=[55,22,24,24,28,40,45];
    rows=lista.map(i=>[i.prodNome||'—',String(i.quantidade||'—'),String(i.saldoAnterior||'—'),String(i.novoSaldo||'—'),fmtD(i.data),i.responsavel||'—',i.motivo||'—']);
  } else if(tab==='cont'){
    const lista=gfd(db,fid,'cont');
    headers=['Produto','Qtd Contada','Saldo Sistema','Diferença','Data','Responsável','Status','Obs/Ajuste'];
    colWidths=[45,24,24,22,28,38,22,35];
    const prods=gfd(db,fid,'prod');
    rows=lista.map(i=>{
      const p=prods.find(x=>x.id===i.prodId)||{};
      const diff=Number(i.quantidadeContada||0)-Number(p.quantidade||0);
      const ajusteObs=p._ajuste?.obs||'';
      return[i.prodNome||'—',String(i.quantidadeContada||'—'),String(p.quantidade||'—'),diff===0?'OK':(diff>0?'+':'')+diff,fmtD(i.data),i.responsavel||'—',i.status||'—',ajusteObs||'—'];
    });
  } else {
    alert('Selecione uma aba para gerar o PDF.');return;
  }
  pdfRelatorio('Estoque — '+nome,'Filial: '+S.fid,headers,rows,colWidths,'estoque_'+tab+'_'+td()+'.pdf');
}

/* ═══════════════════════════════════════════════
   GERAÇÃO DE TERMO PDF — VOO BALÃO
═══════════════════════════════════════════════ */
function gerarTermoVoo(passageiros,dataVoo){
  const{jsPDF}=window.jspdf;
  const hoje=fmtD(td());
  const dataExib=fmtD(dataVoo)||hoje;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210,PH=297,ML=18,MR=18,MT=22,TW=210-18-18;

  const pass=(passageiros&&passageiros.length)?passageiros:[{nome:'',cpf:''}];

  pass.forEach((p,idx)=>{
    if(idx>0)doc.addPage();
    let y=MT;

    const para=(text,fs,yy,indent=0,bold=false)=>{
      doc.setFontSize(fs);doc.setFont('helvetica',bold?'bold':'normal');
      const lines=doc.splitTextToSize(text,TW-indent);
      doc.text(lines,ML+indent,yy);
      return yy+lines.length*(fs*0.3528+1.3)+1;
    };

    // Cabeçalho
    doc.setFillColor(13,35,56);
    doc.rect(0,0,PW,14,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('TOPFLY BALONISMO',ML,9);
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    doc.text('Termo de Ciência de Riscos — Voo de Balão',PW-MR,9,{align:'right'});
    doc.setTextColor(40,40,40);

    // Título
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
    const tit='Termo de Ciência dos Riscos Envolvidos na Operação de Balão Sem Certificado de Aeronavegabilidade Padrão ou por um Piloto sem licença de Piloto de Balão Livre';
    const tLines=doc.splitTextToSize(tit,TW);
    doc.text(tLines,ML,y);y+=tLines.length*5+4;
    doc.setDrawColor(26,86,219);doc.setLineWidth(0.5);doc.line(ML,y,PW-MR,y);y+=5;

    // Texto informativo
    doc.setTextColor(40,40,40);
    y=para('A prática de voo realizada em balões livres tripulados pode ser realizada de forma certificada ou desportiva. Nas operações certificadas pela ANAC:',8,y);
    y=para('• as aeronaves possuem certificado de aeronavegabilidade padrão;',8,y,5);
    y=para('• o piloto possui licença de piloto de balão livre, além de habilitação e certificado médico aeronáutico válidos; e',8,y,5);
    y=para('• a empresa que oferece o voo possui Certificado de Operador Aéreo.',8,y,5);y+=2;
    y=para('Na prática desportiva, as aeronaves não são certificadas, não havendo garantia de aeronavegabilidade. Também não existe uma habilitação técnica emitida para a prática e cabe ao desportista a responsabilidade pela segurança da operação. Essa operação é regida pelo Regulamento Brasileiro de Aviação Civil nº 103, emitido pela Anac.',8,y);y+=2;
    y=para('Em caráter temporário, a fim que possa ser permitida a comercialização de voos de balão sem certificado de aeronavegabilidade e por piloto não licenciado em balão livre, a Anac estabeleceu requisitos mínimos de operação na Resolução nº 782, de 30 de outubro de 2025.',8,y);y+=6;

    doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);doc.line(ML,y,PW-MR,y);y+=6;

    // Título Termo de Ciência
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
    doc.text('Termo de Ciência',ML,y);y+=7;

    // Declaração com nome e CPF do passageiro
    const nome=p.nome||'_______________________________';
    const cpf=p.cpf||'___.___.___-__';
    doc.setTextColor(40,40,40);
    y=para(`Eu, ${nome}, CPF nº ${cpf}, passageiro de voo em balão promovido pelo operador TOPFLY BALONISMO, declaro estar ciente de que:`,8.5,y);y+=2;
    y=para('¤  o balão não é de um projeto certificado pela Agência Nacional de Aviação Civil (Anac) e não possui certificado de aeronavegabilidade, o que significa que o projeto do balão não foi verificado pela Anac quanto à segurança de sua operação;',8.5,y,5);
    y=para('¤  o piloto não possui licença de piloto de balão livre (PBL), emitida pela Anac; e',8.5,y,5);
    y=para('as características de operação resultantes das condições expressas acima impõem maiores riscos à operação, uma vez que não há certificação realizada pela Anac conforme padrões internacionais de segurança.',8.5,y,5);y+=2;
    y=para('Por fim, declaro que o operador informou que a operação de balão atende aos requisitos mínimos da Resolução Anac nº 782, de 30 de outubro de 2025.',8.5,y);y+=6;

    doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);doc.line(ML,y,PW-MR,y);y+=6;

    // Direito de imagem
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
    doc.text('Direito de uso de imagem:',ML,y);y+=5;
    doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
    y=para('Autorizo que imagens e vídeos captados durante a realização do voo, que contenham minha imagem, sejam utilizados para fins promocionais, institucionais ou publicitários da empresa organizadora, em qualquer meio de comunicação, sem ônus ou compensações futuras.',8.5,y);y+=4;

    // Checkboxes
    doc.setDrawColor(60,60,60);doc.setLineWidth(0.4);
    doc.rect(ML,y-3.5,4,4);
    doc.setFontSize(8);doc.text('Autorizo o uso da minha imagem para os fins acima descritos.',ML+6,y);y+=6;
    doc.rect(ML,y-3.5,4,4);
    doc.text('Não autorizo o uso da minha imagem.',ML+6,y);y+=8;

    doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);doc.line(ML,y,PW-MR,y);y+=7;

    // Declaração final e data
    doc.setFontSize(8.5);doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');
    doc.text('Declaro que li, compreendi e concordo com todos os termos acima.',ML,y);y+=6;
    doc.text(`Boituva, ${hoje}:`,ML,y);y+=11;

    // Linha de assinatura
    doc.setDrawColor(80,80,80);doc.setLineWidth(0.4);doc.line(ML,y,ML+110,y);y+=4;
    doc.setFontSize(7.5);doc.setTextColor(100,100,100);
    doc.text(`Assinatura: ${nome}`,ML,y);

    // Rodapé
    doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text(`Passageiro ${idx+1} de ${pass.length}  ·  Voo em ${dataExib}  ·  TOPFLY BALONISMO`,PW/2,PH-8,{align:'center'});
  });

  doc.save(`Termo_Voo_${(dataVoo||td()).replace(/-/g,'')}.pdf`);
}

// INICIALIZAÇÃO COM FIREBASE
// ══════════════════════════════════════════════════
(async function init() {
  // Tela de carregamento
  const root=document.getElementById('root');
  // Mostra UI do localStorage imediatamente enquanto conecta Firebase
  const cachedDb=JSON.parse(localStorage.getItem(K)||"{}");
  const cachedApp=cachedDb["__app__"]||{nome:"Gestão Financeira"};
  root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#0f1929">
    <div style="width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;margin-bottom:4px">
      ${((cachedApp.nome||"GF").replace(/[^A-Za-z0-9]/g,"").slice(0,2)||"GF").toUpperCase()}
    </div>
    <div style="font-size:16px;font-weight:700;color:#e2e8f0">${cachedApp.nome||"Gestão Financeira"}</div>
    <div style="width:120px;height:3px;background:#1a2740;border-radius:3px;overflow:hidden">
      <div style="width:40%;height:100%;background:linear-gradient(90deg,#c9a84c,#f5d98b,#c9a84c);border-radius:3px;animation:loadbar 1.2s ease-in-out infinite"></div>
    </div>
    <p style="color:#475569;font-size:12px">Conectando...</p>
  </div>
  <style>@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}</style>`;

  // Inicializa Firebase
  const ok=initFirebase();

  if(ok){
    // ── CARREGA CONFIG DO SISTEMA ANTES DO LOGIN ──
    // Garante que QUALQUER dispositivo (mobile/web/novo) veja
    // o nome correto do sistema na tela de login
    try{
      const appSnap=await _fbDb.doc(_fsGlobalPath('__app__')).get().catch(()=>null);
      if(appSnap&&appSnap.exists){
        const d=appSnap.data();
        if(d?.data){
          const db=JSON.parse(localStorage.getItem(K)||'{}');
          db['__app__']=d.data;
          _cache=db;_cacheLoaded=true;
          localStorage.setItem(K,JSON.stringify(db));
          document.title=d.data.nome||'Gestão Financeira';
          console.info('[Firebase] ✅ Config carregada antes do login:',d.data.nome);
          // Re-renderiza a tela de loading com o nome correto
          const logoIc=((d.data.nome||'GF').replace(/[^A-Za-z0-9]/g,'').slice(0,2)||'GF').toUpperCase();
          const root2=document.getElementById('root');
          if(root2&&!S.ok){
            root2.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#0f1929">
              <div style="width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700">${logoIc}</div>
              <div style="font-size:16px;font-weight:700;color:#e2e8f0">${d.data.nome}</div>
              <div style="width:120px;height:3px;background:#1a2740;border-radius:3px;overflow:hidden"><div style="width:40%;height:100%;background:linear-gradient(90deg,#c9a84c,#f5d98b,#c9a84c);border-radius:3px;animation:loadbar 1.2s ease-in-out infinite"></div></div>
              <p style="color:#475569;font-size:12px">Conectando...</p>
            </div>`;
          }
        }
      }
    }catch(e){
      console.warn('[Firebase] Config pré-login:',e?.code||e?.message);
    }

    // Escuta estado de autenticação — Firebase persiste sessão automaticamente
    _fbAuth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        _fbUid=fbUser.uid;

        // FASE 1: tenta carregar dados do novo caminho compartilhado
        try{ await _fbLoadGlobal(); }
        catch(e){ console.warn("[Firebase] Usando localStorage:",e.code||e.message); }

        // FASE 1b: se não tem dados no novo caminho, tenta migrar do caminho antigo
        const temDados=gfil().some(f=>f.id!=='f1'||f.nome!=='Filial Principal');
        if(!temDados){
          console.info('[Firebase] Dados não encontrados no novo caminho — tentando migração...');
          const migrou=await _migrarDadosAntigos(fbUser.uid);
          if(migrou) await _fbLoadGlobal(); // recarrega após migração
          else {
            // Tenta upload do localStorage para o Firestore
            await _uploadLocalParaFirestore();
            await _fbLoadGlobal();
          }
        }

        // Registra usuário e mostra app imediatamente
        const u=await _registrarUsuario(fbUser);
        S.ok=true;S.user=u;
        render();

        // FASE 2: carrega dados das filiais em background
        _fbLoadFiliais(()=>{ if(S.ok) render(); })
          .catch(e=>console.warn("[FS] filiais:",e.message));

        // Listeners em tempo real
        _startRealtimeListeners();
      }else{
        _stopRealtimeListeners();
        _fbUid=null;_cache={};_cacheLoaded=false;
        S.ok=false;S.user=null;S._authTab="login";
        render();
      }
    });
  }else{
    // Firebase indisponível — modo offline com localStorage
    console.warn('[Firebase] Modo offline ativo');
    render();
  }
})();
</script>
