    <button class="tab${tab==='ent'?' act':''}" data-tab="ent">Entradas${busca&&tab==='ent'?` <span style="font-size:10px;font-weight:700;color:var(--gold)">(${ents.length})</span>`:''}</button>
    <button class="tab${tab==='said'?' act':''}" data-tab="said">Saídas/Vendas${busca&&tab==='said'?` <span style="font-size:10px;font-weight:700;color:var(--gold)">(${saids.length})</span>`:''}</button>
    <button class="tab${tab==='cont'?' act':''}" data-tab="cont">Contagens${busca&&tab==='cont'?` <span style="font-size:10px;font-weight:700;color:var(--gold)">(${conts.length})</span>`:''}</button>
    <button class="tab${tab==='pedidos'?' act':''}" data-tab="pedidos">📋 Pedidos de Compra</button>
  </div>
  <div class="card">
  ${tab==='prod'?prods.length===0?`<div class="empty">${busca?`Nenhum produto para "<strong>${esc(busca)}</strong>".`:'Nenhum produto.'}</div>`:`
  <table><thead><tr><th>Produto</th><th>Categoria</th><th>Saldo</th><th>Custo</th><th>Venda</th><th>Última Contagem</th><th></th></tr></thead><tbody>
  ${prods.map(i=>`<tr><td style="font-weight:600">${esc(i.produto)}</td><td>${esc(i.categoria||'—')}</td><td style="font-weight:700;color:var(--blue-t)">${i.quantidade||0}</td><td>${i.valorCusto?fmt(i.valorCusto):'—'}</td><td>${i.valorVenda?fmt(i.valorVenda):'—'}</td><td>${fmtD(i.dataUltimaContagem)}</td>
  <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="prod">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="prod">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`
  :tab==='ent'?ents.length===0?`<div class="empty">${busca?`Nenhuma entrada para "<strong>${esc(busca)}</strong>".`:'Nenhuma entrada.'}</div>`:`
  <table><thead><tr><th>Produto</th><th>Qtd</th><th>Data</th><th>Responsável</th><th>Fornecedor/Origem</th><th>Status</th><th></th></tr></thead><tbody>
  ${ents.map(i=>`<tr><td style="font-weight:600">${esc(i.prodNome||'—')}</td><td>${i.quantidade}</td><td>${fmtD(i.data)}</td><td>${esc(i.responsavel||'—')}</td><td>${i.pedidoDesc?`<span class="bdg bgr">Pedido: ${esc(i.pedidoDesc)}</span>`:esc(i.fornecedor||'—')}</td><td>${bdg(i.status||'Pendente')}</td>
  <td><div class="ar">${i.status!=='Aprovado'?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="ent">✓ Confirmar</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="ent">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="ent">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`
  :tab==='pedidos'?(()=>{
    const pedidos=gfd(db,fid,'pedidos');
    const sfPed=S.fs||'';
    const listaPed=sfPed?pedidos.filter(p=>p.status===sfPed):pedidos;
    const STATUS_PED=[['','Todos'],['Rascunho','Rascunho'],['Enviado','Enviado'],['Aprovado','Aprovado'],['Cancelado','Cancelado']];
    const tots={R:pedidos.filter(p=>p.status==='Rascunho').length,E:pedidos.filter(p=>p.status==='Enviado').length,A:pedidos.filter(p=>p.status==='Aprovado').length,C:pedidos.filter(p=>p.status==='Cancelado').length};
    return`
    <!-- Sumário de status -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;border-top:3px solid var(--text3)">
        <div style="font-size:20px;font-weight:800;color:var(--text2)">${tots.R}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px">Rascunho</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;border-top:3px solid var(--blue)">
        <div style="font-size:20px;font-weight:800;color:var(--blue-t)">${tots.E}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px">Enviado</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;border-top:3px solid var(--green)">
        <div style="font-size:20px;font-weight:800;color:var(--green-t)">${tots.A}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px">Aprovado</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;border-top:3px solid var(--red)">
        <div style="font-size:20px;font-weight:800;color:var(--red-t)">${tots.C}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px">Cancelado</div>
      </div>
    </div>
    <!-- Filtro por status -->
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      ${STATUS_PED.map(([v,l])=>`<button data-filter-status="${v}" class="btn btn-sm${sfPed===v?' btn-p':''}">${l}</button>`).join('')}
      <button class="btn btn-sm btn-p" id="btn-new" style="display:none"></button>
    </div>
    ${listaPed.length===0?`<div class="empty">Nenhum pedido${sfPed?' com status '+sfPed:''}.</div>`:`
    <table>
      <thead><tr><th>Nº Pedido</th><th>Fornecedor</th><th>Data</th><th>Itens</th><th>Total</th><th>Status</th><th style="width:200px"></th></tr></thead>
      <tbody>
      ${listaPed.map(p=>{
        const nItens=(p.itens||[]).length;
        const total=(p.itens||[]).reduce((s,it)=>s+Number(it.qtd||0)*Number(it.valorUnit||0),0);
        const podeAprovar=p.status==='Enviado'||p.status==='Rascunho';
        const podeEnviar=p.status==='Rascunho';
        const podeCancelar=p.status!=='Cancelado'&&p.status!=='Aprovado';
        return`<tr>
          <td style="font-family:monospace;font-size:11px;color:var(--text3)">#${(p.numPedido||p.id.slice(-4)).toString().padStart(4,'0')}</td>
          <td style="font-weight:600">${esc(p.fornecedor||'—')}</td>
          <td>${fmtD(p.data)}</td>
          <td>${nItens} item${nItens!==1?'s':''}</td>
          <td style="font-weight:700;color:var(--gold)">${total>0?fmt(total):'—'}</td>
          <td>${bdg(p.status||'Rascunho')}</td>
          <td><div class="ar">
            ${podeEnviar?`<button class="btn btn-sm" data-ped-enviar="${p.id}" title="Marcar como Enviado" style="color:var(--blue-t);border-color:var(--blue)">📤 Enviar</button>`:''}
            ${podeAprovar?`<button class="btn btn-sm btn-s" data-ped-aprovar="${p.id}" title="Aprovar — cria Entradas + Contas a Pagar">✓ Aprovar</button>`:''}
            ${podeCancelar?`<button class="btn btn-sm btn-d" data-ped-cancelar="${p.id}" title="Cancelar pedido">✕ Cancelar</button>`:''}
            <button class="btn btn-sm" id="btn-pdf-pedido-${p.id}" data-ped-pdf="${p.id}" title="Gerar PDF">📄</button>
            <button class="btn btn-sm" data-ed="${p.id}" data-col="pedidos">✏</button>
            <button class="btn btn-sm btn-d" data-dl="${p.id}" data-col="pedidos" title="Excluir pedido">🗑</button>
          </div></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`}`;
  })()
  :tab==='said'?(()=>{
    const saids=gfd(db,fid,'said');
    // Verifica divergências: saldo produto - saídas vs última contagem
    const alertas=[];
    prods.forEach(p=>{
      const totalSaid=saids.filter(s=>s.prodId===p.id).reduce((a,s)=>a+Number(s.quantidade||0),0);
      const saldoCalc=Number(p.quantidade||0)-totalSaid;
      const ultCont=conts.filter(c=>c.prodId===p.id&&c.status==='Aprovado').sort((a,b)=>b.data>a.data?1:-1)[0];
      if(ultCont&&Math.abs(saldoCalc-Number(ultCont.quantidadeContada||0))>0){
        alertas.push({prod:p.produto,saldoCalc,contagem:Number(ultCont.quantidadeContada),diff:saldoCalc-Number(ultCont.quantidadeContada)});
      }
    });
    return(alertas.length>0?`<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:8px">⚠ DIVERGÊNCIA DE ESTOQUE DETECTADA</div>
      ${alertas.map(a=>`<div style="font-size:12px;color:var(--text2);margin-bottom:4px">
        <strong>${esc(a.prod)}</strong>: Saldo calculado <strong style="color:var(--amber-t)">${a.saldoCalc}</strong> × Última contagem <strong style="color:var(--blue-t)">${a.contagem}</strong>
        — Diferença: <strong style="color:#f87171">${a.diff>0?'+':''}${a.diff}</strong>
        <button class="btn btn-sm" style="margin-left:8px" data-ajuste="${esc(a.prod)}">Ajustar manualmente</button>
      </div>`).join('')}
    </div>`:'')
    +(saids.length===0?`<div class="empty">Nenhuma saída registrada.</div>`:`
    <table><thead><tr><th>Produto</th><th>Qtd Saída</th><th>Data</th><th>Responsável</th><th>Motivo</th><th>Obs</th><th></th></tr></thead><tbody>
    ${saids.map(i=>`<tr>
      <td>${esc(i.prodNome||'—')}</td>
      <td style="color:#f87171;font-weight:700">-${i.quantidade}</td>
      <td>${fmtD(i.data)}</td>
      <td>${esc(i.responsavel||'—')}</td>
      <td>${esc(i.motivo||'—')}</td>
      <td>${esc(i.observacoes||'—')}</td>
      <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="said">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="said">✕</button></div></td>
    </tr>`).join('')}</tbody></table>`);
  })()
  :conts.length===0?`<div class="empty">Nenhuma contagem.</div>`:`
  <table><thead><tr><th>Produto</th><th>Qtd Contada</th><th>Data</th><th>Responsável</th><th>Status</th><th></th></tr></thead><tbody>
  ${conts.map(i=>`<tr><td>${esc(i.prodNome||'—')}</td><td>${i.quantidadeContada}</td><td>${fmtD(i.data)}</td><td>${esc(i.responsavel||'—')}</td><td>${bdg(i.status||'Pendente')}</td>
  <td><div class="ar">${i.status!=='Aprovado'?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="cont">✓</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="cont">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="cont">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`}
  </div></div>`;
}

/* ── AGENDAS (Pousadas + Balão) ── */
function pgAgendas(db,fid,fil){
  const hab=gfm(fil);
  if(!S.op){
    const cards=[
      {sub:'pousada',mod:'agendas-pousada',ic:'🏡',t:'Pousadas',d:'Reservas, hóspedes, check-in e check-out.'},
      {sub:'voo',mod:'agendas-voo',ic:'🎈',t:'Balão',d:'Voos, pilotos, passageiros e rotas.'},
    ].filter(c=>hab.includes(c.mod));
    if(cards.length===0)return`<div class="page"><div class="ph"><div><div class="pt">Agendas</div><div class="ps">${esc(fil.nome)}</div></div></div><div class="card"><div class="empty">Nenhuma agenda habilitada para esta filial.</div></div></div>`;
    return`<div class="page"><div class="ph"><div><div class="pt">Agendas</div><div class="ps">${esc(fil.nome)}</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">${cards.map(c=>`<div class="opc" data-op="${c.sub}"><h3>${c.ic} ${c.t}</h3><p>${c.d}</p></div>`).join('')}</div></div>`;
  }
  const back=`<button class="btn" id="btn-back" style="margin-bottom:14px">← Voltar</button>`;
  if(S.op==='pousada'){
    let lista=gfd(db,fid,'pousada');
    return`<div class="page">${back}
    <div class="ph"><div><div class="pt">Pousadas</div><div class="ps">${esc(fil.nome)}</div></div><button class="btn btn-p" id="btn-new">+ Nova Reserva</button></div>
    <div class="card">${lista.length===0?`<div class="empty">Nenhuma reserva.</div>`:`
    <table><thead><tr><th>Hóspede</th><th>Acomodação</th><th>Check-in</th><th>Check-out</th><th>Dias</th><th>Valor</th><th>Saldo</th><th>Vendedor</th><th>Status</th><th></th></tr></thead><tbody>
    ${lista.map(i=>`<tr><td>${esc(i.nomeHospede||'—')}</td><td>${esc(i.acomodacao||'—')}</td><td>${fmtD(i.checkIn)} ${esc(i.checkInHora||'')}</td><td>${fmtD(i.checkOut)} ${esc(i.checkOutHora||'')}</td><td>${i.diasHospedagem||'—'}</td><td style="color:var(--green-t);font-weight:700">${fmt(i.valorReserva)}</td><td style="color:var(--amber-t)">${fmt(i.valorTotal)}</td><td>${esc(i.vendedorNome||'—')}</td><td>${bdg(i.status||'Pendente')}</td>
    <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="pousada">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="pousada">✕</button></div></td>
    </tr>`).join('')}</tbody></table>`}</div></div>`;
  }
  if(S.op==='voo'){
    let lista=gfd(db,fid,'voo');
    return`<div class="page">${back}
    <div class="ph"><div><div class="pt">Balão</div><div class="ps">${esc(fil.nome)}</div></div><button class="btn btn-p" id="btn-new">+ Novo Voo</button></div>
    <div class="card">${lista.length===0?`<div class="empty">Nenhum voo.</div>`:`
    <table><thead><tr><th>Piloto</th><th>Prefixo</th><th>Vendedor</th><th>Data</th><th>Decolagem</th><th>Pouso</th><th>Pass.</th><th>Valor Total</th><th>Status</th><th>Termo</th><th></th></tr></thead><tbody>
    ${lista.map(i=>`<tr><td>${esc(i.piloto)}</td><td>${esc(i.prefixo||'—')}</td><td>${esc(i.vendedorNome||'—')}</td><td>${fmtD(i.dataVoo)} ${esc(i.horaVoo||'')}</td><td>${esc(i.decolagem||'—')}</td><td>${esc(i.pouso||'—')}</td><td>${(i.passageiros||[]).length}</td><td style="color:var(--green-t);font-weight:700">${fmt(i.valorTotal)}</td><td>${bdg(i.status||'Agendado')}</td>
    <td><div class="ar" style="gap:4px">
      ${i.termoGerado
        ?`<a href="${i.termoGerado}" download="Termo_Voo_${esc(i.piloto||'')}_${(i.dataVoo||'').replace(/-/g,'')}.pdf" class="btn btn-sm btn-s" title="Baixar Termo Gerado (${fmtD(i.termoDataGeracao||i.dataVoo)})">📄 Termo</a>`
        :`<button class="btn btn-sm" title="Termo disponível após status Agendado" disabled style="opacity:.45;cursor:not-allowed">📄 Termo</button>`
      }
      <label class="btn btn-sm" title="Anexar Termo Assinado (PDF)" style="cursor:pointer">📎<input type="file" class="inp-termo-upload" data-voo="${i.id}" accept=".pdf" style="display:none"/></label>
      ${i.termoAnexo?`<a href="${i.termoAnexo}" download="Termo_Assinado_${esc(i.piloto||'')}.pdf" class="btn btn-sm" title="Baixar Termo Assinado" style="color:var(--green-t)">✅ Assinado</a>`:''}
    </div></td>
    <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="voo">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="voo">✕</button></div></td>
    </tr>`).join('')}</tbody></table>`}</div></div>`;
  }
  return`<div class="page">${back}<div class="empty">Selecione uma agenda.</div></div>`;
}


/* ── ESCALA DE TRABALHO ── */

    <div class="fr">

      <span style="margin-left:auto;font-size:13px;color:var(--text2)">Total: <strong style="color:var(--amber-t)">${fmt(tot)}</strong></span>

    <td>${esc(i.funcao||'—')}</td>

/* ── OPERACIONAL ── */
function pgOp(db,fid,fil){
  const docs=gfd(db,fid,'docs');
  // Folders: stored as docs with type='folder'
  const folders=docs.filter(d=>d.type==='folder').sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  const files=docs.filter(d=>d.type!=='folder');
  const selFolder=S.fc||'';
  const listaFiles=selFolder?files.filter(d=>d.pastaId===selFolder):files;
  const folderAtual=folders.find(f=>f.id===selFolder);

  return`<div class="page">
  <div class="ph">
    <div>
      <div class="pt">Documentos</div>
      <div class="ps">${esc(fil.nome)}${folderAtual?` · 📁 ${esc(folderAtual.nome)}`:''}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${selFolder?`
        <button class="btn btn-sm" id="btn-doc-back">← Voltar</button>
        <button class="btn btn-sm" id="btn-doc-rename" data-id="${selFolder}">✏ Renomear</button>
        <button class="btn btn-sm btn-d" id="btn-doc-del-folder" data-id="${selFolder}">🗑 Excluir Pasta</button>
        <label class="btn btn-p" style="cursor:pointer;display:flex;align-items:center;gap:6px" title="Adicionar documentos a esta pasta">
          ➕ Adicionar Documentos
          <input type="file" id="inp-doc-upload" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.txt" multiple style="display:none"/>
        </label>`:`
        <button class="btn btn-sm btn-p" id="btn-doc-new-folder">📁 Nova Pasta</button>`
      }
    </div>
  </div>

  ${!selFolder?`
  <!-- GRID DE PASTAS -->
  <div style="margin-bottom:20px">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px">Pastas</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
      ${folders.length===0
        ?`<div style="color:var(--text3);font-size:13px;padding:12px 0;font-style:italic">Nenhuma pasta criada</div>`
        :folders.map(f=>{
          const nFiles=files.filter(d=>d.pastaId===f.id).length;
          return`<div data-open-folder="${f.id}" style="background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px 14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px" onmouseenter="this.style.boxShadow='var(--shadow-gold)';this.style.borderColor='var(--gold)'" onmouseleave="this.style.boxShadow='';this.style.borderColor='var(--border2)'">
            <div style="font-size:28px">📁</div>
            <div style="font-size:13px;font-weight:700;color:var(--text);word-break:break-word">${esc(f.nome||'Pasta')}</div>
            <div style="font-size:10px;color:var(--text3)">${nFiles} arquivo${nFiles!==1?'s':''}</div>
            <div style="display:flex;gap:5px;margin-top:4px">
              <button class="btn btn-sm" data-ed="${f.id}" data-col="docs" onclick="event.stopPropagation()" title="Renomear">✏</button>
              <button class="btn btn-sm btn-d" data-dl="${f.id}" data-col="docs" onclick="event.stopPropagation()" title="Excluir pasta">✕</button>
            </div>
          </div>`;
        }).join('')
      }
    </div>
  </div>

  <!-- ARQUIVOS SEM PASTA -->
  <div>
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px">Arquivos Soltos</div>
    <div class="card" style="padding:0">
      ${files.filter(d=>!d.pastaId).length===0
        ?`<div class="empty" style="padding:24px">Nenhum arquivo sem pasta. <label for="inp-doc-upload-loose" style="color:var(--gold);cursor:pointer;font-weight:600">Fazer upload</label>
          <input type="file" id="inp-doc-upload-loose" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.txt" multiple style="display:none"/></div>`
        :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:14px">
          ${files.filter(d=>!d.pastaId).map(doc=>renderDocCard(doc)).join('')}
        </div>`
      }
    </div>
  </div>
  `:`
  <!-- CONTEÚDO DA PASTA -->
  <div class="card" style="padding:0;overflow:hidden">
    ${listaFiles.length===0
      ?`<div class="empty">📂 Pasta vazia. Clique em <strong>Adicionar Documentos</strong> para fazer upload.</div>`
      :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:16px">
        ${listaFiles.map(doc=>renderDocCard(doc)).join('')}
      </div>`
    }
  </div>`}
  </div>`;
}

function renderDocCard(doc){
  const ext=(doc.nome||'').split('.').pop().toLowerCase();
  const ic=ext==='pdf'?'📄':['jpg','jpeg','png','gif','webp'].includes(ext)?'🖼️':['xls','xlsx'].includes(ext)?'📊':['doc','docx'].includes(ext)?'📝':['zip','rar'].includes(ext)?'🗜️':'📎';
  const size=doc.tamanho?`<div style="font-size:10px;color:var(--text3)">${doc.tamanho}</div>`:'';
  return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px;transition:all .2s" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border)'">
    <div style="font-size:32px;text-align:center;margin-bottom:4px">${ic}</div>
    <div style="font-size:12px;font-weight:600;color:var(--text);word-break:break-word;text-align:center;line-height:1.4">${esc(doc.nome||'—')}</div>
    ${size}
    <div style="font-size:10px;color:var(--text3);text-align:center">${fmtD(doc.data)}</div>
    <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:6px">
      ${doc.url?`<a href="${doc.url}" download="${esc(doc.nome)}" class="btn btn-sm btn-s" style="font-size:11px">⬇</a>`:''}
      <button class="btn btn-sm" data-ed="${doc.id}" data-col="docs" style="font-size:11px">✏</button>
      <button class="btn btn-sm btn-d" data-dl="${doc.id}" data-col="docs" style="font-size:11px">✕</button>
    </div>
  </div>`;
}

function renderLogs(){
  const logs=getLogs();
  const us=gus();
  const fAcao=S._logAcao||'',fUser=S._logUser||'',fMod=S._logMod||'';
  const fDe=S._logDe||'',fAte=S._logAte||'';
  let lista=logs;
  if(fAcao) lista=lista.filter(l=>l.acao===fAcao);
  if(fUser) lista=lista.filter(l=>l.userId===fUser);
  if(fMod)  lista=lista.filter(l=>(l.modulo||'').toLowerCase().includes(fMod.toLowerCase()));
  if(fDe)   lista=lista.filter(l=>l.data&&l.data>=fDe);
  if(fAte)  lista=lista.filter(l=>l.data&&l.data<=fAte);
  const acoes=[...new Set(logs.map(l=>l.acao).filter(Boolean))].sort();
  const COR={'Criou':'var(--green-t)','Editou':'var(--blue-t)','Excluiu':'var(--red-t)',
    'Login':'var(--amber-t)','Logout':'var(--text3)','Gerou PDF':'var(--purple-t)',
    'Exportou Excel':'var(--purple-t)','Gerou Folha':'var(--amber-t)',
    'Limpou Logs':'var(--red-t)'};
  let rows='';
  lista.slice(0,200).forEach(l=>{
    const cor=COR[l.acao]||'var(--text2)';
    rows+=`<div style="display:grid;grid-template-columns:90px 70px 80px 130px 1fr;gap:8px;align-items:center;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);font-size:12px;margin-bottom:4px">
      <span style="color:var(--text3)">${fmtD(l.data)}</span>
      <span style="color:var(--text3);font-size:11px">${l.hora||'—'}</span>
      <span style="color:${cor};font-weight:700;font-size:11px">${esc(l.acao||'—')}</span>
      <span style="color:var(--text2);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.userName||'—')}</span>
      <div><span style="color:var(--blue-t);font-size:10px;font-weight:700">${esc(l.modulo||'—')}</span> <span style="color:var(--text)">${esc(l.detalhe||'')}</span>${l.extra?` <span style="color:var(--text3);font-size:10px">[${esc(l.extra)}]</span>`:''}</div>
    </div>`;
  });
  if(lista.length>200) rows+=`<div style="text-align:center;padding:10px;color:var(--text3);font-size:12px">Exibindo 200 de ${lista.length}. Use filtros para refinar.</div>`;
  return `<div class="card" style="margin-top:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="ct" style="margin:0">📋 Log de Atividades</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="btn-log-pdf">📄 PDF</button>
        <button class="btn btn-sm btn-d" id="btn-log-clear">🗑 Limpar</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:8px">
      <div class="f" style="margin:0"><label style="font-size:10px;color:var(--text3)">AÇÃO</label>
        <select id="log-f-acao">
          <option value="">Todas</option>
          ${acoes.map(a=>`<option value="${a}"${fAcao===a?' selected':''}>${a}</option>`).join('')}
        </select>
      </div>
      <div class="f" style="margin:0"><label style="font-size:10px;color:var(--text3)">USUÁRIO</label>
        <select id="log-f-user">
          <option value="">Todos</option>
          ${us.map(u=>`<option value="${u.id}"${fUser===u.id?' selected':''}>${esc(u.nome)}</option>`).join('')}
        </select>
      </div>
      <div class="f" style="margin:0"><label style="font-size:10px;color:var(--text3)">MÓDULO</label>
        <input id="log-f-mod" placeholder="Filtrar módulo..." value="${esc(fMod)}"/>
      </div>
      <div class="f" style="margin:0"><label style="font-size:10px;color:var(--text3)">DATA DE</label>
        <input type="date" id="log-f-de" value="${fDe}"/>
      </div>
      <div class="f" style="margin:0"><label style="font-size:10px;color:var(--text3)">DATA ATÉ</label>
        <input type="date" id="log-f-ate" value="${fAte}"/>
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn btn-sm" id="btn-log-limpar-filtros" style="width:100%">✕ Limpar</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${lista.length} registro${lista.length!==1?'s':''} de ${logs.length} total</div>
    ${lista.length===0?'<div class="empty">Nenhuma atividade com esses filtros.</div>':rows}
  </div>`;

      ${fi('f-ferias-vencidas','Férias Vencidas (dias)','number',form.feriasVencidas||0,'min="0" max="30"')}

      </div>
      ${fsel('f-modal-status','Status',[['Pendente','Pendente'],['Processado','Processado'],['Pago','Pago']],form.status||'Pendente')}
      <div class="f gf"><label>Observações</label><textarea id="f-obs">${esc(form.observacoes||'')}</textarea></div>
    </div>`;
  }

  /* RH — PONTO */
  else if(modal==='rh_ponto'){
    title=(eid?'Editar':'Registrar')+' Ponto';
    const funcs=gfd(db,fid,'rh_func').filter(f=>f.status==='Ativo');
    const STATUS_P=[['Normal','Normal'],['Falta','Falta'],['Atestado','Atestado'],['Folga','Folga']];
    body=`<div class="g2">
      <div class="f"><label>Funcionário *</label><select id="f-func-id" required>
        <option value="">— Selecione —</option>
        ${funcs.map(f=>`<option value="${f.id}" ${form.funcId===f.id?' selected':''}>${esc(f.nome)}</option>`).join('')}
      </select></div>
      ${fi('f-data','Data','date',form.data||td())}
      ${fi('f-entrada','Horário de Entrada','time',form.entrada||'')}
      ${fi('f-saida','Horário de Saída','time',form.saida||'')}
      <div class="f"><label>Intervalo — Saída</label><input id="f-int-saida" type="time" value="${esc(form.intervaloSaida||'')}"/></div>
      <div class="f"><label>Intervalo — Retorno</label><input id="f-int-retorno" type="time" value="${esc(form.intervaloRetorno||'')}"/></div>
      <div class="f"><label>Horas Trabalhadas</label>
        <div id="ponto-horas-calc" style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:14px;font-weight:700;color:var(--blue-t)">${form.horasTrabalhadas||'—'}</div>
      </div>
      <div class="f"><label>Horas Extras</label>
        <div id="ponto-hextra-calc" style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:14px;font-weight:700;color:var(--amber-t)">${form.horasExtras||'0:00'}</div>
      </div>
      ${fsel('f-modal-status','Status',STATUS_P,form.status||'Normal')}
      <div class="f gf"><label>Observações</label><textarea id="f-obs">${esc(form.observacoes||'')}</textarea></div>
    </div>`;
  }

  /* PLANO DE CONTAS */
  else if(modal==='plano'){
    title=(eid?'Editar':'Novo')+' Plano de Contas';
    const TIPOS=[['Despesa','Despesa'],['Receita','Receita'],['Ativo','Ativo'],['Passivo','Passivo']];
    body=`<div class="g2">
      ${fi('f-cod','Código *','text',form.codigo||'','required')}
      ${fsel('f-tipo','Tipo',TIPOS,form.tipo||'Despesa')}
      ${fi('f-nome','Nome *','text',form.nome||'','required')}
      <div class="f gf"><label>Descrição</label><textarea id="f-desc">${esc(form.descricao||'')}</textarea></div>
    </div>`;
  }

  return`<div class="ov" id="ov">
    <div class="modal"${wide?' style="max-width:780px"':''}>
      <div class="mh"><span class="mt">${title}</span><button class="mc" id="modal-x">×</button></div>
      <div class="mb">${body}
        <div class="fa"><button class="btn" id="modal-cancel">Cancelar</button><button class="btn btn-p" id="modal-save">💾 Salvar</button></div>
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   COLLECT FORM
═══════════════════════════════════════════════ */
function collectForm(){

  if(m==='forn'||m==='prest')return{nome:gv('f-nome'),tipo:gv('f-tipo'),tipoCpfCnpj:gr('doctp')||'CNPJ',cpfCnpj:gv('f-doc'),categoria:gv('f-modal-cat'),dadosPagamento:gv('f-pix'),email:gv('f-email'),telefone:gv('f-tel')};

    if(tipo==='atrac') return{...base,cpfCnpj:gv('f-doc'),categoria:gv('f-modal-cat'),celular:gv('f-cel'),dadosPagamento:gv('f-pix'),observacoes:gv('f-obs')};
    if(tipo==='hosp') return{...base,cpf:gv('f-cpf'),celular:gv('f-cel'),email:gv('f-email'),observacoes:gv('f-obs')};
    return base;
  }
  if(m==='prod')return{produto:gv('f-prod'),categoria:gv('f-modal-cat'),quantidade:Number(gv('f-qtd')||0),valorCusto:gv('f-custo'),valorVenda:gv('f-venda'),dataUltimaContagem:gv('f-data'),codigoBarras:gv('f-barcode'),observacoes:gv('f-obs')};
  if(m==='ent'){const ps=by('f-prod'),fs=by('f-forn');return{prodId:ps?.value||'',prodNome:ps?.options[ps.selectedIndex]?.text||'',quantidade:Number(gv('f-qtd')||0),data:gv('f-data'),responsavel:gv('f-resp'),fornId:fs?.value||'',fornecedor:fs?.options[fs.selectedIndex]?.text||'',observacoes:gv('f-obs'),status:'Pendente'}}
  if(m==='caixa'){
    const pcId=gv('f-cx-pc')||'';
    const pcList=gpc();
    const pcNome=pcId?(pcList.find(p=>p.id===pcId)?.nome||''):'';
    return{
      tipo:gv('f-cx-tipo')||'entrada',
      nome:gv('f-cx-nome')||'',
      categoria:gv('f-cx-cat')||'',
      planoContaId:pcId,
      planoConta:pcNome,
      valor:Number(gv('f-cx-valor')||0),
      data:gv('f-cx-data')||td(),
      status:gv('f-cx-status')||'Em aberto',
      observacoes:gv('f-cx-obs')||'',
      descricao:gv('f-cx-nome')||gv('f-cx-obs')||'',
      // Preserva anexos da memória (não passam pelo DOM)
      anexo:S.form.anexo||'',
      anexoNome:S.form.anexoNome||'',
      anexoTamanho:S.form.anexoTamanho||'',
      foto:S.form.foto||'',
    };
  }
  if(m==='cont'){const ps=by('f-prod');return{prodId:ps?.value||'',prodNome:ps?.options[ps.selectedIndex]?.text||'',quantidadeContada:Number(gv('f-qtd')||0),data:gv('f-data'),responsavel:gv('f-resp'),observacoes:gv('f-obs'),status:'Pendente'}}
  if(m==='said'){
    const ps=by('f-prod');
    const prodId=ps?.value||'';
    const prodNome=ps&&ps.selectedIndex>0?ps.options[ps.selectedIndex].text.split(' (Saldo:')[0]:'';
    const saldo=Number(ps?.options[ps?.selectedIndex]?.dataset?.saldo||0);
    const qtd=Number(gv('f-qtd')||0);
    const novoSaldo=saldo-qtd;
    return{prodId,prodNome,quantidade:qtd,saldoAnterior:saldo,novoSaldo,data:gv('f-data'),responsavel:gv('f-resp'),motivo:gv('f-motivo'),observacoes:gv('f-obs')};
  }
  if(m==='escala'){
    const colSel=by('f-colab-id');
    const colaboradorId=colSel?.value||'';
    const colaboradorNome=colSel&&colSel.selectedIndex>0?(colSel.options[colSel.selectedIndex].dataset.nome||colSel.options[colSel.selectedIndex].text):'';
    const dataT=gv('f-data')||td();
    const dt=new Date(dataT+'T12:00:00');
    const dow=dt.getDay();
    const daysToMon=dow===1?7:(8-dow)%7||7;
    dt.setDate(dt.getDate()+daysToMon);
    const venc=dt.toISOString().slice(0,10);
    return{nome:gv('f-nome'),colaboradorId,colaboradorNome,funcao:gv('f-funcao'),dataTrabalho:dataT,valor:Number(gv('f-valor')||0),vencimentoCP:venc,status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='pousada'){
    const ci=gv('f-ci'),co=gv('f-co'),dias=ci&&co?Math.max(0,Math.round((new Date(co)-new Date(ci))/86400000)):0;
    const vDiaria=Number(gv('f-diaria')||0);
    const vR=Number(gv('f-vr')||0),vE=Number(gv('f-ve')||0),vT=Math.max(0,vR-vE);
    const vendSel=by('f-vend-id');
    const vendedorId=vendSel?.value||'';
    const vendedorNome=vendSel&&vendSel.selectedIndex>0?vendSel.options[vendSel.selectedIndex].text:'';
    const pct=Number(gv('f-pct-com')||0);
    const vCom=parseFloat((vR*pct/100).toFixed(2));
    // Coleta hóspedes adicionais
    const hospsAdic=[];
    document.querySelectorAll('#hosp-lista>div').forEach((row,i)=>{
      const nome=row.querySelector('.ha-nome')?.value||'';
      const cpf=row.querySelector('.ha-cpf')?.value||'';
      const cel=row.querySelector('.ha-cel')?.value||'';
      const hospId=row.querySelector('.ha-sel')?.value||'';
      if(nome||hospId)hospsAdic.push({nome,cpf,celular:cel,hospId});
    });
    return{nomeHospede:gv('f-hpnome'),cpf:gv('f-cpf'),celular:gv('f-cel'),acomodacao:gv('f-acom'),vendedorId,vendedorNome,pctComissao:pct,valorComissao:vCom,checkIn:ci,checkInHora:gv('f-cih'),checkOut:co,checkOutHora:gv('f-coh'),diasHospedagem:dias,qtdHospedes:Number(gv('f-nhsp')||1),valorDiaria:vDiaria,plataforma:gv('f-plat'),formaPagamento:gv('f-forma'),valorReserva:vR,valorEntrada:vE,valorTotal:vT,status:gv('f-modal-status'),cafeManha:gv('f-cafe'),observacoes:gv('f-obs'),hospedes:hospsAdic};
  }
  if(m==='voo'){
    syncPass();
    const vPorPass=Number(gv('f-vppass')||0);
    const vV=Number(gv('f-vv')||0),vRes=Number(gv('f-vres')||0),vT=Math.max(0,vV-vRes);
    const vendSel=by('f-vend-id');
    const vendedorId=vendSel?.value||'';
    const vendedorNome=vendSel&&vendSel.selectedIndex>0?vendSel.options[vendSel.selectedIndex].text:'';
    const pct=Number(gv('f-pct-com')||0);
    const vCom=parseFloat((vV*pct/100).toFixed(2));
    return{piloto:gv('f-piloto'),prefixo:gv('f-pref'),vendedorId,vendedorNome,pctComissao:pct,valorComissao:vCom,dataVoo:gv('f-data'),horaVoo:gv('f-hora'),decolagem:gv('f-dec'),pouso:gv('f-pou'),plataforma:gv('f-plat'),status:gv('f-modal-status'),valorPorPassageiro:vPorPass,valorVoo:vV,valorReserva:vRes,valorTotal:vT,passageiros:S.form.passageiros||[],observacoes:gv('f-obs')};
  }
  if(m==='pedidos'){
    const fornSel=by('f-forn-id');
    const fornecedorId=fornSel?.value||'';
    // Sync item quantities + values from inputs before collecting
    document.querySelectorAll('.item-qtd-inp').forEach(inp=>{
      const idx=Number(inp.dataset.idx);
      if(S.form.itens&&S.form.itens[idx]) S.form.itens[idx].qtd=Number(inp.value)||1;
    });
    document.querySelectorAll('.item-vunit-inp').forEach(inp=>{
      const idx=Number(inp.dataset.idx);
      if(S.form.itens&&S.form.itens[idx]) S.form.itens[idx].valorUnit=Number(inp.value)||0;
    });
    const fornecedor=gv('f-forn-nome')||'';
    const itens=S.form.itens||[];
    const totalPedido=itens.reduce((s,it)=>s+Number(it.qtd||0)*Number(it.valorUnit||0),0);
    return{fornecedorId,fornecedor,data:gv('f-data'),status:gv('f-modal-status'),itens,totalPedido,observacoes:gv('f-obs')};
  }
  if(m==='filial'){
    const chks=document.querySelectorAll('.mod-chk');
    const modulos=Array.from(chks).filter(c=>c.checked).map(c=>c.value);
    if(modulos.length===0&&!confirm('Nenhum módulo selecionado. Continuar?')) return null;
    return{nome:gv('f-nome'),modulos};
  }
  if(m==='usuario'){
    const filChks=document.querySelectorAll('.fil-chk');
    const modChks=document.querySelectorAll('.mod-usr-chk');
    const emailRaw=gv('f-email')||'';
    const senhaRaw=gv('f-senha')||'';
    // Normaliza email: remove todos os espaços e converte para minúsculo
    const email=emailRaw.replace(/\s/g,'').toLowerCase();
    // Senha: remove espaços no final apenas
    const senha=senhaRaw.replace(/\s+$/,'');
    return{
      nome:gv('f-nome'),
      email,
      senha, // pode ser '' em edição (tratado no save)
      perfil:gv('f-perfil'),
      filiais:Array.from(filChks).filter(c=>c.checked).map(c=>c.value),
      modulos:Array.from(modChks).filter(c=>c.checked).map(c=>c.value),
    };
  }
  if(m==='rh_func')return{nome:gv('f-nome'),cpf:gv('f-cpf'),rg:gv('f-rg'),dataNascimento:gv('f-nasc'),celular:gv('f-cel'),email:gv('f-email'),cargo:gv('f-cargo'),departamento:gv('f-depto'),salario:Number(gv('f-salario')||0),valorDiaria:Number(gv('f-vdiaria')||0),tipoContrato:gv('f-contrato'),dataAdmissao:gv('f-admissao'),endereco:gv('f-end'),cidade:gv('f-cidade'),status:gv('f-status'),observacoes:gv('f-obs')};
  if(m==='rh_folha'){
    const fs=by('f-func-id');const fn=fs?.options[fs.selectedIndex]?.text||'';const fc=fs?.options[fs.selectedIndex]?.dataset?.cargo||'';
    const sb=Number(gv('f-sb')||0),he=Number(gv('f-he')||0),bn=Number(gv('f-bn')||0),desc=Number(gv('f-desc')||0);
    const inss=parseFloat((sb*0.09).toFixed(2)),fgts=parseFloat((sb*0.08).toFixed(2));
    const irrf=sb>4664.68?parseFloat(((sb-4664.68)*0.275-896.00).toFixed(2)):0;
    const liq=parseFloat((sb+he+bn-inss-irrf-desc).toFixed(2));
    return{funcId:fs?.value||'',nomeFuncionario:fn,cargo:fc,mes:Number(gv('f-mes')||1),ano:Number(gv('f-ano')||new Date().getFullYear()),salarioBase:sb,horasExtra:he,bonus:bn,descontos:desc,inss,irrf,fgts,salarioLiquido:liq,statusPagamento:gv('f-pago')==='true',dataPagamento:gv('f-dtpag'),observacoes:gv('f-obs')};
  }
  if(m==='rh_ferias'){
    const fs=by('f-func-id');
    const fn=fs?.options[fs?.selectedIndex]?.text||'';
    const funcId=fs?.value||'';
    const ci=gv('f-inicio')||'';
    const co=gv('f-fim')||'';
    const dias=ci&&co?Math.max(0,Math.round((new Date(co+'T12:00:00')-new Date(ci+'T12:00:00'))/86400000)+1):0;
    const func=gfd(ld(),S.fid,'rh_func').find(f=>f.id===funcId);
    const salario=Number(func?.salario||0);
    // Cálculo seguro — usa 0 se salário ou dias estiverem ausentes
    let calc={valorDiario:0,valorFerias:0,tercoConstitucional:0,totalBruto:0,inss:0,fgts:0,baseIRRF:0,irrf:0,liquido:0};
    if(salario>0&&dias>0){
      try{ calc=calcFerias(salario,dias); }
      catch(err){ console.warn('[collectForm rh_ferias] calcFerias erro:',err); }
    }
    const valorManual=Number(gv('f-valor')||0);
    const valor=valorManual>0?valorManual:(calc.liquido||0);
    return{funcId,nomeFuncionario:fn,dataInicio:ci,dataFim:co,dias,
      salarioBase:salario,...calc,valor,
      status:gv('f-modal-status')||'Pendente',observacoes:gv('f-obs')||''};
  }
  if(m==='rh_ponto'){
    const fs=by('f-func-id');
    const entrada=gv('f-entrada'),saida=gv('f-saida');
    const intSaida=gv('f-int-saida'),intRetorno=gv('f-int-retorno');
    // Cálculo automático das horas
    const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};
    const fmtHM=m=>{const h=Math.floor(Math.abs(m)/60),mn=Math.abs(m)%60;return(m<0?'-':'')+String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');};
    let minTrab=0,minExtra=0;
    if(entrada&&saida){
      const totalMin=toMin(saida)-toMin(entrada);
      const intervaloMin=(intSaida&&intRetorno)?Math.max(0,toMin(intRetorno)-toMin(intSaida)):0;
      minTrab=Math.max(0,totalMin-intervaloMin);
      const jornadaPadrao=8*60; // 8h padrão CLT
      minExtra=Math.max(0,minTrab-jornadaPadrao);
    }
    const horasTrabalhadas=fmtHM(minTrab);
    const horasExtras=fmtHM(minExtra);
    const intervalo=intSaida&&intRetorno?intSaida+'-'+intRetorno:'';
    return{funcId:fs?.value||'',nomeFuncionario:fs?.options[fs.selectedIndex]?.text||'',
      data:gv('f-data'),entrada,saida,intervaloSaida:intSaida,intervaloRetorno:intRetorno,
      intervalo,horasTrabalhadas,horasExtras,status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='rh_deslig'){
    const fs=by('f-func-id');
    const funcId=fs?.value||'';
    const fn=fs?.options[fs?.selectedIndex]?.text||'';
    const opt=fs?.selectedIndex>0?fs.options[fs.selectedIndex]:null;
    const sal=Number(opt?.dataset?.salario||0);
    const admissao=opt?.dataset?.admissao||'';
    const desligDate=gv('f-deslig-data')||td();
    const motivo=gv('f-motivo')||'Sem Justa Causa';
    const avisoPrevio=gv('f-aviso')==='trabalhado';
    const saldoDias=Number(gv('f-saldo-dias')||0);
    const feriasVencidas=Number(gv('f-ferias-vencidas')||0);
    const feriasProporcionais=Number(gv('f-ferias-prop')||0);
    let mesesTrab=0;
    if(admissao&&desligDate){
      const dtA=new Date(admissao+'T12:00:00'),dtD=new Date(desligDate+'T12:00:00');
      mesesTrab=Math.max(0,Math.round((dtD-dtA)/(30.44*86400000)));
    }
    const calc=calcRescisao(sal,mesesTrab,motivo,avisoPrevio,saldoDias,feriasVencidas,feriasProporcionais);
    return{funcId,nomeFuncionario:fn,salarioBase:sal,dataAdmissao:admissao,
      dataDesligamento:desligDate,motivo,avisoPrevio,saldoDias,feriasVencidas,feriasProporcionais,
      mesesTrabalhados:mesesTrab,...calc,totalRescisao:calc.liquido,
      status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='plano')return{codigo:gv('f-cod'),tipo:gv('f-tipo'),nome:gv('f-nome'),descricao:gv('f-desc')};
  return{};
}

// Mapa de nomes amigáveis para módulos
const COL_LABEL={'cp':'Contas a Pagar','cr':'Contas a Receber','despesas':'Despesas',
  'vendas':'Vendas','escala':'Escala','forn':'Fornecedores','colab':'Colaboradores',
  'prest':'Prestadores','atrac':'Atrações','hosp':'Hóspedes','pousada':'Pousada',
  'voo':'Voo/Balão','prod':'Produtos','ent':'Entradas Estoque','said':'Saídas Estoque',
  'cont':'Contagem','pedidos':'Pedidos','rh_func':'RH - Funcionários',
  'rh_folha':'RH - Folha','rh_ferias':'RH - Férias','rh_ponto':'RH - Ponto',
  'rh_deslig':'RH - Desligamento','docs':'Documentos'};

// Colunas que ordenam por campo de nome (A-Z automático ao salvar)
const SORT_KEY={
  forn:'nome',colab:'nome',prest:'nome',atrac:'nome',hosp:'nome', // cadastros
  prod:'produto',                                                   // estoque
  rh_func:'nome',                                                   // RH
  pc:'nome',                                                        // plano de contas
  forn_cad:'nome',
};
function _sortAlpha(col,lista){
  const key=SORT_KEY[col];
  if(!key) return lista; // sem ordenação para tabelas transacionais (cp, cr, ent, etc.)
  return [...lista].sort((a,b)=>(a[key]||'').localeCompare(b[key]||'','pt-BR',{sensitivity:'base'}));
}

function saveRec(col,data,eid){
  const db=ld(),fid=S.fid;
  let l=gfd(db,fid,col);
  if(eid) l=l.map(i=>i.id===eid?{...i,...data}:i);
  else l=[...l,{id:uid(),...data}];
  // Ordenação alfabética automática para cadastros e produtos
  l=_sortAlpha(col,l);
  sfd(db,fid,col,l);
  _cache=db;_cacheLoaded=true;
  localStorage.setItem(K,JSON.stringify(db));
  _syncCol(fid,col,l);
  const nome=data.nome||data.nomeFuncionario||data.produto||data.clienteEvento||data.piloto||'';
  addLog(eid?'Editou':'Criou', COL_LABEL[col]||col, nome,
    data.valor?'R$'+Number(data.valor).toFixed(2):'');
  render();
}
function delRec(col,id){
  const db=ld(),fid=S.fid;
  const item=gfd(db,fid,col).find(i=>i.id===id);
  const nome=item?.nome||item?.nomeFuncionario||item?.produto||item?.prodNome||'';

  // ── REGRA ESPECIAL: excluir PEDIDO remove CP + entradas pendentes ──
  if(col==='pedidos'&&item){
    const cp=gfd(db,fid,'cp').filter(c=>!(c.origem==='pedido'&&c.origemId===id));
    sfd(db,fid,'cp',cp);_syncCol(fid,'cp',cp);
    const ents=gfd(db,fid,'ent').filter(e=>!(e.pedidoId===id&&e.status==='Pendente'));
    sfd(db,fid,'ent',ents);_syncCol(fid,'ent',ents);
    console.info('[Pedidos] Excluído pedido #'+id.slice(-4)+' — CP e entradas pendentes removidos');
  }

  // ── REGRA ESPECIAL: excluir entrada aprovada reverte o saldo do produto ──
  if(col==='ent'&&item&&item.status==='Aprovado'){
    const qtd=Number(item.quantidade||0);
    if(qtd>0){
      const prods=gfd(db,fid,'prod');
      let pi=item.prodId?prods.findIndex(p=>p.id===item.prodId):-1;
      if(pi<0&&item.prodNome)
        pi=prods.findIndex(p=>p.produto?.toLowerCase()===item.prodNome?.toLowerCase());
      if(pi>=0){
        const novoSaldo=Math.max(0, Number(prods[pi].quantidade||0)-qtd);
        prods[pi].quantidade=novoSaldo;
        sfd(db,fid,'prod',prods);
        _syncCol(fid,'prod',prods);
        console.info('[Estoque] Entrada excluída — saldo de "'+prods[pi].produto+'" revertido em -'+qtd+' → novo saldo: '+novoSaldo);
      }
    }
  }

  const novaLista=gfd(db,fid,col).filter(i=>i.id!==id);
  sfd(db,fid,col,novaLista);
  _cache=db;_cacheLoaded=true;
  localStorage.setItem(K,JSON.stringify(db));
  _syncCol(fid,col,novaLista);
  addLog('Excluiu', COL_LABEL[col]||col, nome, col==='ent'&&item?.status==='Aprovado'?'Saldo revertido':'');
  render();
}

function proxTerca(){
  const d=new Date();
  const diasAte=((2-d.getDay()+7)%7)||7;
  d.setDate(d.getDate()+diasAte);
  return d.toISOString().slice(0,10);
}

function aprovarPedido(id){
  const db=ld(),fid=S.fid;
  const peds=gfd(db,fid,'pedidos');
  const ped=peds.find(p=>p.id===id);
  if(!ped){return;}
  if(ped.status==='Aprovado'){alert('Pedido já aprovado.');return;}
  if(!confirm('Aprovar o pedido de '+(ped.fornecedor||'fornecedor')+'?\n\nIsso irá:\n• Criar entradas pendentes no estoque\n• Gerar Contas a Pagar\n• Vencimento: próxima terça-feira'))return;

  const vencimento=proxTerca();
  const idx=peds.findIndex(p=>p.id===id);
  peds[idx]={...ped,status:'Aprovado',dataAprovacao:td(),aprovadoPor:S.user?.nome||''};

  // Entradas pendentes (uma por item)
  let ents=gfd(db,fid,'ent');
  (ped.itens||[]).forEach(it=>{
    ents.push({id:uid(),prodId:it.prodId||'',prodNome:it.nome,
      quantidade:Number(it.qtd||0),data:td(),
      responsavel:S.user?.nome||'',
      fornId:ped.fornecedorId||'',fornecedor:ped.fornecedor||'',
      pedidoId:id,pedidoDesc:'Pedido #'+String(ped.numPedido||id.slice(-4)).padStart(4,'0'),
      valorUnit:Number(it.valorUnit||0),status:'Pendente',criadoEm:new Date().toISOString()});
  });

  // Contas a Pagar automático (próxima terça-feira)
  const totalPed=ped.totalPedido||(ped.itens||[]).reduce((s,it)=>s+Number(it.qtd||0)*Number(it.valorUnit||0),0);
  let cp=gfd(db,fid,'cp');
  if(totalPed>0){
    cp.push({id:uid(),nome:ped.fornecedor||'Fornecedor',
      categoria:'Fornecedor',
      referencia:'Pedido de Compra #'+String(ped.numPedido||id.slice(-4)).padStart(4,'0')+' — '+(ped.itens||[]).length+' item(s)',
      planoConta:'Estoque / Compras',
      valor:totalPed,vencimento,dataPagamento:'',
      parcelamento:'À vista',status:'Pendente',
      origem:'pedido',origemId:id,
      observacoes:'Gerado ao aprovar pedido. Vencimento: '+fmtD(vencimento)+' (próxima terça).'});
  }

  sfd(db,fid,'pedidos',peds);sfd(db,fid,'ent',ents);sfd(db,fid,'cp',cp);
  _cache=db;_cacheLoaded=true;localStorage.setItem(K,JSON.stringify(db));
  _syncCol(fid,'pedidos',peds);_syncCol(fid,'ent',ents);_syncCol(fid,'cp',cp);
  addLog('Aprovação','Pedidos de Compra','#'+String(ped.numPedido||id.slice(-4)).padStart(4,'0'),ped.fornecedor||'');
  alert('✅ Pedido aprovado!\n• '+(ped.itens||[]).length+' entrada(s) criada(s) em Estoque → Entradas\n• Contas a Pagar: '+fmt(totalPed)+' — vence '+fmtD(vencimento));
  render();
}

function aprovarEnt(id){
  const db=ld(),fid=S.fid;
  const ents=gfd(db,fid,'ent'),e=ents.find(x=>x.id===id);if(!e)return;
  const ps=gfd(db,fid,'prod');
  // Tenta por prodId, fallback por nome
  let pi=e.prodId?ps.findIndex(p=>p.id===e.prodId):-1;
  if(pi<0&&e.prodNome)pi=ps.findIndex(p=>p.produto?.toLowerCase()===e.prodNome?.toLowerCase());
  if(pi>=0){
    ps[pi].quantidade=Number(ps[pi].quantidade||0)+Number(e.quantidade||0);
    ps[pi].dataUltimaContagem=e.data;
  }
  const ei=ents.findIndex(x=>x.id===id);
  ents[ei]={...ents[ei],status:'Aprovado',dataAprovacao:td()};
  sfd(db,fid,'prod',ps);sfd(db,fid,'ent',ents);sv(db);
}
function aprovarCont(id){
  const db=ld(),fid=S.fid;
  const cs=gfd(db,fid,'cont'),c=cs.find(x=>x.id===id);if(!c)return;
  const ps=gfd(db,fid,'prod'),pi=ps.findIndex(p=>p.id===c.prodId);
  if(pi>=0){ps[pi].quantidade=Number(c.quantidadeContada||0);ps[pi].dataUltimaContagem=c.data}

  sfd(db,fid,'prod',ps);sfd(db,fid,'cont',cs);sv(db);

function aprovarPed(id){
  const db=ld(),fid=S.fid;
  const ps=gfd(db,fid,'pedidos'),pi=ps.findIndex(p=>p.id===id);if(pi<0)return;
  const ped=ps[pi];ps[pi]={...ped,status:'Aprovado',dataAprovacao:td()};
  const prods=gfd(db,fid,'prod');
  const ents=gfd(db,fid,'ent');
  for(const it of(ped.itens||[])){
    // Tenta linkar ao produto cadastrado pelo nome
    const prodCad=prods.find(p=>p.produto?.toLowerCase()===it.nome?.toLowerCase());
    ents.push({
      id:uid(),
      prodId:prodCad?.id||'',

      quantidade:Number(it.qtd||0),

      responsavel:'Pedido de Compra',
      status:'Pendente',

}

/* ── Busca plano de contas de comissão (nome contendo "comiss") ── */
function pcComissao(){
  const pcs=gpc();
  return pcs.find(p=>p.nome?.toLowerCase().includes('comiss'))||null;
}

/* ── Lança CP de comissão garantindo categoria=Colaborador ── */
function lancarCpComissao(db,fid,vendedorId,vendedorNome,valorComissao,referencia,refId,origem){
  if(!vendedorId||!valorComissao||valorComissao<=0)return;
  // Verifica se já foi lançado para este refId+origem
  const cpAtual=gfd(db,fid,'cp');
  if(cpAtual.find(c=>c.origem===origem&&c.refId===refId))return;
  const pc=pcComissao();
  cpAtual.push({
    id:uid(),
    nome:vendedorNome,
    categoria:'Colaborador',           // sempre Colaborador
    referencia,
    valor:Number(valorComissao),
    vencimento:td(),
    status:'Pendente',
    parcelamento:'À vista',
    origem,
    refId,
    planoContaId:pc?.id||'',
    planoConta:pc?.nome||'Comissão de Vendas',
  });
  sfd(db,fid,'cp',cpAtual);
}

/* ── Pousada: salva e reage a mudanças de status ── */
function salvarPousada(data,eid){
  // Lê o DB uma única vez — todas as operações neste objeto, salva ao final
  const db=ld();
  const fid=S.fid;

  if(eid){
    const lista=gfd(db,fid,'pousada');
    const anterior=lista.find(i=>i.id===eid)||{};
    const statusAnterior=anterior.status||'';
    const statusNovo=data.status||'';
    const concluindo=statusNovo==='Concluído'&&statusAnterior!=='Concluído';

    // Atualiza registro da pousada
    sfd(db,fid,'pousada',lista.map(i=>i.id===eid?{...i,...data}:i));

    if(concluindo){
      // Marca CR vinculados como Recebido
      const cr=gfd(db,fid,'cr');
      sfd(db,fid,'cr',cr.map(r=>{
        const vinc=r.origem==='pousada'&&(r.refId===eid||r.nome?.includes(anterior.nomeHospede||'\x00'));
        return vinc?{...r,status:'Recebido',dataRecebimento:td()}:r;
      }));

      // Lança comissão no CP (categoria=Colaborador automático)
      lancarCpComissao(
        db,fid,
        data.vendedorId,
        data.vendedorNome||anterior.vendedorNome,
        data.valorComissao??anterior.valorComissao,
        `Comissão pousada — ${data.nomeHospede||anterior.nomeHospede} (${data.acomodacao||anterior.acomodacao})`,
        eid,
        'pousada_comissao'
      );
    }

  } else {
    // Novo registro
    const novoId=uid();
    const lista=gfd(db,fid,'pousada');
    lista.push({id:novoId,...data});
    sfd(db,fid,'pousada',lista);

    // Entrada → CR Recebido
    if(Number(data.valorEntrada)>0){
      const cr=gfd(db,fid,'cr');
      cr.push({id:uid(),nome:`Entrada — ${data.nomeHospede} (${data.acomodacao})`,
        descricao:'Entrada de reserva pousada',valor:Number(data.valorEntrada),
        entrada:0,saldo:0,status:'Recebido',vencimento:td(),
        origem:'pousada',refId:novoId,formaPagamento:data.formaPagamento});
      sfd(db,fid,'cr',cr);
    }
    // Saldo → CR Pendente
    if(Number(data.valorTotal)>0){
      const cr=gfd(db,fid,'cr');
      cr.push({id:uid(),nome:`Saldo — ${data.nomeHospede} (${data.acomodacao})`,
        descricao:'Saldo restante da reserva',valor:Number(data.valorTotal),
        entrada:0,saldo:Number(data.valorTotal),status:'Pendente',
        vencimento:data.checkOut||td(),origem:'pousada',refId:novoId,
        formaPagamento:data.formaPagamento});
      sfd(db,fid,'cr',cr);
    }
    // Comissão → CP Pendente (categoria=Colaborador automático)
    lancarCpComissao(
      db,fid,
      data.vendedorId,data.vendedorNome,data.valorComissao,
      `Comissão pousada — ${data.nomeHospede} (${data.acomodacao})`,
      novoId,'pousada_comissao'
    );
  }

  // Salva tudo de uma vez (garante isolamento de filial)
  sv(db);
}

/* ── Voo: salva e reage a mudanças de status ── */
function salvarVoo(data,eid){
  const db=ld();
  const fid=S.fid;
  const piloto=data.piloto||'';
  const dataVoo=data.dataVoo||td();
  const nPassageiros=(data.passageiros||[]).length;
  const prefixo=data.prefixo||'—';
  const valorVoo=Number(data.valorVoo||0);
  const valorRes=Number(data.valorReserva||0);
  const valorTot=Number(data.valorTotal||0);

  /* Gera termo PDF (base64) quando status = Agendado */
  const virouAgendado=(stAnt,stNovo)=>stNovo==='Agendado'&&stAnt!=='Agendado';
  const gerarEsalvarTermo=(lista,id,passageiros,dVoo)=>{
    if(!passageiros||!passageiros.length)return lista;
    const b64=gerarTermoBase64(passageiros,dVoo);
    if(!b64)return lista;
    return lista.map(i=>i.id===id?{...i,termoGerado:b64,termoDataGeracao:td()}:i);
  };

  if(eid){
    let lista=gfd(db,fid,'voo');
    const ant=lista.find(i=>i.id===eid)||{};
    const stAnt=ant.status||'';
    const stNovo=data.status||'';

    // Atualiza registro
    lista=lista.map(i=>i.id===eid?{...i,...data}:i);

    // ── Agendado → gera termo PDF e salva no registro
    if(virouAgendado(stAnt,stNovo)){
      const pass=data.passageiros||ant.passageiros||[];
      const dV=data.dataVoo||ant.dataVoo||dataVoo;
      lista=gerarEsalvarTermo(lista,eid,pass,dV);
    }

    sfd(db,fid,'voo',lista);

    // ── Reserva efetuada → lança valor da reserva como Recebido no CR
    const virouReserva=stNovo==='Reserva efetuada'&&stAnt!=='Reserva efetuada'&&stAnt!=='Realizado';
    if(virouReserva&&valorRes>0){
      const cr=gfd(db,fid,'cr');
      const jaExiste=cr.find(r=>r.origem==='voo_reserva'&&r.refId===eid);
      if(!jaExiste){
        cr.push({
          id:uid(),
          nome:`Reserva voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Entrada de reserva | Prefixo: ${ant.prefixo||prefixo}`,
          valor:valorRes,
          entrada:0,saldo:0,
          status:'Recebido',
          vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:eid,
        });
        sfd(db,fid,'cr',cr);
      }
    }

    // ── Realizado → lança saldo restante como Recebido no CR
    const virouRealizado=stNovo==='Realizado'&&stAnt!=='Realizado';
    if(virouRealizado){
      const vVoo=Number(data.valorVoo||ant.valorVoo||0);
      const vRe=Number(data.valorReserva||ant.valorReserva||0);
      const vSaldo=Math.max(0,vVoo-vRe);
      const cr=gfd(db,fid,'cr');

      // Se reserva ainda não foi lançada (veio direto para Realizado), lança tudo
      const temReserva=cr.find(r=>r.origem==='voo_reserva'&&r.refId===eid);
      if(!temReserva&&vRe>0){
        cr.push({
          id:uid(),
          nome:`Reserva voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Reserva | Prefixo: ${ant.prefixo||prefixo}`,
          valor:vRe,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:eid,
        });
      }

      // Lança saldo (valor total − reserva)
      const temSaldo=cr.find(r=>r.origem==='voo_saldo'&&r.refId===eid);
      if(!temSaldo&&vSaldo>0){
        cr.push({
          id:uid(),
          nome:`Saldo voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Passageiros: ${(data.passageiros||ant.passageiros||[]).length} | Prefixo: ${ant.prefixo||prefixo}`,
          valor:vSaldo,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_saldo',refId:eid,
        });
      } else if(temSaldo){
        cr.forEach((r,i)=>{if(r.origem==='voo_saldo'&&r.refId===eid)cr[i]={...r,status:'Recebido',dataRecebimento:td()}});
      }

      sfd(db,fid,'cr',cr);

      // Comissão → CP
      lancarCpComissao(
        db,fid,
        data.vendedorId||ant.vendedorId,
        data.vendedorNome||ant.vendedorNome,
        data.valorComissao??ant.valorComissao,
        `Comissão voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
        eid,'voo_comissao'
      );
    }

  } else {
    // Novo voo
    const novoId=uid();
    let lista=gfd(db,fid,'voo');
    lista.push({id:novoId,...data});

    // ── Agendado → gera termo PDF e salva no registro
    if(data.status==='Agendado'&&data.passageiros&&data.passageiros.length){
      lista=gerarEsalvarTermo(lista,novoId,data.passageiros,data.dataVoo);
    }

    sfd(db,fid,'voo',lista);

    // ── Reserva efetuada → lança valor da reserva no CR
    if(data.status==='Reserva efetuada'&&valorRes>0){
      const cr=gfd(db,fid,'cr');
      cr.push({
        id:uid(),
        nome:`Reserva voo — ${piloto} (${fmtD(dataVoo)})`,
        descricao:`Entrada de reserva | Prefixo: ${prefixo}`,
        valor:valorRes,entrada:0,saldo:0,
        status:'Recebido',vencimento:td(),dataRecebimento:td(),
        origem:'voo_reserva',refId:novoId,
      });
      sfd(db,fid,'cr',cr);
    }

    // ── Realizado direto → lança reserva + saldo no CR
    if(data.status==='Realizado'){
      const cr=gfd(db,fid,'cr');
      if(valorRes>0){
        cr.push({
          id:uid(),nome:`Reserva voo — ${piloto} (${fmtD(dataVoo)})`,
          descricao:`Reserva | Prefixo: ${prefixo}`,
          valor:valorRes,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:novoId,
        });
      }
      const vSaldo=Math.max(0,valorVoo-valorRes);
      if(vSaldo>0){
        cr.push({
          id:uid(),nome:`Saldo voo — ${piloto} (${fmtD(dataVoo)})`,
          descricao:`Passageiros: ${nPassageiros} | Prefixo: ${prefixo}`,
          valor:vSaldo,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_saldo',refId:novoId,
        });
      }
      sfd(db,fid,'cr',cr);
    }

    // Comissão → CP
    lancarCpComissao(
      db,fid,
      data.vendedorId,data.vendedorNome,data.valorComissao,
      `Comissão voo — ${piloto} (${fmtD(dataVoo)})`,
      novoId,'voo_comissao'
    );
  }

  sv(db);
}

/* ── syncPass ── */
function syncPass(){
  if(S.modal!=='voo')return;
  const ns=document.querySelectorAll('.p-nome'),cs=document.querySelectorAll('.p-cpf'),ces=document.querySelectorAll('.p-cel'),ps=document.querySelectorAll('.p-peso'),hs=document.querySelectorAll('.p-hosp');
  if(!ns.length)return;
  S.form.passageiros=Array.from(ns).map((e,i)=>({nome:e.value,cpf:cs[i]?.value||'',celular:ces[i]?.value||'',peso:ps[i]?.value||'',hospId:hs[i]?.value||''}));
}

/* ── modalFor ── */
function mFor(){
  const p=S.page;
  if(p==='cadastros')return 'cad';
  if(p==='estoque'){const tabMap={'prod':'prod','ent':'ent','cont':'cont','said':'said','pedidos':'pedidos'};return tabMap[S.tab]||'prod';}
  if(p==='agendas'){if(S.op==='pousada')return'pousada';if(S.op==='voo')return'voo';}
  if(p==='financeiro'){
    const finMap={'caixa':'caixa','cp':'cp','cr':'cr','vendas':'vendas','despesas':'despesas','comissoes':'com'};
    return finMap[S.finTab||'']||'';
  }
  const m={'contas-pagar':'cp','contas-receber':'cr',vendas:'vendas',operacional:'docs'};
  return m[p]||p;
}

      const ve2=by('ps-ve-show');if(ve2)ve2.textContent=fmt(vE);
      const pct=Number(gv('f-pct-com')||0);
      const com=by('vcom-ps');if(com)com.textContent=fmt(parseFloat((vr*pct/100).toFixed(2)));
      const base=by('com-base-ps');if(base)base.textContent=fmt(vr);
    }

  /* ── Ponto: cálculo automático de horas ao mudar campos ── */
  const calcPontoHoras=()=>{
    const entrada=gv('f-entrada'),saida=gv('f-saida');
    const intSaida=gv('f-int-saida'),intRetorno=gv('f-int-retorno');
    const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};
    const fmtHM=m=>{const h=Math.floor(m/60),mn=m%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');};
    if(!entrada||!saida) return;
    const totalMin=toMin(saida)-toMin(entrada);
    const intervaloMin=(intSaida&&intRetorno)?Math.max(0,toMin(intRetorno)-toMin(intSaida)):0;
    const minTrab=Math.max(0,totalMin-intervaloMin);
    const minExtra=Math.max(0,minTrab-480); // 8h = 480min
    const horasEl=by('ponto-horas-calc');
    const extraEl=by('ponto-hextra-calc');
    if(horasEl) horasEl.textContent=fmtHM(minTrab);
    if(extraEl){extraEl.textContent=fmtHM(minExtra);extraEl.style.color=minExtra>0?'var(--amber-t)':'var(--text3)';}
  };
  ['f-entrada','f-saida','f-int-saida','f-int-retorno'].forEach(id=>{
    by(id)?.addEventListener('change',calcPontoHoras);

  /* ── Férias: atualiza dias e cálculo em tempo real ao mudar datas ── */

    if(!funcId) return;

        '<div class="calc-row"><span>Férias ('+dias+' dias):</span><span>'+fmt(c.valorFerias)+'</span></div>'+

        '<div class="calc-row" style="border-top:1px solid var(--border);padding-top:4px;margin-top:4px"><span><strong>= Total Bruto:</strong></span><span style="font-weight:700">'+fmt(c.totalBruto)+'</span></div>'+
        '<div class="calc-row" style="color:var(--red-t)"><span>− INSS 2026 (alíq.×base−ded.):</span><span>'+fmt(c.inss)+'</span></div>'+
        '<div class="calc-row" style="color:var(--amber-t)"><span>FGTS 8% patronal (inf.):</span><span>'+fmt(c.fgts)+'</span></div>'+
        '<div class="calc-row" style="color:var(--text3);font-size:10px"><span>Base IRRF: R$'+c.baseIRRF.toFixed(2)+' (isento ≤ R$2.428,80)</span></div>'+
        '<div class="calc-row" style="color:var(--red-t)"><span>− IRRF 2026:</span><span>'+fmt(c.irrf)+'</span></div>'+
        '<div class="calc-row" style="border-top:2px solid var(--border);padding-top:6px;margin-top:4px"><span style="font-size:13px"><strong>= Líquido:</strong></span><span style="color:var(--green-t);font-weight:700;font-size:15px">'+fmt(c.liquido)+'</span></div>';
    }
    // Preenche campo valor automaticamente se não foi editado manualmente
    const valEl=by('f-valor');
    if(valEl&&(valEl.dataset.auto!=='false')){
      valEl.value=c.liquido;
      valEl.dataset.auto='true';
    }
  };
  by('f-inicio')?.addEventListener('change',atualizaFerias);

    if(!lista.length){alert('Nenhum registro para exportar.');return;}

    // ── Helpers ──
    const dtBR=d=>{if(!d)return'';const p=String(d).slice(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:''};
    const pc=gpc();
    const resolvePC=i=>{
      if(i.planoConta&&i.planoConta.trim())return i.planoConta.trim();
      if(i.planoContaId){const p=pc.find(x=>x.id===i.planoContaId);if(p)return(p.codigo?p.codigo+' · ':'')+p.nome;}
      return'—';
    };
    const resolveCAT=i=>i.categoria&&i.categoria.trim()?i.categoria.trim():'—';
    const resolvePGTO=i=>dtBR(i.dataPagamento||i.pgto||'');

    // ── Totalizadores ──
    const tot    =lista.reduce((s,i)=>s+Number(i.valor||0),0);
    const totPago=lista.filter(i=>i.status==='Pago').reduce((s,i)=>s+Number(i.valor||0),0);

      const bom='\uFEFF';
      const hdr='#;Nome;Categoria;Plano de Contas;Referência;Valor (R$);Vencimento;Data Pagamento;Parcelamento;Status\n';
      const rows=lista.map((i,idx)=>[idx+1,'"'+(i.nome||'')+'"','"'+resolveCAT(i)+'"','"'+resolvePC(i)+'"','"'+(i.referencia||'')+'"',Number(i.valor||0).toFixed(2).replace('.',','),dtBR(i.vencimento),resolvePGTO(i),'"'+(i.parcelamento||'À vista')+'"','"'+(i.status||'')+'"'].join(';')).join('\n');
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([bom+hdr+rows],{type:'text/csv;charset=utf-8'}));a.download='contas_pagar_'+td()+'.csv';a.click();
      return;
    }

    // ══════════════════════════════════════════════
    // XLSX PROFISSIONAL
    // ══════════════════════════════════════════════
    const WB=XLSX.utils.book_new();

    // ── ABA 1: Listagem Completa ──
    // Linhas de cabeçalho do relatório
    const HDR_ROWS=8; // linhas reservadas antes da tabela

  // Upload de documentos na pasta atual
  // Handler único de upload — pastaId = pasta atual (S.fc) ou null (solto)
  function _handleDocUpload(e){
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    // pastaId: se estiver dentro de uma pasta (S.fc preenchido) usa ela, senão null (solto)
    const pastaId=S.fc||null;
    const db=ld(),fid=S.fid;
    const docs=gfd(db,fid,'docs');
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const kb=Math.round(file.size/1024);
        const tamanho=kb>1024?(kb/1024).toFixed(1)+'MB':kb+'KB';
        // Verifica se já existe arquivo com mesmo nome na mesma pasta (evita duplicidade)
        const jaExiste=docs.some(d=>d.nome===file.name&&d.pastaId===pastaId&&d.type==='file');
        if(!jaExiste){
          docs.push({id:uid(),type:'file',nome:file.name,pastaId,
            data:td(),tamanho,url:ev.target.result,
            criadoEm:new Date().toISOString()});
        }
        loaded++;
        if(loaded===files.length){
          sfd(db,fid,'docs',docs);
          _cache=db;_cacheLoaded=true;localStorage.setItem(K,JSON.stringify(db));
          _syncCol(fid,'docs',docs);
          render();
        }
      };
      reader.readAsDataURL(file);
    });
    // Reset input para permitir re-upload do mesmo arquivo
    e.target.value='';
  }

  let _cpStream=null;
  async function _startCpCam(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      alert('Câmera não disponível neste navegador.');return;
    }
    const box=by('cp-camera-box');
    if(box&&box.style.display==='block'){
      if(_cpStream){_cpStream.getTracks().forEach(t=>t.stop());_cpStream=null;}
      box.style.display='none';return;
    }
    try{
      _cpStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
      });
      const video=by('cp-video');
      if(!video){if(_cpStream){_cpStream.getTracks().forEach(t=>t.stop());_cpStream=null;}return;}
      video.srcObject=_cpStream;
      await new Promise(res=>{video.onloadedmetadata=()=>{video.play().then(res).catch(res);};});
      if(box) box.style.display='block';
    }catch(err){
      if(_cpStream){_cpStream.getTracks().forEach(t=>t.stop());_cpStream=null;}
      const msg=err.name==='NotAllowedError'?'Permissão da câmera negada. Permita nas configurações do navegador.':
                err.name==='NotFoundError'?'Câmera não encontrada neste dispositivo.':
                'Câmera indisponível: '+err.message;
      alert(msg);
    }
  }

  by('btn-gerar-folha')?.addEventListener('click',()=>{
    const db=ld(),fid=S.fid;
    const funcs=gfd(db,fid,'rh_func').filter(f=>f.status==='Ativo');
    if(!funcs.length){alert('Nenhum funcionário ativo cadastrado.');return;}
    const mes=Number(S.fm||new Date().getMonth()+1),ano=Number(S.fb||new Date().getFullYear());
    const hoje=new Date();
    const diaHoje=hoje.getDate();

    // Determina tipo de lançamento pelo dia atual
    const isAdiantamento=diaHoje>=1&&diaHoje<=14;
    const tipo=isAdiantamento?'adiantamento':'salario';
    const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const nomeMes=MESES[mes-1];

    // Data de pagamento: adiantamento → dia 15 deste mês; salário → dia 01 mês seguinte
    let dtPag;
    if(isAdiantamento){
      dtPag=`${ano}-${String(mes).padStart(2,'0')}-15`;
    } else {
      const proxMes=mes===12?1:mes+1;
      const proxAno=mes===12?ano+1:ano;
      dtPag=`${proxAno}-${String(proxMes).padStart(2,'0')}-01`;
    }

    // Verifica se já existe folha do mesmo tipo/mês
    let folha=gfd(db,fid,'rh_folha');
    const jaGerada=folha.find(f=>Number(f.mes)===mes&&Number(f.ano)===ano&&f.tipo===tipo);
    if(jaGerada&&!confirm(`Já existe ${isAdiantamento?'adiantamento':'folha'} para ${nomeMes}/${ano}. Substituir?`))return;
    folha=folha.filter(f=>!(Number(f.mes)===mes&&Number(f.ano)===ano&&f.tipo===tipo));

    // Para cálculo do salário: desconta adiantamento já pago
    const adiantamentos=gfd(db,fid,'rh_folha').filter(f=>
      Number(f.mes)===mes&&Number(f.ano)===ano&&f.tipo==='adiantamento'
    );

    let cp=gfd(db,fid,'cp');
    const novosLancamentos=[];

    funcs.forEach(func=>{
      const sb=Number(func.salario||0);
      const inss=parseFloat((sb*0.09).toFixed(2));
      const fgts=parseFloat((sb*0.08).toFixed(2));
      const irrf=sb>4664.68?parseFloat(((sb-4664.68)*0.275-896.00).toFixed(2)):0;

      let valorLiq,descAdiantamento=0,labelTipo;

      if(isAdiantamento){
        // Adiantamento = 50% do salário bruto
        valorLiq=parseFloat((sb*0.5).toFixed(2));
        labelTipo='Adiantamento Salarial';
      } else {
        // Salário = líquido − adiantamento já pago
        const liqTotal=parseFloat((sb-inss-irrf).toFixed(2));
        const adiant=adiantamentos.find(a=>a.funcId===func.id);
        descAdiantamento=adiant?Number(adiant.salarioLiquido||0):0;
        valorLiq=parseFloat((liqTotal-descAdiantamento).toFixed(2));
        labelTipo='Pagamento de Salário';
      }

      const fId=uid();
      folha.push({
        id:fId,funcId:func.id,nomeFuncionario:func.nome,cargo:func.cargo||'',
        mes,ano,tipo,labelTipo,
        salarioBase:sb,
        horasExtra:0,bonus:0,
        descontos:descAdiantamento,
        inss:isAdiantamento?0:inss,
        irrf:isAdiantamento?0:irrf,
        fgts,
        salarioLiquido:Math.max(0,valorLiq),
        statusPagamento:false,
        dataPagamento:dtPag,
        cpId:'' // será preenchido abaixo
      });

      // Lança no Contas a Pagar automaticamente
      const cpId=uid();
      folha[folha.length-1].cpId=cpId;
      cp.push({
        id:cpId,
        nome:func.nome,
        categoria:'Folha de Pagamento',
        referencia:`${labelTipo} — ${nomeMes}/${ano}`,
        planoContaId:'',planoConta:'Folha de Pagamento',
        valor:Math.max(0,valorLiq),
        vencimento:dtPag,
        dataPagamento:'',
        parcelamento:'À vista',
        status:'Pendente',
        origem:'rh_folha',
        origemId:fId,
        observacoes:`${labelTipo} de ${func.nome} — ${nomeMes}/${ano}${descAdiantamento?` (desc. adiant. R$${descAdiantamento.toFixed(2)})`:''}`
      });
      novosLancamentos.push(func.nome);
    });

    sfd(db,fid,'rh_folha',folha);
    sfd(db,fid,'cp',cp);
    sv(db);
    addLog('Gerou Folha','RH - Folha de Pagamento',isAdiantamento?'Adiantamento':'Salário',String(mes)+'/'+String(ano));

    render();
  });

  /* ══════════════════════════════════════════════════════════════
     SCANNER DE CÓDIGO DE BARRAS — Quagga2
     Funciona em: iOS Safari, Chrome Android, Chrome Desktop
     Preenche automaticamente o campo de código ao ler
  ══════════════════════════════════════════════════════════════ */
  let _scanActive=false;
  let _scanTargetId=null;
  let _scanResultId=null;
  let _scanBoxId=null;

  function _stopScanner(){
    if(!_scanActive)return;
    _scanActive=false;
    try{if(window.Quagga)Quagga.stop();}catch(e){}
    ['barcode-reader-box','barcode-reader-box-cont'].forEach(id=>{
      const el=by(id);if(el)el.style.display='none';
    });
    _scanTargetId=null;_scanResultId=null;_scanBoxId=null;
  }

  function _startScanner(targetInputId,resultBoxId,videoId,canvasId,boxId){
    // Toggle: se já ativo para este mesmo alvo, fecha
    if(_scanActive&&_scanBoxId===boxId){_stopScanner();return;}
    // Se ativo para outro, fecha primeiro
    if(_scanActive)_stopScanner();

    if(!navigator.mediaDevices?.getUserMedia){
      alert('Câmera não suportada neste navegador. Use HTTPS e um navegador moderno.');return;
    }
    if(!window.Quagga){
      alert('Biblioteca de scanner não carregada. Verifique sua conexão e recarregue a página.');return;
    }

    _scanTargetId=targetInputId||'f-barcode';
    _scanResultId=resultBoxId||'barcode-result';
    _scanBoxId=boxId||'barcode-reader-box';
    _scanActive=true;

    const box=by(_scanBoxId);
    if(!box){_scanActive=false;return;}
    box.style.display='block';

    const vidEl=by(videoId||'barcode-video');
    if(vidEl)vidEl.style.display='none'; // Quagga cria o próprio video

    // Container onde Quagga vai montar o video
    const containerId=_scanBoxId+'-inner';
    let container=by(containerId);
    if(!container){
      container=document.createElement('div');
      container.id=containerId;
      container.style.cssText='width:100%;position:relative;';
      box.insertBefore(container,box.firstChild);
    }
    container.innerHTML=''; // limpa sessão anterior

    const onDetected=result=>{
      const code=result?.codeResult?.code;
      if(!code||code.length<4)return;
      _stopScanner();
      // Preenche o campo alvo
      const inp=by(_scanTargetId);
      if(inp){
        inp.value=code;
        inp.dispatchEvent(new Event('input',{bubbles:true}));
        inp.dispatchEvent(new Event('change',{bubbles:true}));
        inp.focus();
      }
      // Mostra resultado
      const res=by(_scanResultId);
      if(res){res.textContent='✅ Código lido: '+code;res.style.display='block';}
      // Vibra no mobile
      if(navigator.vibrate)navigator.vibrate([80,40,80]);
    };

    Quagga.init({
      inputStream:{
        name:'Live',
        type:'LiveStream',
        target:container,
        constraints:{
          facingMode:'environment',   // câmera traseira
          width:{min:320,ideal:1280},
          height:{min:240,ideal:720},
        },
      },
      locator:{patchSize:'medium',halfSample:true},
      numOfWorkers:navigator.hardwareConcurrency>2?2:1,
      decoder:{
        readers:[
          'ean_reader',       // EAN-13 (mais comum no Brasil)
          'ean_8_reader',     // EAN-8
          'code_128_reader',  // Code 128
          'code_39_reader',   // Code 39
          'upc_reader',       // UPC-A
          'upc_e_reader',     // UPC-E
          'codabar_reader',   // Codabar
          'i2of5_reader',     // ITF
        ],
      },
      locate:true,
      frequency:10, // 10 análises por segundo
    },err=>{
      if(err){
        _stopScanner();
        const msg=err.name==='NotAllowedError'||err.toString().includes('Permission')
          ?'Permissão de câmera negada. Acesse Ajustes > Navegador > Câmera e permita o acesso.'
          :err.name==='NotFoundError'?'Câmera não encontrada.'
          :'Erro ao iniciar câmera: '+(err.message||err);
        alert(msg);
        return;
      }
      Quagga.start();
      Quagga.onDetected(onDetected);
    });
  }

  function refreshPassLista(){

    lista.innerHTML=(S.form.passageiros||[]).map((p,i)=>passRowHTML(p,i,hosp)).join('');

    // p-hosp change é tratado por event delegation global — sem necessidade de rebind
    lista.querySelectorAll('[data-rp]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        syncPass();
        const i=Number(e.currentTarget.dataset.rp);
        S.form.passageiros=S.form.passageiros.filter((_,idx)=>idx!==i);
        refreshPassLista();
        updatePassCount();
        recalcVooLocal();
      });
    });
    updatePassCount();
  }

  function updatePassCount(){
    const qtd=(S.form.passageiros||[]).length;
    const qc=by('qtd-pass-calc');if(qc)qc.textContent=qtd;
    const lbl=by('pass-count-lbl');if(lbl)lbl.textContent=`(${qtd})`;
  }

  function recalcVooLocal(){
    const vPorPass=Number(gv('f-vppass')||0);
    const qtd=Math.max((S.form.passageiros||[]).length,1);
    updatePassCount();
    if(vPorPass>0){
      const vv=parseFloat((vPorPass*qtd).toFixed(2));
      const el=by('f-vv');if(el)el.value=vv;
      const sh=by('voo-vv-show');if(sh)sh.textContent=fmt(vv);
      const vRes=Number(gv('f-vres')||0);
      const sc=by('vt-voo');if(sc)sc.textContent=fmt(Math.max(0,vv-vRes));
      const pct=Number(gv('f-pct-com')||0);
      const com=by('vcom-voo');if(com)com.textContent=fmt(parseFloat((vv*pct/100).toFixed(2)));
      const base=by('com-base-voo');if(base)base.textContent=fmt(vv);
