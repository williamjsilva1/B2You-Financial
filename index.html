    return{nome:gv('f-nome'),categoria:gv('f-modal-cat'),planoContaId:pcId,planoConta:pcNome,valor:gv('f-valor'),referencia:gv('f-ref2'),vencimento:gv('f-venc'),dataPagamento:gv('f-pgto'),parcelamento:gv('f-parc'),status:gv('f-modal-status'),anexo:S.form.anexo||'',anexoNome:S.form.anexoNome||'',anexoTamanho:S.form.anexoTamanho||'',foto:S.form.foto||''};
  }
  if(m==='cr'){const vl=Number(gv('f-valor')||0),en=Number(gv('f-entrada')||0);return{nome:gv('f-nome'),valor:vl,entrada:en,saldo:Math.max(0,vl-en),descricao:gv('f-desc'),vencimento:gv('f-venc'),dataRecebimento:gv('f-recv'),formaPagamento:gv('f-forma'),status:gv('f-modal-status')}}
  if(m==='vendas')return{nfe:gv('f-nfe'),dataEmissao:gv('f-data'),clienteEvento:gv('f-cliente'),cnpjCpf:gv('f-doc'),valor:gv('f-valor'),formaPagamento:gv('f-forma'),status:gv('f-modal-status'),observacoes:gv('f-obs')};
  if(m==='forn'||m==='prest')return{nome:gv('f-nome'),tipo:gv('f-tipo'),tipoCpfCnpj:gr('doctp')||'CNPJ',cpfCnpj:gv('f-doc'),categoria:gv('f-modal-cat'),dadosPagamento:gv('f-pix'),email:gv('f-email'),telefone:gv('f-tel')};
  if(m==='colab')return{nome:gv('f-nome'),cpf:gv('f-cpf'),cargo:gv('f-cargo'),departamento:gv('f-depto'),salario:gv('f-sal'),dadosPagamento:gv('f-pix'),status:gv('f-modal-status')};
  if(m==='atrac')return{nome:gv('f-nome'),cpfCnpj:gv('f-doc'),categoria:gv('f-modal-cat'),dadosPagamento:gv('f-pix'),celular:gv('f-cel')};
  if(m==='hosp')return{nome:gv('f-nome'),cpf:gv('f-cpf'),celular:gv('f-cel'),email:gv('f-email'),observacoes:gv('f-obs')};
  if(m==='prod')return{produto:gv('f-prod'),categoria:gv('f-modal-cat'),quantidade:Number(gv('f-qtd')||0),valorCusto:gv('f-custo'),valorVenda:gv('f-venda'),dataUltimaContagem:gv('f-data'),codigoBarras:gv('f-barcode'),observacoes:gv('f-obs')};
  if(m==='ent'){const ps=by('f-prod'),fs=by('f-forn');return{prodId:ps?.value||'',prodNome:ps?.options[ps.selectedIndex]?.text||'',quantidade:Number(gv('f-qtd')||0),data:gv('f-data'),responsavel:gv('f-resp'),fornId:fs?.value||'',fornecedor:fs?.options[fs.selectedIndex]?.text||'',observacoes:gv('f-obs'),status:'Pendente'}}
  if(m==='cont'){const ps=by('f-prod');return{prodId:ps?.value||'',prodNome:ps?.options[ps.selectedIndex]?.text||'',quantidadeContada:Number(gv('f-qtd')||0),data:gv('f-data'),responsavel:gv('f-resp'),observacoes:gv('f-obs'),status:'Pendente'}}
  if(m==='said'){
    const ps=by('f-prod');
    const prodId=ps?.value||'';
    const prodNome=ps&&ps.selectedIndex>0?ps.options[ps.selectedIndex].text.split(' (Saldo:')[0]:'';
    const saldo=Number(ps?.options[ps?.selectedIndex]?.dataset?.saldo||0);
    const qtd=Number(gv('f-qtd')||0);
    const novoSaldo=saldo-qtd;
    return{prodId,prodNome,quantidade:qtd,saldoAnterior:saldo,novoSaldo,data:gv('f-data'),responsavel:gv('f-resp'),motivo:gv('f-motivo'),observacoes:gv('f-obs')};
  }
  if(m==='escala'){
    const colSel=by('f-colab-id');
    const colaboradorId=colSel?.value||'';
    const colaboradorNome=colSel&&colSel.selectedIndex>0?(colSel.options[colSel.selectedIndex].dataset.nome||colSel.options[colSel.selectedIndex].text):'';
    const dataT=gv('f-data')||td();
    const dt=new Date(dataT+'T12:00:00');
    const dow=dt.getDay();
    const daysToMon=dow===1?7:(8-dow)%7||7;
    dt.setDate(dt.getDate()+daysToMon);
    const venc=dt.toISOString().slice(0,10);
    return{nome:gv('f-nome'),colaboradorId,colaboradorNome,funcao:gv('f-funcao'),dataTrabalho:dataT,valor:Number(gv('f-valor')||0),vencimentoCP:venc,status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='pousada'){
    const ci=gv('f-ci'),co=gv('f-co'),dias=ci&&co?Math.max(0,Math.round((new Date(co)-new Date(ci))/86400000)):0;
    const vDiaria=Number(gv('f-diaria')||0);
    const vR=Number(gv('f-vr')||0),vE=Number(gv('f-ve')||0),vT=Math.max(0,vR-vE);
    const vendSel=by('f-vend-id');
    const vendedorId=vendSel?.value||'';
    const vendedorNome=vendSel&&vendSel.selectedIndex>0?vendSel.options[vendSel.selectedIndex].text:'';
    const pct=Number(gv('f-pct-com')||0);
    const vCom=parseFloat((vR*pct/100).toFixed(2));
    // Coleta hóspedes adicionais
    const hospsAdic=[];
    document.querySelectorAll('#hosp-lista>div').forEach((row,i)=>{
      const nome=row.querySelector('.ha-nome')?.value||'';
      const cpf=row.querySelector('.ha-cpf')?.value||'';
      const cel=row.querySelector('.ha-cel')?.value||'';
      const hospId=row.querySelector('.ha-sel')?.value||'';
      if(nome||hospId)hospsAdic.push({nome,cpf,celular:cel,hospId});
    });
    return{nomeHospede:gv('f-hpnome'),cpf:gv('f-cpf'),celular:gv('f-cel'),acomodacao:gv('f-acom'),vendedorId,vendedorNome,pctComissao:pct,valorComissao:vCom,checkIn:ci,checkInHora:gv('f-cih'),checkOut:co,checkOutHora:gv('f-coh'),diasHospedagem:dias,qtdHospedes:Number(gv('f-nhsp')||1),valorDiaria:vDiaria,plataforma:gv('f-plat'),formaPagamento:gv('f-forma'),valorReserva:vR,valorEntrada:vE,valorTotal:vT,status:gv('f-modal-status'),cafeManha:gv('f-cafe'),observacoes:gv('f-obs'),hospedes:hospsAdic};
  }
  if(m==='voo'){
    syncPass();
    const vPorPass=Number(gv('f-vppass')||0);
    const vV=Number(gv('f-vv')||0),vRes=Number(gv('f-vres')||0),vT=Math.max(0,vV-vRes);
    const vendSel=by('f-vend-id');
    const vendedorId=vendSel?.value||'';
    const vendedorNome=vendSel&&vendSel.selectedIndex>0?vendSel.options[vendSel.selectedIndex].text:'';
    const pct=Number(gv('f-pct-com')||0);
    const vCom=parseFloat((vV*pct/100).toFixed(2));
    return{piloto:gv('f-piloto'),prefixo:gv('f-pref'),vendedorId,vendedorNome,pctComissao:pct,valorComissao:vCom,dataVoo:gv('f-data'),horaVoo:gv('f-hora'),decolagem:gv('f-dec'),pouso:gv('f-pou'),plataforma:gv('f-plat'),status:gv('f-modal-status'),valorPorPassageiro:vPorPass,valorVoo:vV,valorReserva:vRes,valorTotal:vT,passageiros:S.form.passageiros||[],observacoes:gv('f-obs')};
  }
  if(m==='pedidos'){
    const fornSel=by('f-forn-id');
    const fornecedorId=fornSel?.value||'';
    const fornecedor=gv('f-forn-nome')||'';
    return{fornecedorId,fornecedor,data:gv('f-data'),status:gv('f-modal-status'),itens:S.form.itens||[],observacoes:gv('f-obs')};
  }
  if(m==='filial'){
    const chks=document.querySelectorAll('.mod-chk');
    const modulos=Array.from(chks).filter(c=>c.checked).map(c=>c.value);
    if(modulos.length===0&&!confirm('Nenhum módulo selecionado. Continuar?')) return null;
    return{nome:gv('f-nome'),modulos};
  }
  if(m==='usuario'){
    const filChks=document.querySelectorAll('.fil-chk');
    const modChks=document.querySelectorAll('.mod-usr-chk');
    const emailRaw=gv('f-email')||'';
    const senhaRaw=gv('f-senha')||'';
    // Normaliza email: remove todos os espaços e converte para minúsculo
    const email=emailRaw.replace(/\s/g,'').toLowerCase();
    // Senha: remove espaços no final apenas
    const senha=senhaRaw.replace(/\s+$/,'');
    return{
      nome:gv('f-nome'),
      email,
      senha, // pode ser '' em edição (tratado no save)
      perfil:gv('f-perfil'),
      filiais:Array.from(filChks).filter(c=>c.checked).map(c=>c.value),
      modulos:Array.from(modChks).filter(c=>c.checked).map(c=>c.value),
    };
  }
  if(m==='rh_func')return{nome:gv('f-nome'),cpf:gv('f-cpf'),rg:gv('f-rg'),dataNascimento:gv('f-nasc'),celular:gv('f-cel'),email:gv('f-email'),cargo:gv('f-cargo'),departamento:gv('f-depto'),salario:Number(gv('f-salario')||0),valorDiaria:Number(gv('f-vdiaria')||0),tipoContrato:gv('f-contrato'),dataAdmissao:gv('f-admissao'),endereco:gv('f-end'),cidade:gv('f-cidade'),status:gv('f-status'),observacoes:gv('f-obs')};
  if(m==='rh_folha'){
    const fs=by('f-func-id');const fn=fs?.options[fs.selectedIndex]?.text||'';const fc=fs?.options[fs.selectedIndex]?.dataset?.cargo||'';
    const sb=Number(gv('f-sb')||0),he=Number(gv('f-he')||0),bn=Number(gv('f-bn')||0),desc=Number(gv('f-desc')||0);
    const inss=parseFloat((sb*0.09).toFixed(2)),fgts=parseFloat((sb*0.08).toFixed(2));
    const irrf=sb>4664.68?parseFloat(((sb-4664.68)*0.275-896.00).toFixed(2)):0;
    const liq=parseFloat((sb+he+bn-inss-irrf-desc).toFixed(2));
    return{funcId:fs?.value||'',nomeFuncionario:fn,cargo:fc,mes:Number(gv('f-mes')||1),ano:Number(gv('f-ano')||new Date().getFullYear()),salarioBase:sb,horasExtra:he,bonus:bn,descontos:desc,inss,irrf,fgts,salarioLiquido:liq,statusPagamento:gv('f-pago')==='true',dataPagamento:gv('f-dtpag'),observacoes:gv('f-obs')};
  }
  if(m==='rh_ferias'){
    const fs=by('f-func-id');
    const fn=fs?.options[fs.selectedIndex]?.text||'';
    const funcId=fs?.value||'';
    const ci=gv('f-inicio'),co=gv('f-fim');
    // Cálculo correto dos dias (inclusivo - conta o dia inicial, não o final)
    const dias=ci&&co?Math.max(0,Math.round((new Date(co+'T12:00:00')-new Date(ci+'T12:00:00'))/86400000)+1):0;
    const func=gfd(ld(),S.fid,'rh_func').find(f=>f.id===funcId);
    const salario=Number(func?.salario||0);
    // ── Cálculo CLT conforme tabelas 2025 ──
    const calc=calcFerias(salario,dias);
    const valorManual=Number(gv('f-valor')||0);
    const valor=valorManual>0?valorManual:calc.liquido;
    return{funcId,nomeFuncionario:fn,dataInicio:ci,dataFim:co,dias,
      salarioBase:salario,...calc,valor,
      status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='rh_ponto'){
    const fs=by('f-func-id');
    const entrada=gv('f-entrada'),saida=gv('f-saida');
    const intSaida=gv('f-int-saida'),intRetorno=gv('f-int-retorno');
    // Cálculo automático das horas
    const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};
    const fmtHM=m=>{const h=Math.floor(Math.abs(m)/60),mn=Math.abs(m)%60;return(m<0?'-':'')+String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');};
    let minTrab=0,minExtra=0;
    if(entrada&&saida){
      const totalMin=toMin(saida)-toMin(entrada);
      const intervaloMin=(intSaida&&intRetorno)?Math.max(0,toMin(intRetorno)-toMin(intSaida)):0;
      minTrab=Math.max(0,totalMin-intervaloMin);
      const jornadaPadrao=8*60; // 8h padrão CLT
      minExtra=Math.max(0,minTrab-jornadaPadrao);
    }
    const horasTrabalhadas=fmtHM(minTrab);
    const horasExtras=fmtHM(minExtra);
    const intervalo=intSaida&&intRetorno?intSaida+'-'+intRetorno:'';
    return{funcId:fs?.value||'',nomeFuncionario:fs?.options[fs.selectedIndex]?.text||'',
      data:gv('f-data'),entrada,saida,intervaloSaida:intSaida,intervaloRetorno:intRetorno,
      intervalo,horasTrabalhadas,horasExtras,status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='rh_deslig'){
    const fs=by('f-func-id');
    const funcId=fs?.value||'';
    const fn=fs?.options[fs?.selectedIndex]?.text||'';
    const opt=fs?.selectedIndex>0?fs.options[fs.selectedIndex]:null;
    const sal=Number(opt?.dataset?.salario||0);
    const admissao=opt?.dataset?.admissao||'';
    const desligDate=gv('f-deslig-data')||td();
    const motivo=gv('f-motivo')||'Sem Justa Causa';
    const avisoPrevio=gv('f-aviso')==='trabalhado';
    const saldoDias=Number(gv('f-saldo-dias')||0);
    const feriasVencidas=Number(gv('f-ferias-vencidas')||0);
    const feriasProporcionais=Number(gv('f-ferias-prop')||0);
    let mesesTrab=0;
    if(admissao&&desligDate){
      const dtA=new Date(admissao+'T12:00:00'),dtD=new Date(desligDate+'T12:00:00');
      mesesTrab=Math.max(0,Math.round((dtD-dtA)/(30.44*86400000)));
    }
    const calc=calcRescisao(sal,mesesTrab,motivo,avisoPrevio,saldoDias,feriasVencidas,feriasProporcionais);
    return{funcId,nomeFuncionario:fn,salarioBase:sal,dataAdmissao:admissao,
      dataDesligamento:desligDate,motivo,avisoPrevio,saldoDias,feriasVencidas,feriasProporcionais,
      mesesTrabalhados:mesesTrab,...calc,totalRescisao:calc.liquido,
      status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='plano')return{codigo:gv('f-cod'),tipo:gv('f-tipo'),nome:gv('f-nome'),descricao:gv('f-desc')};
  return{};
}

function saveRec(col,data,eid){
  // eid é o id do registro existente (passado explicitamente, pois S.eid pode já estar nulo)
  const db=ld(),fid=S.fid;
  let l=gfd(db,fid,col);
  if(eid) l=l.map(i=>i.id===eid?{...i,...data}:i);
  else l=[...l,{id:uid(),...data}];
  sfd(db,fid,col,l);
  sv(db);
  // Garante que a UI sempre atualiza após salvar
  render();
}
function delRec(col,id){
  const db=ld(),fid=S.fid;
  sfd(db,fid,col,gfd(db,fid,col).filter(i=>i.id!==id));
  sv(db);
  render(); // redesenha imediatamente após excluir
}

function aprovarEnt(id){
  const db=ld(),fid=S.fid;
  const ents=gfd(db,fid,'ent'),e=ents.find(x=>x.id===id);if(!e)return;
  const ps=gfd(db,fid,'prod');
  // Tenta por prodId, fallback por nome
  let pi=e.prodId?ps.findIndex(p=>p.id===e.prodId):-1;
  if(pi<0&&e.prodNome)pi=ps.findIndex(p=>p.produto?.toLowerCase()===e.prodNome?.toLowerCase());
  if(pi>=0){
    ps[pi].quantidade=Number(ps[pi].quantidade||0)+Number(e.quantidade||0);
    ps[pi].dataUltimaContagem=e.data;
  }
  const ei=ents.findIndex(x=>x.id===id);
  ents[ei]={...ents[ei],status:'Aprovado',dataAprovacao:td()};
  sfd(db,fid,'prod',ps);sfd(db,fid,'ent',ents);sv(db);
}
function aprovarCont(id){
  const db=ld(),fid=S.fid;
  const cs=gfd(db,fid,'cont'),c=cs.find(x=>x.id===id);if(!c)return;
  const ps=gfd(db,fid,'prod'),pi=ps.findIndex(p=>p.id===c.prodId);
  if(pi>=0){ps[pi].quantidade=Number(c.quantidadeContada||0);ps[pi].dataUltimaContagem=c.data}
  const ci=cs.findIndex(x=>x.id===id);cs[ci]={...cs[ci],status:'Aprovado',dataAprovacao:td()};
  sfd(db,fid,'prod',ps);sfd(db,fid,'cont',cs);sv(db);
}
function aprovarPed(id){
  const db=ld(),fid=S.fid;
  const ps=gfd(db,fid,'pedidos'),pi=ps.findIndex(p=>p.id===id);if(pi<0)return;
  const ped=ps[pi];ps[pi]={...ped,status:'Aprovado',dataAprovacao:td()};
  const prods=gfd(db,fid,'prod');
  const ents=gfd(db,fid,'ent');
  for(const it of(ped.itens||[])){
    // Tenta linkar ao produto cadastrado pelo nome
    const prodCad=prods.find(p=>p.produto?.toLowerCase()===it.nome?.toLowerCase());
    ents.push({
      id:uid(),
      prodId:prodCad?.id||'',
      prodNome:it.nome,
      quantidade:Number(it.qtd||0),
      data:td(),
      origem:'pedido',
      pedidoId:id,
      pedidoDesc:ped.fornecedor||ped.descricao||'',
      fornecedor:ped.fornecedor||ped.descricao||'',
      responsavel:'Pedido de Compra',
      status:'Pendente',
      observacoes:'Pedido: '+(ped.fornecedor||ped.descricao||''),
    });
  }
  sfd(db,fid,'pedidos',ps);sfd(db,fid,'ent',ents);sv(db);
}

/* ── Busca plano de contas de comissão (nome contendo "comiss") ── */
function pcComissao(){
  const pcs=gpc();
  return pcs.find(p=>p.nome?.toLowerCase().includes('comiss'))||null;
}

/* ── Lança CP de comissão garantindo categoria=Colaborador ── */
function lancarCpComissao(db,fid,vendedorId,vendedorNome,valorComissao,referencia,refId,origem){
  if(!vendedorId||!valorComissao||valorComissao<=0)return;
  // Verifica se já foi lançado para este refId+origem
  const cpAtual=gfd(db,fid,'cp');
  if(cpAtual.find(c=>c.origem===origem&&c.refId===refId))return;
  const pc=pcComissao();
  cpAtual.push({
    id:uid(),
    nome:vendedorNome,
    categoria:'Colaborador',           // sempre Colaborador
    referencia,
    valor:Number(valorComissao),
    vencimento:td(),
    status:'Pendente',
    parcelamento:'À vista',
    origem,
    refId,
    planoContaId:pc?.id||'',
    planoConta:pc?.nome||'Comissão de Vendas',
  });
  sfd(db,fid,'cp',cpAtual);
}

/* ── Pousada: salva e reage a mudanças de status ── */
function salvarPousada(data,eid){
  // Lê o DB uma única vez — todas as operações neste objeto, salva ao final
  const db=ld();
  const fid=S.fid;

  if(eid){
    const lista=gfd(db,fid,'pousada');
    const anterior=lista.find(i=>i.id===eid)||{};
    const statusAnterior=anterior.status||'';
    const statusNovo=data.status||'';
    const concluindo=statusNovo==='Concluído'&&statusAnterior!=='Concluído';

    // Atualiza registro da pousada
    sfd(db,fid,'pousada',lista.map(i=>i.id===eid?{...i,...data}:i));

    if(concluindo){
      // Marca CR vinculados como Recebido
      const cr=gfd(db,fid,'cr');
      sfd(db,fid,'cr',cr.map(r=>{
        const vinc=r.origem==='pousada'&&(r.refId===eid||r.nome?.includes(anterior.nomeHospede||'\x00'));
        return vinc?{...r,status:'Recebido',dataRecebimento:td()}:r;
      }));

      // Lança comissão no CP (categoria=Colaborador automático)
      lancarCpComissao(
        db,fid,
        data.vendedorId,
        data.vendedorNome||anterior.vendedorNome,
        data.valorComissao??anterior.valorComissao,
        `Comissão pousada — ${data.nomeHospede||anterior.nomeHospede} (${data.acomodacao||anterior.acomodacao})`,
        eid,
        'pousada_comissao'
      );
    }

  } else {
    // Novo registro
    const novoId=uid();
    const lista=gfd(db,fid,'pousada');
    lista.push({id:novoId,...data});
    sfd(db,fid,'pousada',lista);

    // Entrada → CR Recebido
    if(Number(data.valorEntrada)>0){
      const cr=gfd(db,fid,'cr');
      cr.push({id:uid(),nome:`Entrada — ${data.nomeHospede} (${data.acomodacao})`,
        descricao:'Entrada de reserva pousada',valor:Number(data.valorEntrada),
        entrada:0,saldo:0,status:'Recebido',vencimento:td(),
        origem:'pousada',refId:novoId,formaPagamento:data.formaPagamento});
      sfd(db,fid,'cr',cr);
    }
    // Saldo → CR Pendente
    if(Number(data.valorTotal)>0){
      const cr=gfd(db,fid,'cr');
      cr.push({id:uid(),nome:`Saldo — ${data.nomeHospede} (${data.acomodacao})`,
        descricao:'Saldo restante da reserva',valor:Number(data.valorTotal),
        entrada:0,saldo:Number(data.valorTotal),status:'Pendente',
        vencimento:data.checkOut||td(),origem:'pousada',refId:novoId,
        formaPagamento:data.formaPagamento});
      sfd(db,fid,'cr',cr);
    }
    // Comissão → CP Pendente (categoria=Colaborador automático)
    lancarCpComissao(
      db,fid,
      data.vendedorId,data.vendedorNome,data.valorComissao,
      `Comissão pousada — ${data.nomeHospede} (${data.acomodacao})`,
      novoId,'pousada_comissao'
    );
  }

  // Salva tudo de uma vez (garante isolamento de filial)
  sv(db);
}

/* ── Voo: salva e reage a mudanças de status ── */

  const db=ld();

  const nPassageiros=(data.passageiros||[]).length;

  const valorRes=Number(data.valorReserva||0);
  const valorTot=Number(data.valorTotal||0);

  /* Gera termo PDF (base64) quando status = Agendado */
  const virouAgendado=(stAnt,stNovo)=>stNovo==='Agendado'&&stAnt!=='Agendado';
  const gerarEsalvarTermo=(lista,id,passageiros,dVoo)=>{
    if(!passageiros||!passageiros.length)return lista;
    const b64=gerarTermoBase64(passageiros,dVoo);

    const stAnt=ant.status||'';
    const stNovo=data.status||'';

    // Atualiza registro
    lista=lista.map(i=>i.id===eid?{...i,...data}:i);

    // ── Agendado → gera termo PDF e salva no registro
    if(virouAgendado(stAnt,stNovo)){
      const pass=data.passageiros||ant.passageiros||[];
      const dV=data.dataVoo||ant.dataVoo||dataVoo;
      lista=gerarEsalvarTermo(lista,eid,pass,dV);
    }

    sfd(db,fid,'voo',lista);

    // ── Reserva efetuada → lança valor da reserva como Recebido no CR
    const virouReserva=stNovo==='Reserva efetuada'&&stAnt!=='Reserva efetuada'&&stAnt!=='Realizado';
    if(virouReserva&&valorRes>0){
      const cr=gfd(db,fid,'cr');
      const jaExiste=cr.find(r=>r.origem==='voo_reserva'&&r.refId===eid);
      if(!jaExiste){
        cr.push({
          id:uid(),
          nome:`Reserva voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Entrada de reserva | Prefixo: ${ant.prefixo||prefixo}`,
          valor:valorRes,
          entrada:0,saldo:0,
          status:'Recebido',
          vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:eid,
        });
        sfd(db,fid,'cr',cr);
      }
    }

    // ── Realizado → lança saldo restante como Recebido no CR
    const virouRealizado=stNovo==='Realizado'&&stAnt!=='Realizado';
    if(virouRealizado){
      const vVoo=Number(data.valorVoo||ant.valorVoo||0);
      const vRe=Number(data.valorReserva||ant.valorReserva||0);
      const vSaldo=Math.max(0,vVoo-vRe);
      const cr=gfd(db,fid,'cr');

      // Se reserva ainda não foi lançada (veio direto para Realizado), lança tudo
      const temReserva=cr.find(r=>r.origem==='voo_reserva'&&r.refId===eid);
      if(!temReserva&&vRe>0){
        cr.push({
          id:uid(),
          nome:`Reserva voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Reserva | Prefixo: ${ant.prefixo||prefixo}`,
          valor:vRe,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:eid,
        });
      }

      // Lança saldo (valor total − reserva)
      const temSaldo=cr.find(r=>r.origem==='voo_saldo'&&r.refId===eid);
      if(!temSaldo&&vSaldo>0){
        cr.push({
          id:uid(),
          nome:`Saldo voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Passageiros: ${(data.passageiros||ant.passageiros||[]).length} | Prefixo: ${ant.prefixo||prefixo}`,
          valor:vSaldo,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_saldo',refId:eid,
        });
      } else if(temSaldo){
        cr.forEach((r,i)=>{if(r.origem==='voo_saldo'&&r.refId===eid)cr[i]={...r,status:'Recebido',dataRecebimento:td()}});
      }

      sfd(db,fid,'cr',cr);

      // Comissão → CP
      lancarCpComissao(
        db,fid,
        data.vendedorId||ant.vendedorId,
        data.vendedorNome||ant.vendedorNome,
        data.valorComissao??ant.valorComissao,
        `Comissão voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
        eid,'voo_comissao'
      );
    }

  } else {
    // Novo voo
    const novoId=uid();
    let lista=gfd(db,fid,'voo');
    lista.push({id:novoId,...data});

    // ── Agendado → gera termo PDF e salva no registro
    if(data.status==='Agendado'&&data.passageiros&&data.passageiros.length){
      lista=gerarEsalvarTermo(lista,novoId,data.passageiros,data.dataVoo);
    }

    sfd(db,fid,'voo',lista);

    // ── Reserva efetuada → lança valor da reserva no CR
    if(data.status==='Reserva efetuada'&&valorRes>0){
      const cr=gfd(db,fid,'cr');
      cr.push({
        id:uid(),
        nome:`Reserva voo — ${piloto} (${fmtD(dataVoo)})`,
        descricao:`Entrada de reserva | Prefixo: ${prefixo}`,
        valor:valorRes,entrada:0,saldo:0,
        status:'Recebido',vencimento:td(),dataRecebimento:td(),
        origem:'voo_reserva',refId:novoId,
      });
      sfd(db,fid,'cr',cr);
    }

    // ── Realizado direto → lança reserva + saldo no CR
    if(data.status==='Realizado'){
      const cr=gfd(db,fid,'cr');
      if(valorRes>0){
        cr.push({
          id:uid(),nome:`Reserva voo — ${piloto} (${fmtD(dataVoo)})`,
          descricao:`Reserva | Prefixo: ${prefixo}`,
          valor:valorRes,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:novoId,
        });
      }
      const vSaldo=Math.max(0,valorVoo-valorRes);
      if(vSaldo>0){
        cr.push({
          id:uid(),nome:`Saldo voo — ${piloto} (${fmtD(dataVoo)})`,
          descricao:`Passageiros: ${nPassageiros} | Prefixo: ${prefixo}`,
          valor:vSaldo,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_saldo',refId:novoId,
        });
      }
      sfd(db,fid,'cr',cr);
    }

    // Comissão → CP
    lancarCpComissao(
      db,fid,
      data.vendedorId,data.vendedorNome,data.valorComissao,
      `Comissão voo — ${piloto} (${fmtD(dataVoo)})`,
      novoId,'voo_comissao'
    );
  }

  sv(db);
}

/* ── syncPass ── */
function syncPass(){
  if(S.modal!=='voo')return;
  const ns=document.querySelectorAll('.p-nome'),cs=document.querySelectorAll('.p-cpf'),ces=document.querySelectorAll('.p-cel'),ps=document.querySelectorAll('.p-peso'),hs=document.querySelectorAll('.p-hosp');
  if(!ns.length)return;
  S.form.passageiros=Array.from(ns).map((e,i)=>({nome:e.value,cpf:cs[i]?.value||'',celular:ces[i]?.value||'',peso:ps[i]?.value||'',hospId:hs[i]?.value||''}));
}

/* ── modalFor ── */
function mFor(){
  const p=S.page,t=S.tab||'forn';
  if(p==='cadastros')return t;
  if(p==='estoque')return S.tab||'prod';
  if(p==='agendas'){if(S.op==='pousada')return'pousada';if(S.op==='voo')return'voo';}
  if(p==='estoque'){const tabMap={'prod':'prod','ent':'ent','cont':'cont','said':'said','pedidos':'pedidos'};return tabMap[S.tab]||'prod';}
  const m={'contas-pagar':'cp','contas-receber':'cr',vendas:'vendas',operacional:'docs'};
  return m[p]||p;
}

function bindAll(){
  by('btn-out')?.addEventListener('click',()=>{S.ok=false;S.user=null;render()});

  /* ── Mobile: injeta data-label em todas as células de tabela ──
     Lê os cabeçalhos (th) e adiciona o texto como atributo data-label nos td's

  document.querySelectorAll('table').forEach(tbl=>{
    const ths=Array.from(tbl.querySelectorAll('thead th')).map(th=>th.textContent.trim());

  const closeSb=()=>{sbMain?.classList.remove('open');sbOv?.classList.remove('open');sbHam&&(sbHam.textContent='☰')};

  on('[data-op]','click',e=>{S.op=e.currentTarget.dataset.op;render()});
  by('btn-back')?.addEventListener('click',()=>{S.op='';render()});
  by('f-status')?.addEventListener('change',e=>{S.fs=e.target.value;render()});
  by('f-cat')?.addEventListener('change',e=>{S.fc=e.target.value;render()});
  by('f-mes')?.addEventListener('change',e=>{S.fm=e.target.value;render()});
  by('f-ano')?.addEventListener('change',e=>{S.fm=e.target.value;render()});
  by('f-mes')?.addEventListener('change',e=>{S.fm=e.target.value;render()});
  by('f-busca')?.addEventListener('input',e=>{S.fb=e.target.value;render()});

  by('btn-new')?.addEventListener('click',()=>{S.modal=mFor();S.eid=null;S.form={};render()});
  by('btn-new-fil')?.addEventListener('click',()=>{S.modal='filial';S.eid=null;S.form={modulos:MODS.map(m=>m.id)};render()});
  by('btn-new-usr')?.addEventListener('click',()=>{S.modal='usuario';S.eid=null;S.form={perfil:'usuario',filiais:[],modulos:MODS.filter(m=>m.grp!=='adm').map(m=>m.id)};render()});
  // Financeiro btn-new
  if(S.page==='financeiro'){
    by('btn-new')?.addEventListener('click',()=>{
      const tabMap={'cp':'cp','cr':'cr','despesas':'despesas','vendas':'vendas','escala':'escala','dashboard':'cp','dre':'cp'};
      S.modal=tabMap[S.finTab||'cp']||'cp';S.eid=null;S.form={};render();
    });
  }
  // RH btn-new — opens correct modal for current tab
  if(S.page==='rh'){
    by('btn-new')?.addEventListener('click',()=>{
      const tabMap={'func':'rh_func','folha':'rh_folha','ferias':'rh_ferias','ponto':'rh_ponto','deslig':'rh_deslig'};
      S.modal=tabMap[S.tab||'func']||'rh_func';S.eid=null;S.form={};render();
    });
  }
  by('btn-new-pc')?.addEventListener('click',()=>{S.modal='plano';S.eid=null;S.form={};render()});

  on('[data-ed]','click',e=>{const id=e.currentTarget.dataset.ed,col=e.currentTarget.dataset.col,db=ld(),item=gfd(db,S.fid,col).find(i=>i.id===id);S.modal=col;S.eid=id;S.form={...item};render()});
  on('[data-dl]','click',e=>{if(confirm('Excluir?')){delRec(e.currentTarget.dataset.col,e.currentTarget.dataset.dl);render()}});
  on('[data-ap]','click',e=>{
    const id=e.currentTarget.dataset.ap,col=e.currentTarget.dataset.col;
    if(col==='ent')aprovarEnt(id);
    else if(col==='cont')aprovarCont(id);
    else if(col==='pedidos'){
      aprovarPed(id);
      // Após aprovar pedido, vai para aba Entradas para confirmar os itens
      const n=S.form.itens?.length||0;
      alert('✅ Pedido aprovado! Os itens estão disponíveis na aba Entradas para confirmação.');
      S.tab='ent';
    }
    render();
  });

  on('[data-edf]','click',e=>{const id=e.currentTarget.dataset.edf,f=gfil().find(x=>x.id===id);S.modal='filial';S.eid=id;S.form={...f};render()});
  on('[data-dlf]','click',e=>{
    const id=e.currentTarget.dataset.dlf;
    const fils=gfil();
    if(fils.length<=1){alert('Não é possível excluir a única filial.');return;}
    const f=fils.find(x=>x.id===id);
    if(!confirm('Excluir a filial "'+(f?.nome||id)+'"? Todos os dados desta filial serão apagados permanentemente.'))return;
    const novas=fils.filter(x=>x.id!==id);
    sfil(novas);
    // Limpa dados da filial do cache local
    const db=ld();delete db[id];_cache=db;localStorage.setItem(K,JSON.stringify(db));
    if(S.fid===id)S.fid=novas[0]?.id||null;
    alert('Filial excluída.');
    render();
  });
  on('[data-pmf]','click',e=>{const id=e.currentTarget.dataset.pmf,f=gfil().find(x=>x.id===id);S.modal='filial';S.eid=id;S.form={...f,modulos:f.modulos||MODS.map(m=>m.id)};render()});
  on('[data-edu]','click',e=>{const id=e.currentTarget.dataset.edu,u=gus().find(x=>x.id===id);S.modal='usuario';S.eid=id;S.form={...u};render()});
  on('[data-dlu]','click',e=>{if(confirm('Excluir usuário?')){const us=gus().filter(u=>u.id!==e.currentTarget.dataset.dlu);sus(us);render()}});
  on('[data-edp]','click',e=>{const id=e.currentTarget.dataset.edp,p=gpc().find(x=>x.id===id);S.modal='plano';S.eid=id;S.form={...p};render()});
  on('[data-dlp]','click',e=>{if(confirm('Excluir plano?')){const pc=gpc().filter(p=>p.id!==e.currentTarget.dataset.dlp);spc(pc);render()}});

  by('modal-x')?.addEventListener('click',()=>{S.modal=null;render()});
  by('modal-cancel')?.addEventListener('click',()=>{S.modal=null;render()});
  by('ov')?.addEventListener('click',e=>{if(e.target===by('ov')){S.modal=null;render()}});

  /* Selecionar cadastrado → preenche nome em contas a pagar */
  by('f-ref')?.addEventListener('change',e=>{
    const id=e.target.value;if(!id)return;
    const db=ld(),fid=S.fid,todos=[...gfd(db,fid,'forn'),...gfd(db,fid,'colab'),...gfd(db,fid,'prest'),...gfd(db,fid,'atrac')],found=todos.find(x=>x.id===id);
    if(found){S.form={...S.form,nome:found.nome};const el=by('f-nome');if(el)el.value=found.nome}
  });

  /* Cálculo automático CR (valor − entrada) */
  ['f-valor','f-entrada'].forEach(id=>{
    by(id)?.addEventListener('input',()=>{
      const vl=Number(gv('f-valor')||0),en=Number(gv('f-entrada')||0);
      const s=by('saldo-cr');if(s)s.textContent=fmt(Math.max(0,vl-en));
    });
  });

  /* ── Pousada: diária × dias = reserva; reserva − entrada = saldo ── */
  const recalcPousada=()=>{
    const diaria=Number(gv('f-diaria')||0);
    const dc=by('dias-calc');
    const dias=dc?Number(dc.textContent||0):0;
    if(diaria>0&&dias>0){
      const vr=parseFloat((diaria*dias).toFixed(2));
      const el=by('f-vr');if(el)el.value=vr;
      const sh=by('ps-vr-show');if(sh)sh.textContent=fmt(vr);
      const vE=Number(gv('f-ve')||0);
      const sc=by('vt-calc');if(sc)sc.textContent=fmt(Math.max(0,vr-vE));
      const ve2=by('ps-ve-show');if(ve2)ve2.textContent=fmt(vE);
      const pct=Number(gv('f-pct-com')||0);
      const com=by('vcom-ps');if(com)com.textContent=fmt(parseFloat((vr*pct/100).toFixed(2)));
      const base=by('com-base-ps');if(base)base.textContent=fmt(vr);
    }
  };
  const recalcSaldoPs=()=>{
    const vR=Number(gv('f-vr')||0),vE=Number(gv('f-ve')||0);
    const sc=by('vt-calc');if(sc)sc.textContent=fmt(Math.max(0,vR-vE));
    const sh=by('ps-vr-show');if(sh)sh.textContent=fmt(vR);
    const ve2=by('ps-ve-show');if(ve2)ve2.textContent=fmt(vE);
    const pct=Number(gv('f-pct-com')||0);
    const com=by('vcom-ps');if(com)com.textContent=fmt(parseFloat((vR*pct/100).toFixed(2)));
    const base=by('com-base-ps');if(base)base.textContent=fmt(vR);
    const pl=by('com-pct-lbl-ps');if(pl)pl.textContent=`× ${pct}%:`;
  };
  by('f-diaria')?.addEventListener('input',recalcPousada);
  by('f-vr')?.addEventListener('input',recalcSaldoPs);
  by('f-ve')?.addEventListener('input',recalcSaldoPs);
  ['f-ci','f-co'].forEach(id=>{
    by(id)?.addEventListener('change',()=>{
      const ci=gv('f-ci'),co=gv('f-co');
      if(!ci||!co)return;
      const dias=Math.max(0,Math.round((new Date(co+'T12:00:00')-new Date(ci+'T12:00:00'))/86400000)+1);
      const dc=by('dias-calc');if(dc)dc.textContent=dias;
      recalcPousada();
    });
  });

  /* ── Voo: valor por passageiro × qtd passageiros = valor total voo ── */
  const getQtdPass=()=>Math.max(document.querySelectorAll('.p-nome').length,1);
  const recalcVoo=()=>{
    const vPorPass=Number(gv('f-vppass')||0);
    const qtd=getQtdPass();
    const qc=by('qtd-pass-calc');if(qc)qc.textContent=qtd;
    const lbl=by('pass-count-lbl');if(lbl)lbl.textContent=`(${qtd})`;
    if(vPorPass>0){
      const vv=parseFloat((vPorPass*qtd).toFixed(2));
      const el=by('f-vv');if(el)el.value=vv;
      const sh=by('voo-vv-show');if(sh)sh.textContent=fmt(vv);
      const vRes=Number(gv('f-vres')||0);
      const sc=by('vt-voo');if(sc)sc.textContent=fmt(Math.max(0,vv-vRes));
      const pct=Number(gv('f-pct-com')||0);
      const com=by('vcom-voo');if(com)com.textContent=fmt(parseFloat((vv*pct/100).toFixed(2)));
      const base=by('com-base-voo');if(base)base.textContent=fmt(vv);
    }
  };
  const recalcSaldoVoo=()=>{
    const vV=Number(gv('f-vv')||0),vRes=Number(gv('f-vres')||0);
    const sc=by('vt-voo');if(sc)sc.textContent=fmt(Math.max(0,vV-vRes));
    const sv2=by('voo-vv-show');if(sv2)sv2.textContent=fmt(vV);
    const vr2=by('voo-vr-show');if(vr2)vr2.textContent=fmt(vRes);
    const pct=Number(gv('f-pct-com')||0);
    const com=by('vcom-voo');if(com)com.textContent=fmt(parseFloat((vV*pct/100).toFixed(2)));
    const base=by('com-base-voo');if(base)base.textContent=fmt(vV);
    const pl=by('com-pct-label');if(pl)pl.textContent=`× ${pct}%:`;
  };
  by('f-vppass')?.addEventListener('input',recalcVoo);
  by('f-vv')?.addEventListener('input',recalcSaldoVoo);
  by('f-vres')?.addEventListener('input',recalcSaldoVoo);
  by('f-pct-com')?.addEventListener('input',()=>{recalcSaldoPs();recalcSaldoVoo();});

  /* Aparência — preview em tempo real */
  by('ap-nome')?.addEventListener('input',e=>{
    const v=e.target.value||'GF';
    const ic=by('ap-preview-ic');if(ic)ic.textContent=v.replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'GF';
    const nm=by('ap-preview-nm');if(nm)nm.textContent=v;
  });
  by('ap-sub')?.addEventListener('input',e=>{const el=by('ap-preview-sb');if(el)el.textContent=e.target.value});

  /* Aparência — salvar */
  by('btn-save-ap')?.addEventListener('click',()=>{
    const nome=gv('ap-nome')||'Gestão Financeira';
    const sub=gv('ap-sub')||'Multi-Filial';
    sapp({nome,sub});
    alert(`✅ Aparência salva!\nO sistema agora se chama: "${nome}"`);
    render();
  });

  /* ── Ponto: cálculo automático de horas ao mudar campos ── */
  const calcPontoHoras=()=>{
    const entrada=gv('f-entrada'),saida=gv('f-saida');
    const intSaida=gv('f-int-saida'),intRetorno=gv('f-int-retorno');
    const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};
    const fmtHM=m=>{const h=Math.floor(m/60),mn=m%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');};
    if(!entrada||!saida) return;
    const totalMin=toMin(saida)-toMin(entrada);
    const intervaloMin=(intSaida&&intRetorno)?Math.max(0,toMin(intRetorno)-toMin(intSaida)):0;
    const minTrab=Math.max(0,totalMin-intervaloMin);
    const minExtra=Math.max(0,minTrab-480); // 8h = 480min
    const horasEl=by('ponto-horas-calc');
    const extraEl=by('ponto-hextra-calc');
    if(horasEl) horasEl.textContent=fmtHM(minTrab);
    if(extraEl){extraEl.textContent=fmtHM(minExtra);extraEl.style.color=minExtra>0?'var(--amber-t)':'var(--text3)';}
  };
  ['f-entrada','f-saida','f-int-saida','f-int-retorno'].forEach(id=>{
    by(id)?.addEventListener('change',calcPontoHoras);
  });
  // Calcula na abertura se já tem dados
  calcPontoHoras();

  /* ── Férias: atualiza dias e cálculo em tempo real ao mudar datas ── */
  const atualizaFerias=()=>{
    const ci=gv('f-inicio'),co=gv('f-fim');
    if(!ci||!co) return;
    const dias=Math.max(0,Math.round((new Date(co+'T12:00:00')-new Date(ci+'T12:00:00'))/86400000)+1);
    // Atualiza o contador de dias
    const diasEl=by('ferias-dias');
    if(diasEl) diasEl.textContent=dias;
    // Atualiza form para o modal re-renderizar com os valores corretos
    S.form.dataInicio=ci;
    S.form.dataFim=co;
    S.form.dias=dias;

  let _cpStream=null;
  async function _startCpCam(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      alert('Câmera não disponível neste navegador.');return;
    }
    const box=by('cp-camera-box');
    if(box&&box.style.display==='block'){
      if(_cpStream){_cpStream.getTracks().forEach(t=>t.stop());_cpStream=null;}
      box.style.display='none';return;
    }
    try{
      _cpStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
      });
      const video=by('cp-video');
      if(!video){if(_cpStream){_cpStream.getTracks().forEach(t=>t.stop());_cpStream=null;}return;}
      video.srcObject=_cpStream;
      await new Promise(res=>{video.onloadedmetadata=()=>{video.play().then(res).catch(res);};});
      if(box) box.style.display='block';
    }catch(err){
      if(_cpStream){_cpStream.getTracks().forEach(t=>t.stop());_cpStream=null;}
      const msg=err.name==='NotAllowedError'?'Permissão da câmera negada. Permita nas configurações do navegador.':
                err.name==='NotFoundError'?'Câmera não encontrada neste dispositivo.':
                'Câmera indisponível: '+err.message;
      alert(msg);
    }
  }

  by('btn-gerar-folha')?.addEventListener('click',()=>{
    const db=ld(),fid=S.fid;
    const funcs=gfd(db,fid,'rh_func').filter(f=>f.status==='Ativo');
    if(!funcs.length){alert('Nenhum funcionário ativo cadastrado.');return;}
    const mes=Number(S.fm||new Date().getMonth()+1),ano=Number(S.fb||new Date().getFullYear());
    const hoje=new Date();
    const diaHoje=hoje.getDate();

    // Determina tipo de lançamento pelo dia atual
    const isAdiantamento=diaHoje>=1&&diaHoje<=14;
    const tipo=isAdiantamento?'adiantamento':'salario';
    const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const nomeMes=MESES[mes-1];

    // Data de pagamento: adiantamento → dia 15 deste mês; salário → dia 01 mês seguinte
    let dtPag;
    if(isAdiantamento){
      dtPag=`${ano}-${String(mes).padStart(2,'0')}-15`;
    } else {
      const proxMes=mes===12?1:mes+1;
      const proxAno=mes===12?ano+1:ano;
      dtPag=`${proxAno}-${String(proxMes).padStart(2,'0')}-01`;
    }

    // Verifica se já existe folha do mesmo tipo/mês
    let folha=gfd(db,fid,'rh_folha');
    const jaGerada=folha.find(f=>Number(f.mes)===mes&&Number(f.ano)===ano&&f.tipo===tipo);
    if(jaGerada&&!confirm(`Já existe ${isAdiantamento?'adiantamento':'folha'} para ${nomeMes}/${ano}. Substituir?`))return;
    folha=folha.filter(f=>!(Number(f.mes)===mes&&Number(f.ano)===ano&&f.tipo===tipo));

    // Para cálculo do salário: desconta adiantamento já pago
    const adiantamentos=gfd(db,fid,'rh_folha').filter(f=>
      Number(f.mes)===mes&&Number(f.ano)===ano&&f.tipo==='adiantamento'
    );

    let cp=gfd(db,fid,'cp');
    const novosLancamentos=[];

    funcs.forEach(func=>{
      const sb=Number(func.salario||0);
      const inss=parseFloat((sb*0.09).toFixed(2));
      const fgts=parseFloat((sb*0.08).toFixed(2));
      const irrf=sb>4664.68?parseFloat(((sb-4664.68)*0.275-896.00).toFixed(2)):0;

      let valorLiq,descAdiantamento=0,labelTipo;

      if(isAdiantamento){
        // Adiantamento = 50% do salário bruto
        valorLiq=parseFloat((sb*0.5).toFixed(2));
        labelTipo='Adiantamento Salarial';
      } else {
        // Salário = líquido − adiantamento já pago
        const liqTotal=parseFloat((sb-inss-irrf).toFixed(2));
        const adiant=adiantamentos.find(a=>a.funcId===func.id);
        descAdiantamento=adiant?Number(adiant.salarioLiquido||0):0;
        valorLiq=parseFloat((liqTotal-descAdiantamento).toFixed(2));
        labelTipo='Pagamento de Salário';
      }

      const fId=uid();
      folha.push({
        id:fId,funcId:func.id,nomeFuncionario:func.nome,cargo:func.cargo||'',
        mes,ano,tipo,labelTipo,
        salarioBase:sb,
        horasExtra:0,bonus:0,
        descontos:descAdiantamento,
        inss:isAdiantamento?0:inss,
        irrf:isAdiantamento?0:irrf,
        fgts,
        salarioLiquido:Math.max(0,valorLiq),
        statusPagamento:false,
        dataPagamento:dtPag,
        cpId:'' // será preenchido abaixo
      });

      // Lança no Contas a Pagar automaticamente
      const cpId=uid();
      folha[folha.length-1].cpId=cpId;
      cp.push({
        id:cpId,
        nome:func.nome,
        categoria:'Folha de Pagamento',
        referencia:`${labelTipo} — ${nomeMes}/${ano}`,
        planoContaId:'',planoConta:'Folha de Pagamento',
        valor:Math.max(0,valorLiq),
        vencimento:dtPag,
        dataPagamento:'',
        parcelamento:'À vista',
        status:'Pendente',
        origem:'rh_folha',
        origemId:fId,
        observacoes:`${labelTipo} de ${func.nome} — ${nomeMes}/${ano}${descAdiantamento?` (desc. adiant. R$${descAdiantamento.toFixed(2)})`:''}`
      });
      novosLancamentos.push(func.nome);
    });

    sfd(db,fid,'rh_folha',folha);
    sfd(db,fid,'cp',cp);
    sv(db);

    render();
  });

  /* ── Barcode scanner (câmera) ── */
  /* ══════════════════════════════════════════════
     SCANNER UNIVERSAL — iOS Safari + Android + Desktop
     Usa ZXing-js (funciona em todos os browsers)
     com fallback para BarcodeDetector API nativo
  ══════════════════════════════════════════════ */
  let _scanStream=null;
  let _scanAnimFrame=null;
  let _zxingReader=null;

  function _stopScanner(){
    if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}
    if(_scanAnimFrame){cancelAnimationFrame(_scanAnimFrame);_scanAnimFrame=null;}
    const box=by('barcode-reader-box');
    if(box) box.style.display='none';
  }

  async function _startScanner(targetInputId, resultBoxId){
    const box=by('barcode-reader-box');
    if(!box) return;

    // Se câmera já aberta — fechar
    if(box.style.display==='block'){_stopScanner();return;}

    // Verifica suporte a câmera
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      alert('Câmera não disponível neste navegador. Use o campo de texto para digitar o código.');
      return;
    }

    box.style.display='block';
    const video=by('barcode-video');
    const canvas=by('barcode-canvas');
    const resultEl=by(resultBoxId||'barcode-result');

    if(!video||!canvas){box.style.display='none';return;}

    // Limpa resultado anterior
    if(resultEl){resultEl.style.display='none';resultEl.textContent='';}

    try{
      _scanStream=await navigator.mediaDevices.getUserMedia({
        video:{
          facingMode:{ideal:'environment'}, // câmera traseira preferencial
          width:{ideal:1920},
          height:{ideal:1080}
        }
      });
      video.srcObject=_scanStream;
      await new Promise(res=>{video.onloadedmetadata=()=>{video.play().then(res).catch(res);}});
    }catch(err){
      _stopScanner();
      const msg=err.name==='NotAllowedError'?'Permissão da câmera negada. Permita o acesso à câmera nas configurações do navegador.':
                err.name==='NotFoundError'?'Câmera não encontrada neste dispositivo.':
                'Câmera indisponível: '+err.message;
      alert(msg);
      return;
    }

    const onCode=code=>{
      const inp=by(targetInputId||'f-barcode');
      if(inp){inp.value=code;inp.dispatchEvent(new Event('input'));}
      if(resultEl){resultEl.style.display='block';resultEl.textContent='✅ Código lido: '+code;}
      _stopScanner();
    };

    // Método 1: BarcodeDetector nativo (Chrome/Android — mais rápido)
    if('BarcodeDetector' in window){
      try{
        const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','code_93','upc_a','upc_e','qr_code','data_matrix']});
        const scan=async()=>{
          if(!_scanStream) return;
          try{
            const codes=await det.detect(video);
            if(codes.length>0){onCode(codes[0].rawValue);return;}
          }catch(e){}
          _scanAnimFrame=requestAnimationFrame(scan);
        };
        _scanAnimFrame=requestAnimationFrame(scan);
        return;
      }catch(e){/* fallback para ZXing */}
    }

    // Método 2: ZXing-js (iOS Safari + Firefox + todos os outros)
    if(window.ZXing){
      try{
        const codeReader=new ZXing.BrowserMultiFormatReader();
        canvas.style.display='none';

        const scanZxing=async()=>{
          if(!_scanStream) return;
          if(video.readyState>=2){
            try{
              // Usa decodeFromVideoElement se disponível (mais preciso)
              if(typeof codeReader.decodeFromVideoElement==='function'){
                const result=await codeReader.decodeFromVideoElement(video).catch(()=>null);
                if(result){onCode(result.getText());return;}
              } else {
                // Fallback: captura frame no canvas e decodifica
                canvas.width=video.videoWidth||640;
                canvas.height=video.videoHeight||480;
                const ctx=canvas.getContext('2d');
                ctx.drawImage(video,0,0,canvas.width,canvas.height);
                const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
                const luminanceSource=new ZXing.RGBLuminanceSource(
                  imageData.data, canvas.width, canvas.height
                );
                const binaryBitmap=new ZXing.BinaryBitmap(
                  new ZXing.HybridBinarizer(luminanceSource)
                );
                const result=new ZXing.MultiFormatReader().decode(binaryBitmap);
                if(result){onCode(result.getText());return;}
              }
            }catch(e){
              // DecodeException é normal — código ainda não visível no frame
            }
          }
          _scanAnimFrame=requestAnimationFrame(scanZxing);
        };
        video.onplay=()=>{_scanAnimFrame=requestAnimationFrame(scanZxing);};
        if(!video.paused) _scanAnimFrame=requestAnimationFrame(scanZxing);
        return;
      }catch(e){console.warn('ZXing erro:',e.message||e);}
    }

    // Método 3: fallback — câmera aberta mas leitura manual
    box.innerHTML=`
      <div style="padding:20px;text-align:center;color:#aaa;font-size:13px;background:#111;border-radius:10px">
        <div style="font-size:32px;margin-bottom:10px">📷</div>
        <div style="font-weight:700;color:#fff;margin-bottom:8px">Câmera ativa</div>
        <div style="color:#94a3b8;font-size:12px;margin-bottom:14px">Seu dispositivo não suporta leitura automática.<br>Digite o código manualmente no campo acima.</div>
        <button type="button" onclick="by('barcode-reader-box').style.display='none'" style="background:#3b82f6;color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:13px;cursor:pointer">Fechar câmera</button>
      </div>`;
  }

  // Botão escanear do produto

  (function attachSave(){
    const btn=document.getElementById('modal-save');
    if(!btn)return;
    btn.onclick=null;
    btn.onclick=function(e){
      e.preventDefault();e.stopPropagation();
      // Captura estado ANTES de qualquer mudança
      const m=S.modal,eid=S.eid,fid=S.fid;
      if(!m)return;
      const data=collectForm();

      // Validações que mantêm o modal aberto
      if(m==='filial'&&(!data||!data.nome)){alert('Informe o nome da filial.');return;}
      if(m==='usuario'){
        if(!data.nome){alert('Informe o nome.');return;}
        if(!data.email){alert('Informe o email.');return;}
        if(!eid&&!data.senha){alert('Informe a senha.');return;}
        if(!eid&&gus().find(u=>(u.email||'').toLowerCase()===data.email)){alert('Email já cadastrado.');return;}
      }
      if(m==='plano'&&(!data.codigo||!data.nome)){alert('Preencha código e nome.');return;}

      // Salva primeiro, fecha depois — garante que render() vê dados atualizados
      if(m==='filial'){
        const fs=gfil();
        if(eid){const i=fs.findIndex(f=>f.id===eid);if(i>=0)fs[i]={...fs[i],nome:data.nome,modulos:data.modulos};}
        else fs.push({id:uid(),nome:data.nome,modulos:data.modulos||[]});
        sfil(fs);
      } else if(m==='usuario'){
        const us=gus();
        if(eid){const i=us.findIndex(u=>u.id===eid);if(i>=0){const sf=data.senha||us[i].senha||'';us[i]={...us[i],...data,senha:sf};}}
        else us.push({id:uid(),...data});
        sus(us);
      } else if(m==='plano'){
        const pc=gpc();
        if(eid){const i=pc.findIndex(p=>p.id===eid);if(i>=0)pc[i]={...pc[i],...data};}
        else pc.push({id:uid(),...data});
        spc(pc);
      } else if(m==='said'){
        const db2=ld();
        let saids=gfd(db2,fid,'said'),prods=gfd(db2,fid,'prod');
        if(eid){
          const old=saids.find(s=>s.id===eid);
          if(old){const pi=prods.findIndex(p=>p.id===old.prodId);if(pi>=0)prods[pi].quantidade=Number(prods[pi].quantidade||0)+Number(old.quantidade||0);}
          saids=saids.map(s=>s.id===eid?{...s,...data}:s);
        } else saids.push({id:uid(),...data});
        const pi=prods.findIndex(p=>p.id===data.prodId);
        if(pi>=0){
          const ns=Math.max(0,Number(prods[pi].quantidade||0)-Number(data.quantidade||0));
          prods[pi].quantidade=ns;
          const uc=gfd(db2,fid,'cont').filter(c=>c.prodId===data.prodId&&c.status==='Aprovado').sort((a,b)=>b.data>a.data?1:-1)[0];
          prods[pi]._divergencia=!!(uc&&Math.abs(ns-Number(uc.quantidadeContada||0))>0);
          if(prods[pi]._divergencia)prods[pi]._divergenciaDiff=ns-Number(uc.quantidadeContada);
          else delete prods[pi]._divergencia;
        }
        sfd(db2,fid,'said',saids);sfd(db2,fid,'prod',prods);sv(db2);
      } else if(m==='escala'){
        saveRec('escala',data,eid);
        if(!eid&&Number(data.valor)>0){
          const db2=ld(),cp=gfd(db2,fid,'cp');
          cp.push({id:uid(),nome:data.nome||data.colaboradorNome,categoria:'Colaborador',
            referencia:('Escala '+fmtD(data.dataTrabalho)+' — '+(data.funcao||'')).trim().replace(/—\s*$/,''),
            valor:Number(data.valor),vencimento:data.vencimentoCP,
            status:'Pendente',parcelamento:'À vista',origem:'escala',observacoes:data.observacoes||''});
          sfd(db2,fid,'cp',cp);sv(db2);
        }
      } else if(m==='rh_ferias'){
        const db2=ld();
        let ferias=gfd(db2,fid,'rh_ferias');
        if(eid){ferias=ferias.map(f=>f.id===eid?{...f,...data}:f);}
        else ferias.push({id:uid(),...data});
        const idFer=eid||ferias[ferias.length-1].id;
        const fer=ferias.find(f=>f.id===idFer);
        if(fer&&data.status==='Aprovada'&&!fer.cpId){
          const cpId=uid(),cp=gfd(db2,fid,'cp');
          cp.push({id:cpId,nome:fer.nomeFuncionario,categoria:'Férias',
            referencia:'Férias '+fmtD(fer.dataInicio)+' a '+fmtD(fer.dataFim)+' ('+(fer.dias||0)+' dias)',
            planoConta:'Folha de Pagamento',valor:Number(fer.valor||0),
            vencimento:fer.dataInicio||td(),dataPagamento:'',parcelamento:'À vista',status:'Pendente',
            origem:'rh_ferias',origemId:idFer});
          ferias=ferias.map(f=>f.id===idFer?{...f,cpId}:f);
          sfd(db2,fid,'cp',cp);
        }
        sfd(db2,fid,'rh_ferias',ferias);sv(db2);
      } else if(m==='pousada'){
        salvarPousada(data,eid);
      } else if(m==='voo'){
        salvarVoo(data,eid);
      } else {
        // Genérico: rh_func, rh_folha, rh_ponto, rh_deslig, cp, cr, prod, etc.
        // Passa eid capturado antes do render() para saveRec
        saveRec(m,data,eid);
      }

      // Fecha o modal e redesenha DEPOIS de salvar — dados atualizados garantidos
      S.modal=null;S.eid=null;S.form={};
      render();
    };
  })();

    bindMasks();
}

  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');

  doc.text(tit,18,10);
  if(subtitulo){doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text(String(subtitulo).slice(0,80),PW-18,10,{align:'right'});}
  doc.setTextColor(40,40,40);
  return 26;
}
function pdfTable(doc,y,headers,rows,colWidths,landscape){
  const ML=18;
  const TW=colWidths.reduce((a,b)=>a+b,0);
  const HEAD_H=8;
  const pageH=landscape?210:297;
  const FS=6.5; // font size para células
  const LINE_H=FS*0.352778+1.4; // altura por linha de texto
  const PAD=2; // padding interno célula

  // Cabeçalho
  doc.setFillColor(26,47,74);doc.rect(ML,y,TW,HEAD_H,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
  let x=ML;
  headers.forEach((h,i)=>{
    const lines=doc.splitTextToSize(String(h||''),colWidths[i]-PAD*2);
    doc.text(lines[0],x+PAD,y+5.5);
    x+=colWidths[i];
  });
  y+=HEAD_H;

  // Linhas de dados
  doc.setFont('helvetica','normal');
  rows.forEach((row,ri)=>{
    // Calcula altura necessária para esta linha (célula com mais linhas determina)
    doc.setFontSize(FS);
    const cellLines=row.map((cell,i)=>{
      const txt=String(cell===undefined||cell===null?'—':cell);
      return doc.splitTextToSize(txt,colWidths[i]-PAD*2);
    });
    const maxLines=Math.max(...cellLines.map(l=>l.length),1);
    const rowH=Math.max(maxLines*LINE_H+PAD*2,7);

    // Quebra de página
    if(y+rowH>pageH-14){
      doc.addPage();
      y=pdfAddHeader(doc,'(continuação)','',landscape);
      // Redesenha cabeçalho
      doc.setFillColor(26,47,74);doc.rect(ML,y,TW,HEAD_H,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
      let hx=ML;
      headers.forEach((h,i)=>{doc.text(String(h||''),hx+PAD,y+5.5);hx+=colWidths[i];});
      y+=HEAD_H;
      doc.setFont('helvetica','normal');doc.setFontSize(FS);
    }

    // Fundo alternado
    const bgR=ri%2===0?245:255,bgG=ri%2===0?248:255,bgB=ri%2===0?252:255;
    doc.setFillColor(bgR,bgG,bgB);
    doc.rect(ML,y,TW,rowH,'F');
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.1);
    doc.rect(ML,y,TW,rowH);

    // Texto de cada célula (com wrap)
    doc.setTextColor(40,40,40);doc.setFontSize(FS);
    x=ML;
    cellLines.forEach((lines,i)=>{
      // Desenha cada linha de texto dentro da célula
      lines.forEach((ln,li)=>{
        doc.text(ln,x+PAD,y+PAD+LINE_H*(li+0.8));
      });
      // Linha vertical separadora entre colunas
      if(i<colWidths.length-1){
        doc.setDrawColor(230,230,230);doc.setLineWidth(0.05);
        doc.line(x+colWidths[i],y,x+colWidths[i],y+rowH);
      }
      x+=colWidths[i];
    });

    y+=rowH;
  });
  return y+4;
}

/* ── PDF genérico com título, subtítulo, tabela e rodapé ── */
function pdfRelatorio(titulo,subtitulo,headers,rows,colWidths,nomeArq){
  const{jsPDF}=window.jspdf;

function gerarPdfCadastros(tab,lista,colsMap){
  const nomes={forn:'Fornecedores',colab:'Colaboradores',prest:'Prestadores',atrac:'Atrações',hosp:'Hóspedes'};

/* ── PDF de Estoque ── */
function gerarPdfEstoque(tab,db,fid){
  const nomes={prod:'Produtos',ent:'Entradas',said:'Saídas/Vendas',cont:'Contagens',pedidos:'Pedidos'};
  const nome=nomes[tab]||tab;
  let headers,rows,colWidths;
  if(tab==='prod'){
    const lista=gfd(db,fid,'prod');
    const saids=gfd(db,fid,'said');
    headers=['Produto','Categoria','Saldo','Saídas','Custo','Venda','Últ. Contagem','Data Ajuste','Motivo do Ajuste'];
    colWidths=[42,26,18,18,22,22,24,22,45];
    rows=lista.map(p=>{
      const totalSaid=saids.filter(s=>s.prodId===p.id).reduce((a,s)=>a+Number(s.quantidade||0),0);
      const aj=p._ajuste;
      return[p.produto||'—',p.categoria||'—',String(p.quantidade||0),String(totalSaid),p.valorCusto?'R$'+Number(p.valorCusto).toFixed(2):'—',p.valorVenda?'R$'+Number(p.valorVenda).toFixed(2):'—',fmtD(p.dataUltimaContagem),aj?fmtD(aj.data):'—',aj?(aj.obs||'Ajustado sem motivo'):'Sem ajuste'];
    });
  } else if(tab==='ent'){
    const lista=gfd(db,fid,'ent');
    headers=['Produto','Qtd','Data','Responsável','Fornecedor/Origem','Status'];
    colWidths=[70,22,28,45,55,22];
    rows=lista.map(i=>[i.prodNome||'—',String(i.quantidade||'—'),fmtD(i.data),i.responsavel||'—',i.pedidoDesc?'Pedido: '+i.pedidoDesc:i.fornecedor||'—',i.status||'—']);
  } else if(tab==='said'){
    const lista=gfd(db,fid,'said');
    headers=['Produto','Qtd Saída','Saldo Ant.','Saldo Novo','Data','Responsável','Motivo'];
    colWidths=[55,22,24,24,28,40,45];
    rows=lista.map(i=>[i.prodNome||'—',String(i.quantidade||'—'),String(i.saldoAnterior||'—'),String(i.novoSaldo||'—'),fmtD(i.data),i.responsavel||'—',i.motivo||'—']);
  } else if(tab==='cont'){
    const lista=gfd(db,fid,'cont');
    headers=['Produto','Qtd Contada','Saldo Sistema','Diferença','Data','Responsável','Status','Obs/Ajuste'];
    colWidths=[45,24,24,22,28,38,22,35];
    const prods=gfd(db,fid,'prod');
    rows=lista.map(i=>{
      const p=prods.find(x=>x.id===i.prodId)||{};
      const diff=Number(i.quantidadeContada||0)-Number(p.quantidade||0);
      const ajusteObs=p._ajuste?.obs||'';
      return[i.prodNome||'—',String(i.quantidadeContada||'—'),String(p.quantidade||'—'),diff===0?'OK':(diff>0?'+':'')+diff,fmtD(i.data),i.responsavel||'—',i.status||'—',ajusteObs||'—'];
    });
  } else {
    alert('Selecione uma aba para gerar o PDF.');return;
  }
  pdfRelatorio('Estoque — '+nome,'Filial: '+S.fid,headers,rows,colWidths,'estoque_'+tab+'_'+td()+'.pdf');
}

// INICIALIZAÇÃO COM FIREBASE
// ══════════════════════════════════════════════════
(async function init() {
  // Tela de carregamento
  const root=document.getElementById('root');
  // Mostra UI do localStorage imediatamente enquanto conecta Firebase
  const cachedDb=JSON.parse(localStorage.getItem(K)||"{}");
  const cachedApp=cachedDb["__app__"]||{nome:"Gestão Financeira"};
  root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#0f1929">
    <div style="width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;margin-bottom:4px">
      ${((cachedApp.nome||"GF").replace(/[^A-Za-z0-9]/g,"").slice(0,2)||"GF").toUpperCase()}
    </div>
    <div style="font-size:16px;font-weight:700;color:#e2e8f0">${cachedApp.nome||"Gestão Financeira"}</div>
    <div style="width:120px;height:3px;background:#1a2740;border-radius:3px;overflow:hidden">
      <div style="width:40%;height:100%;background:#3b82f6;border-radius:3px;animation:loadbar 1.2s ease-in-out infinite"></div>
    </div>
    <p style="color:#475569;font-size:12px">Conectando...</p>
  </div>
  <style>@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}</style>`;

  // Inicializa Firebase
  const ok=initFirebase();

  if(ok){
    // Escuta estado de autenticação — Firebase persiste sessão automaticamente
    _fbAuth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        _fbUid=fbUser.uid;

        // FASE 1: tenta carregar dados do novo caminho compartilhado
        try{ await _fbLoadGlobal(); }
        catch(e){ console.warn("[Firebase] Usando localStorage:",e.code||e.message); }

        // FASE 1b: se não tem dados no novo caminho, tenta migrar do caminho antigo
        const temDados=gfil().some(f=>f.id!=='f1'||f.nome!=='Filial Principal');
        if(!temDados){
          console.info('[Firebase] Dados não encontrados no novo caminho — tentando migração...');
          const migrou=await _migrarDadosAntigos(fbUser.uid);
          if(migrou) await _fbLoadGlobal(); // recarrega após migração
          else {
            // Tenta upload do localStorage para o Firestore
            await _uploadLocalParaFirestore();
            await _fbLoadGlobal();
          }
        }

        // Registra usuário e mostra app imediatamente
        const u=await _registrarUsuario(fbUser);
        S.ok=true;S.user=u;
        render();

        // FASE 2: carrega dados das filiais em background
        _fbLoadFiliais(()=>{ if(S.ok) render(); })
          .catch(e=>console.warn("[FS] filiais:",e.message));

        // Listeners em tempo real
        _startRealtimeListeners();
      }else{
        _stopRealtimeListeners();
        _fbUid=null;_cache={};_cacheLoaded=false;
        S.ok=false;S.user=null;S._authTab="login";
        render();
      }
    });
  }else{
    // Firebase indisponível — modo offline com localStorage
    console.warn('[Firebase] Modo offline ativo');
    render();
  }
})();
</script>
