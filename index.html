<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gestão Financeira</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- ZXing barcode scanner — iOS Safari compatible -->
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<!-- SheetJS para exportação Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase SDK via CDN (compat mode — funciona como script global) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1929;--bg2:#1a2740;--bg3:#1e2f4a;--bg4:#243452;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --blue:#1a56db;--blue-bg:rgba(26,86,219,0.15);--blue-t:#60a5fa;
  --green:#16a34a;--green-bg:rgba(22,163,74,0.15);--green-t:#4ade80;
  --red:#dc2626;--red-bg:rgba(220,38,38,0.15);--red-t:#f87171;
  --amber-bg:rgba(180,83,9,0.15);--amber-t:#fbbf24;
  --gray-bg:rgba(100,116,139,0.15);--gray-t:#94a3b8;
  --r:10px;--rl:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sb{width:232px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow:hidden;z-index:50;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.main{margin-left:232px;flex:1;min-height:100vh}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.sb-logo-txt{font-size:13px;font-weight:700}
.sb-logo-sub{font-size:10px;color:var(--text3)}
.sb-filial{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-filial-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:5px}
.sb-sel{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--text);cursor:pointer}
.sb-sel option{background:#1e2f4a}
nav{padding:8px;flex:1;overflow-y:auto;min-height:0}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.ni.act{background:var(--blue-bg);color:var(--blue-t)}
.ni-ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sep{height:1px;background:var(--border);margin:6px 2px}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.sb-usr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;min-width:0}
.av{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);color:var(--blue-t);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-out{width:100%;background:var(--red-bg);color:var(--red-t);border:1px solid rgba(220,38,38,0.25);border-radius:7px;padding:7px;font-size:12px;cursor:pointer;font-weight:600}
.page{padding:26px 30px;min-height:100vh}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.pt{font-size:21px;font-weight:700}
.ps{font-size:12px;color:var(--text3);margin-top:3px}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,0.06);color:var(--text);transition:all .15s}
.btn:hover{background:rgba(255,255,255,0.1)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#1447b5}
.btn-d{background:var(--red-bg);color:var(--red-t);border-color:rgba(220,38,38,0.3)}
.btn-s{background:var(--green-bg);color:var(--green-t);border-color:rgba(22,163,74,0.3)}
.btn-sm{padding:4px 10px;font-size:12px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px}
.sl{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600}
.sv{font-size:22px;font-weight:700}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:16px}
.ct{font-size:14px;font-weight:700;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{font-size:13px;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.bdg{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700}
.bg{background:var(--green-bg);color:var(--green-t)}
.ba{background:var(--amber-bg);color:var(--amber-t)}
.br{background:var(--red-bg);color:var(--red-t)}
.bb{background:var(--blue-bg);color:var(--blue-t)}
.bgr{background:var(--gray-bg);color:var(--gray-t)}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,0.05);border-radius:9px;padding:3px;width:fit-content;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:7px;border:none;background:none;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500;transition:all .15s}
.tab.act{background:var(--bg2);color:var(--text);font-weight:700}
.fr{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.fr select,.fr input[type=month],.fr input[type=date]{background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--text);min-width:120px}
.fr select option{background:#1e2f4a}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.55)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mt{font-size:15px;font-weight:700}
.mc{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.mb{padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.gf{grid-column:span 2}
.gf3{grid-column:span 3}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
input:not([type=radio]):not([type=checkbox]),select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:rgba(255,255,255,0.06);color:var(--text);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select option{background:#1e2f4a}
textarea{resize:vertical;min-height:64px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.ar{display:flex;gap:5px;align-items:center}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px}
.lc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0}
.auth-tab{flex:1;padding:10px;border:none;background:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.auth-tab.act{color:var(--blue-t);border-bottom-color:var(--blue)}
.btn-google{width:100%;padding:12px;border:1px solid var(--border2);background:rgba(255,255,255,.05);border-radius:var(--r);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s}
.btn-google:hover{background:rgba(255,255,255,.1)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin:6px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;color:var(--text2);font-size:13px}
.auth-loading-spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.auth-success{background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);border-radius:var(--r);padding:10px 14px;color:var(--green-t);font-size:13px;text-align:center}
.auth-link{background:none;border:none;color:var(--blue-t);font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
@media(max-width:420px){.lc{padding:24px}}
/* ── Financeiro nav ── */
.fin-wrap{display:flex;flex-direction:column;min-height:100vh}
.fin-header{background:var(--bg2);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:30;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.fin-breadcrumb{display:flex;align-items:center;gap:8px;padding:10px 24px 0;font-size:12px}
.fin-bc-root{color:var(--text3);font-weight:600;cursor:pointer}
.fin-bc-root:hover{color:var(--text)}
.fin-bc-sep{color:var(--border2);font-size:14px}
.fin-bc-cur{color:var(--blue-t);font-weight:700}
.fin-tabs{display:flex;gap:2px;padding:8px 18px 0;overflow-x:auto;scrollbar-width:none}
.fin-tabs::-webkit-scrollbar{display:none}
.fin-tab{display:flex;align-items:center;gap:7px;padding:9px 18px 10px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;border-radius:8px 8px 0 0;transition:all .15s;white-space:nowrap;position:relative}
.fin-tab:hover{background:rgba(255,255,255,.06);color:var(--text)}
.fin-tab.act{color:var(--blue-t);border-bottom-color:var(--blue);background:linear-gradient(180deg,var(--blue-bg) 0%,transparent 100%);font-weight:700}
.fin-tab-ic{font-size:16px}
.fin-tab-lbl{font-size:13px}
.fin-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;line-height:16px;margin-left:2px}
.fin-body{flex:1;background:var(--bg)}
@media(max-width:768px){
  .fin-breadcrumb{padding:8px 12px 0}
  .fin-tabs{padding:6px 8px 0;gap:1px}
  .fin-tab{padding:7px 12px 8px;font-size:12px}
  .fin-tab-lbl{display:none}
  .fin-tab.act .fin-tab-lbl{display:inline}
}
@media(max-width:420px){.lc{padding:24px}}
.ll{text-align:center;margin-bottom:24px}
.li{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;font-weight:700;margin:0 auto 12px}
.em{background:var(--red-bg);color:var(--red-t);border:1px solid rgba(220,38,38,.3);border-radius:7px;padding:9px 12px;font-size:13px}
.dre-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:9px 14px;background:rgba(255,255,255,.04);color:var(--text3);border-bottom:1px solid var(--border)}
.dre-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.dre-row.tot{font-weight:700;font-size:14px}
.opc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;cursor:pointer;transition:all .2s}
.opc:hover{border-color:var(--blue);background:var(--bg3)}
.opc h3{font-size:14px;font-weight:700;margin-bottom:4px}
.opc p{font-size:12px;color:var(--text3)}
.calc-box{background:rgba(26,86,219,.1);border:1px solid rgba(26,86,219,.25);border-radius:8px;padding:12px 16px;margin-top:8px}
.calc-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.calc-row:last-child{margin-bottom:0;font-weight:700;font-size:15px;color:var(--green-t)}
.mod-row{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:background .15s}
.mod-row:hover{background:rgba(255,255,255,.05)}
::-webkit-scrollbar{width:5px}
@keyframes scanline{0%,100%{opacity:.4;transform:translateY(-40px)}50%{opacity:1;transform:translateY(40px)}}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

/* ══════════════════════════════════════════════
   HAMBURGER + OVERLAY (apenas mobile)
══════════════════════════════════════════════ */
.sb-ham{display:none;position:fixed;top:0;left:0;z-index:200;background:var(--bg2);border:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);width:52px;height:52px;align-items:center;justify-content:center;cursor:pointer;font-size:20px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;backdrop-filter:blur(2px)}

/* ══════════════════════════════════════════════
   MOBILE BREAKPOINT ≤ 768px
══════════════════════════════════════════════ */
@media(max-width:768px){

  /* ── Sidebar como drawer ── */
  .sb-ham{display:flex}
  .sb{width:280px;transform:translateX(-100%);z-index:100;box-shadow:4px 0 32px rgba(0,0,0,.5)}
  .sb.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .main{margin-left:0;padding-top:52px} /* espaço para topbar */

  /* ── Topbar mobile (nome do módulo atual) ── */
  .mobile-topbar{
    display:flex;align-items:center;
    position:fixed;top:0;left:0;right:0;height:52px;
    background:var(--bg2);border-bottom:1px solid var(--border);
    padding:0 12px 0 60px;
    z-index:80;gap:10px;
  }
  .mobile-topbar-title{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mobile-topbar-logo{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}

  /* ── Page ── */
  .page{padding:12px;min-height:calc(100vh - 52px)}
  .ph{flex-direction:column;gap:10px;margin-bottom:14px;align-items:flex-start}
  .ph>div:first-child{width:100%}
  .ph>*:last-child{width:100%}
  .ph .btn,.ph label.btn{width:100%;justify-content:center;text-align:center;padding:11px}
  .ph div[style*="display:flex"]{flex-wrap:wrap;gap:6px}
  .ph div[style*="display:flex"] .btn,.ph div[style*="display:flex"] label.btn{flex:1;min-width:calc(50% - 6px);font-size:12px;padding:9px 6px;text-align:center;justify-content:center}
  .pt{font-size:18px}

  /* ── Summary grid ── */
  .sg{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .sc{padding:10px 12px}
  .sv{font-size:18px}

  /* ── Cards ── */
  .card{padding:12px;margin-bottom:10px;border-radius:10px}

  /* ── Formulários ── */
  .g2,.g3{grid-template-columns:1fr}
  .gf,.gf3{grid-column:span 1}
  input:not([type=radio]):not([type=checkbox]),select,textarea{font-size:16px !important;padding:10px 12px} /* 16px evita zoom no iOS */
  .fr{gap:6px}
  .fr select,.fr input[type=month],.fr input[type=date]{min-width:auto;width:100%;font-size:14px}

  /* ── TABELAS → cards empilhados no mobile ── */
  table{display:block}
  thead{display:none}
  tbody{display:flex;flex-direction:column;gap:8px}
  tr{
    display:flex;flex-direction:column;
    background:var(--bg3);border:1px solid var(--border);
    border-radius:10px;padding:12px;gap:6px;
  }
  tr:hover td{background:transparent}
  td{
    display:flex;justify-content:space-between;align-items:center;
    padding:3px 0;border:none;font-size:13px;
    border-bottom:1px solid rgba(255,255,255,.04);
  }
  td:last-child{border-bottom:none;margin-top:4px;justify-content:flex-end}
  td::before{
    content:attr(data-label);
    font-size:10px;font-weight:700;color:var(--text3);
    text-transform:uppercase;letter-spacing:.5px;
    min-width:90px;flex-shrink:0;
  }
  td:last-child::before{content:none}
  .ar{gap:6px}
  .btn-sm{padding:6px 12px;font-size:12px}

  /* ── Modais ── */
  .ov{padding:0;align-items:flex-end}
  .modal{
    max-width:100%;width:100%;
    border-radius:20px 20px 0 0;
    max-height:92vh;
    animation:slideUp .25s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .mh{padding:14px 16px}
  .mb{padding:14px 16px}
  .fa{padding-top:10px;margin-top:10px}
  .fa .btn{flex:1;padding:12px;font-size:14px}

  /* ── Tabs ── */
  .tabs{width:100%;overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start}
  .tab{white-space:nowrap;padding:6px 12px;font-size:12px}

  /* ── Financeiro sub-tabs ── */
  .fin-breadcrumb{padding:8px 12px 0;display:none}
  .fin-tabs{padding:4px 8px 0;gap:1px}
  .fin-tab{padding:8px 10px;font-size:11px;gap:4px}
  .fin-tab-lbl{display:none}
  .fin-tab.act .fin-tab-lbl{display:inline;font-size:11px}
  .fin-tab-ic{font-size:14px}

  /* ── Cards de opções (Agendas, Operacional) ── */
  .opc{padding:14px}
  div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}

  /* ── Login ── */
  .lw{align-items:flex-end;padding:0}
  .lc{border-radius:20px 20px 0 0;padding:24px 20px;max-width:100%;box-shadow:0 -4px 40px rgba(0,0,0,.5)}
  .ll{margin-bottom:18px}

  /* ── Dashboard charts/stats ── */
  div[style*="display:grid;grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr) !important}
  div[style*="display:grid;grid-template-columns:repeat(3"]{grid-template-columns:repeat(2,1fr) !important}

  /* ── RH Folha ── */
  .fr#f-mes-folha{width:100%}
}

/* ══════════════════════════════════════════════
   MOBILE PEQUENO ≤ 420px
══════════════════════════════════════════════ */
@media(max-width:420px){
  .sg{grid-template-columns:1fr}
  .lc{padding:20px 16px}
  .btn-sm{padding:5px 8px;font-size:11px}
  .ph div[style*="display:flex"] .btn{min-width:100%;flex:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
const firebaseConfig = {

  authDomain:        "b2youfinancialcontrol.firebaseapp.com",
  projectId:         "b2youfinancialcontrol",
  storageBucket:     "b2youfinancialcontrol.firebasestorage.app",
  messagingSenderId: "120136860530",
  appId:             "1:120136860530:web:da6c8312cf7135d8a813eb"
};

// ── INSTÂNCIAS GLOBAIS ──
let _fbApp=null, _fbAuth=null, _fbDb=null, _fbReady=false;
let _cache={};           // cache em memória
let _fbUid=null;         // uid do usuário Firebase autenticado

function initFirebase(){
  if(_fbReady) return true;
  try{
    _fbApp  = firebase.initializeApp(firebaseConfig);
    _fbAuth = firebase.auth();
    _fbDb   = firebase.firestore();
    // Configurações do Firestore — sem persistência offline para garantir dados sempre frescos
    _fbDb.settings({
      cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED,
      merge: true
    });
    // NÃO ativamos enablePersistence pois causa dados stale no mobile
    // Os listeners onSnapshot com includeMetadataChanges:false garantem dados do servidor
    _fbReady = true;
    console.info('[Firebase] ✅ Inicializado — projeto: b2youfinancialcontrol');
    return true;
  }catch(e){
    console.error('[Firebase] Falha:',e);
    return false;
  }
}

// ── FIRESTORE: caminhos ──
// IMPORTANTE: dados ficam em /empresa/main/ — compartilhado entre todos os usuários
// Cada usuário autenticado acessa os mesmos dados da empresa
const FS_COLS=['cp','cr','despesas','vendas','escala','forn','colab','prest','atrac',
               'hosp','pousada','voo','prod','ent','said','cont','pedidos',
               'rh_func','rh_folha','rh_ferias','rh_ponto','rh_deslig','docs'];

const _FS_BASE = 'empresa/main'; // caminho compartilhado (não depende do uid)
const _fsGlobalPath=(key)=>`${_FS_BASE}/global/${key}`;
const _fsFilialPath=(fid,col)=>`${_FS_BASE}/filiais/${fid}/${col}`;

// ── CAMADA DE DADOS HÍBRIDA ──
// localStorage (síncrono/rápido) + Firestore (nuvem, em background)
const K='gf_v3';
let _cacheLoaded=false; // flag explícita: true quando _cache foi preenchido do Firestore
const ld=()=>{
  if(_cacheLoaded) return _cache;
  try{return JSON.parse(localStorage.getItem(K)||'{}')}catch{return{}}
};
const sv=d=>{
  _cache=d;_cacheLoaded=true;
  localStorage.setItem(K,JSON.stringify(d));
  // Sync global rápido (só filiais/config quando mudam)
  if(_fbReady){
    const ts=firebase.firestore.FieldValue.serverTimestamp();
    // Só sincroniza dados globais se mudaram
    for(const k of["__fil__","__usr__","__pc__","__app__"]){
      if(d[k]!==undefined){
        _fbDb.doc(_fsGlobalPath(k)).set({data:d[k],updatedAt:ts})
          .catch(e=>console.warn("[FS] sv global",k,e.code));
      }
    }
    // Sincroniza filial ativa (não todas)
    const fid=S.fid;
    if(fid&&d[fid]){
      for(const col of FS_COLS){
        if(d[fid][col]!==undefined){
          _fbDb.doc(_fsFilialPath(fid,col)).set({lista:d[fid][col]||[],updatedAt:ts})
            .catch(e=>console.warn("[FS] sv filial",col,e.code));
        }
      }
    }
  }
};
const gfd=(db,fid,col)=>(db[fid]&&db[fid][col])||[];
const sfd=(db,fid,col,d)=>{if(!db[fid])db[fid]={};db[fid][col]=d};

// ── FIRESTORE: salvar um documento específico (robusto, sem batch) ──
async function _fsSet(path, data){
  if(!_fbReady||!_fbUid) return;
  try{
    await _fbDb.doc(path).set(data);
  }catch(e){
    console.warn('[FS] set erro em',path,e.code||e.message);
    throw e;
  }
}

// Sincroniza TODOS os dados com Firestore (caminho compartilhado)
async function _fbSyncAll(db){
  if(!_fbReady) return;
  const writes=[];
  const ts=firebase.firestore.FieldValue.serverTimestamp();

  // Dados globais
  for(const k of['__fil__','__usr__','__pc__','__app__']){
    if(db[k]!==undefined){
      writes.push(
        _fbDb.doc(_fsGlobalPath(k))
          .set({data:db[k], updatedAt:ts})
          .catch(e=>console.warn('[FS] sync global',k,e.code))
      );
    }
  }

  // Dados por filial
  const fils=db['__fil__']||[];
  for(const fil of fils){
    const fid=fil.id;
    if(!db[fid]) continue;
    for(const col of FS_COLS){
      if(db[fid][col]!==undefined){
        writes.push(
          _fbDb.doc(_fsFilialPath(fid,col))
            .set({lista:db[fid][col]||[], updatedAt:ts})
            .catch(e=>console.warn('[FS] sync filial',fid,col,e.code))
        );
      }
    }
  }

  await Promise.all(writes);
  console.info('[Firebase] ✅ Sincronizado —',writes.length,'documentos no caminho compartilhado');
}

// Carrega dados globais do Firestore (rápido — apenas 4 documentos)
async function _fbLoadGlobal(){
  if(!_fbReady) return false;
  const GLOBAL_KEYS=["__fil__","__usr__","__pc__","__app__"];
  const db=ld(); // parte do cache existente (localStorage)
  const snaps=await Promise.all(
    GLOBAL_KEYS.map(k=>_fbDb.doc(_fsGlobalPath(k)).get().catch(()=>null))
  );
  let changed=false;
  GLOBAL_KEYS.forEach((k,i)=>{
    const snap=snaps[i];
    if(snap&&snap.exists){const d=snap.data();if(d&&d.data!==undefined){db[k]=d.data;changed=true;}}
  });
  if(!db["__fil__"]||!db["__fil__"].length)
    db["__fil__"]=[{id:"f1",nome:"Filial Principal",modulos:[]}];
  if(changed){_cache=db;_cacheLoaded=true;localStorage.setItem(K,JSON.stringify(db));}
  return changed;
}

// Carrega dados das filiais em background (não bloqueia a UI)
async function _fbLoadFiliais(renderCallback){
  if(!_fbReady) return;
  const fils=gfil();
  const db=ld();
  for(const fil of fils){
    const fid=fil.id;
    if(!db[fid]) db[fid]={};
    const snaps=await Promise.all(
      FS_COLS.map(col=>_fbDb.doc(_fsFilialPath(fid,col)).get().catch(()=>null))
    );
    let changed=false;
    FS_COLS.forEach((col,i)=>{
      const snap=snaps[i];
      if(snap&&snap.exists){const d=snap.data();if(Array.isArray(d.lista)){db[fid][col]=d.lista;changed=true;}}
    });
    if(changed){
      _cache=db;_cacheLoaded=true;
      localStorage.setItem(K,JSON.stringify(db));
      // Re-render ao terminar cada filial
      if(typeof renderCallback==="function") renderCallback();
    }
  }
  console.info("[Firebase] ✅ Dados completos carregados");
}

// Migração automática: copia dados do caminho antigo para o novo
async function _migrarDadosAntigos(uid){
  if(!_fbReady||!uid) return false;
  let migrou=false;
  const ts=firebase.firestore.FieldValue.serverTimestamp();
  const GLOBAL_KEYS=['__fil__','__usr__','__pc__','__app__'];

  // Tenta ler do caminho antigo (sistema/{uid}/global/)
  for(const k of GLOBAL_KEYS){
    try{
      const oldSnap=await _fbDb.doc(`sistema/${uid}/global/${k}`).get();
      if(oldSnap.exists){
        const d=oldSnap.data();
        if(d&&d.data!==undefined){
          // Copia para o novo caminho compartilhado
          await _fbDb.doc(_fsGlobalPath(k)).set({data:d.data,updatedAt:ts});
          console.info('[FS] Migrado:',k,'→ empresa/main/global/'+k);
          migrou=true;
        }
      }
    }catch(e){ /* sem acesso ao caminho antigo é normal */ }
  }

  // Tenta migrar dados das filiais
  try{
    const filSnap=await _fbDb.doc(`sistema/${uid}/global/__fil__`).get();
    if(filSnap.exists){
      const fils=filSnap.data()?.data||[];
      for(const fil of fils){
        const fid=fil.id;
        for(const col of FS_COLS){
          try{
            const oldSnap=await _fbDb.doc(`dados/${uid}/${fid}/${col}`).get();
            if(oldSnap.exists){
              const d=oldSnap.data();
              if(d&&Array.isArray(d.lista)&&d.lista.length>0){
                await _fbDb.doc(_fsFilialPath(fid,col)).set({lista:d.lista,updatedAt:ts});
                console.info('[FS] Migrado filial:',fid,col,'('+d.lista.length+' registros)');
                migrou=true;
              }
            }
          }catch(e){}
        }
      }
    }
  }catch(e){}

  if(migrou) console.info('[Firebase] ✅ Migração concluída — dados copiados para empresa/main/');
  return migrou;
}

// Força upload do localStorage para o Firestore (garante que dados locais vão para nuvem)
async function _uploadLocalParaFirestore(){
  if(!_fbReady) return;
  const db=JSON.parse(localStorage.getItem(K)||'{}');
  const ts=firebase.firestore.FieldValue.serverTimestamp();
  const writes=[];

  // Só faz upload se tem dados locais relevantes
  const GLOBAL_KEYS=['__fil__','__usr__','__pc__','__app__'];
  for(const k of GLOBAL_KEYS){
    if(db[k]!==undefined){
      // Verifica se o Firestore já tem dado — só sobrescreve se local for mais recente
      try{
        const snap=await _fbDb.doc(_fsGlobalPath(k)).get();
        if(!snap.exists){
          writes.push(_fbDb.doc(_fsGlobalPath(k)).set({data:db[k],updatedAt:ts})
            .then(()=>console.info('[FS] Upload local→FS:',k)));
        }
      }catch(e){}
    }
  }

  const fils=db['__fil__']||[];
  for(const fil of fils){
    const fid=fil.id;
    if(!db[fid]) continue;
    for(const col of FS_COLS){
      if(db[fid][col]&&db[fid][col].length>0){
        try{
          const snap=await _fbDb.doc(_fsFilialPath(fid,col)).get();
          if(!snap.exists){
            writes.push(_fbDb.doc(_fsFilialPath(fid,col)).set({lista:db[fid][col],updatedAt:ts})
              .then(()=>console.info('[FS] Upload filial local→FS:',fid,col)));
          }
        }catch(e){}
      }
    }
  }

  if(writes.length>0){
    await Promise.all(writes);
    console.info('[Firebase] ✅ Upload local→Firestore:',writes.length,'documentos');
  }
}

// Salva uma única coleção de filial no Firestore (mais rápido que _fbSyncAll)

// _registrarUsuario — função central de registro/sync de usuário
// Garante que QUALQUER login (email, Google, etc.) aparece em
// Configurações → Usuários com todas as permissões editáveis
// ══════════════════════════════════════════════════════════════
async function _registrarUsuario(fbUser){
  if(!fbUser) return null;
  const db=ld();
  if(!db['__fil__']||!db['__fil__'].length)
    db['__fil__']=[{id:'f1',nome:'Filial Principal',modulos:[]}];
  if(!db['__usr__']) db['__usr__']=[];

  const users=db['__usr__'];
  const idx=users.findIndex(x=>
    x.id===fbUser.uid ||
    (x.email||'').toLowerCase()===(fbUser.email||'').toLowerCase()
  );

  let u;
  if(idx>=0){
    // Já existe — atualiza dados do Firebase Auth mas preserva permissões
    u=users[idx];
    u.id=fbUser.uid;             // garante id correto (uid Firebase)
    u.email=fbUser.email;
    // Atualiza nome só se ainda não foi personalizado
    if(!u.nomePersonalizado && fbUser.displayName){
      u.nome=fbUser.displayName;
    }
    u.fotoUrl=fbUser.photoURL||u.fotoUrl||'';
    u.ultimoAcesso=new Date().toISOString();
    u.provedor=fbUser.providerData?.[0]?.providerId||'password';
    users[idx]=u;
  } else {
    // Novo usuário — primeiro acesso
    const isFirst=users.length===0;
    u={
      id:fbUser.uid,
      nome:fbUser.displayName||fbUser.email.split('@')[0],
      email:fbUser.email,
      perfil:isFirst?'admin':'usuario',   // primeiro usuário é admin
      filiais:[],
      modulos:[],
      fotoUrl:fbUser.photoURL||'',
      provedor:fbUser.providerData?.[0]?.providerId||'password',
      criadoEm:new Date().toISOString(),
      ultimoAcesso:new Date().toISOString(),
      nomePersonalizado:false,
    };
    users.push(u);
    console.info('[Auth] Novo usuário registrado:',u.email,'(perfil:',u.perfil+')');
  }

  db['__usr__']=users;
  _cache=db;_cacheLoaded=true;
  localStorage.setItem('gf_v3',JSON.stringify(db));

  // Sincroniza imediatamente para o Firestore
  if(_fbReady){
    try{
      await _fbDb.doc(_fsGlobalPath('__usr__')).set({
        data:users,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      console.info('[FS] ✅ Usuários sincronizados:',users.length);
    }catch(e){
      console.warn('[Firebase] Sync usuário:',e.code||e.message);
    }
  }

  return u;
}

/* Masks */
const maskCPF=v=>{v=v.replace(/\D/g,'').slice(0,11);if(v.length<=3)return v;if(v.length<=6)return v.replace(/(\d{3})(\d+)/,'$1.$2');if(v.length<=9)return v.replace(/(\d{3})(\d{3})(\d+)/,'$1.$2.$3');return v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/,'$1.$2.$3-$4')};
const maskCNPJ=v=>{v=v.replace(/\D/g,'').slice(0,14);if(v.length<=2)return v;if(v.length<=5)return v.replace(/(\d{2})(\d+)/,'$1.$2');if(v.length<=8)return v.replace(/(\d{2})(\d{3})(\d+)/,'$1.$2.$3');if(v.length<=12)return v.replace(/(\d{2})(\d{3})(\d{3})(\d+)/,'$1.$2.$3/$4');return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d+)/,'$1.$2.$3/$4-$5')};
const maskCelular=v=>{v=v.replace(/\D/g,'').slice(0,11);if(!v.length)return'';if(v.length<=2)return`(${v}`;if(v.length<=7)return v.replace(/(\d{2})(\d+)/,'($1) $2');return v.replace(/(\d{2})(\d{5})(\d+)/,'($1) $2-$3')};
const maskCPFouCNPJ=v=>{const d=v.replace(/\D/g,'');return d.length<=11?maskCPF(v):maskCNPJ(v)};
function bindMasks(){
  document.querySelectorAll('.mask-cpf').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{const s=e.target.selectionStart,prev=e.target.value.length,val=maskCPF(e.target.value);e.target.value=val;})});
  document.querySelectorAll('.mask-cnpj').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{e.target.value=maskCNPJ(e.target.value);})});
  document.querySelectorAll('.mask-cpfcnpj').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{e.target.value=maskCPFouCNPJ(e.target.value);})});
  document.querySelectorAll('.mask-cel').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{e.target.value=maskCelular(e.target.value);})});
}

// ── SETTERS: salvam localmente E sincronizam imediatamente com Firestore ──
function _setGlobal(key, data){
  // 1. Atualiza cache e localStorage imediatamente (síncrono)
  const db=ld();
  db[key]=data;
  _cache=db;
  localStorage.setItem(K,JSON.stringify(db));
  // 2. Sincroniza com Firestore — caminho compartilhado (todos os dispositivos)
  if(_fbReady){
    _fbDb.doc(_fsGlobalPath(key))
      .set({
        data,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: _fbUid||'anon'
      })
      .then(()=>console.info('[FS] ✅ Global sincronizado:',key))
      .catch(e=>console.warn('[FS] setGlobal',key,e.code||e.message));
  }
}

// ── LISTENERS em tempo real — somente docs globais + filial ativa ──
// (não abre 22+ conexões — abre apenas o necessário)
let _listeners=[];
let _lastServerUpdate={};

function _startRealtimeListeners(){
  if(!_fbReady){ console.warn("[FS RT] Firebase não pronto"); return; }
  _stopRealtimeListeners();

  // 1. Escuta os 4 documentos globais (filiais, usuários, config)
  const GLOBAL_KEYS=["__fil__","__usr__","__pc__","__app__"];
  GLOBAL_KEYS.forEach(key=>{
    const unsub=_fbDb.doc(_fsGlobalPath(key))
      .onSnapshot({includeMetadataChanges:false},snap=>{
        if(snap.metadata.fromCache||!snap.exists) return;
        const d=snap.data();
        if(!d||d.data===undefined) return;
        const db=ld();
        db[key]=d.data;
        _cache=db;
        localStorage.setItem(K,JSON.stringify(db));
        if(typeof render==="function") render();
        console.info("[FS RT]",key,"atualizado");
      },e=>console.warn("[FS RT]",key,e.code));
    _listeners.push(unsub);
  });

  // 2. Escuta coleções da filial ATIVA (não todas as filiais)
  _listenFilial(S.fid||gfil()[0]?.id);

  console.info("[Firebase] ✅",_listeners.length,"listeners ativos (globais + filial ativa)");
}

function _listenFilial(fid){
  if(!fid||!_fbReady) return;
  // Para listeners de filial anteriores (mantém globais)
  const globCount=4;
  _listeners.slice(globCount).forEach(u=>{try{u();}catch(e){}});
  _listeners=_listeners.slice(0,globCount);

  // Escuta apenas as coleções mais críticas em tempo real
  const PRIORITY_COLS=["cp","cr","pousada","voo","escala","prod","__fil__"];
  FS_COLS.filter(c=>PRIORITY_COLS.includes(c)||true).forEach(col=>{
    const unsub=_fbDb.doc(_fsFilialPath(fid,col))
      .onSnapshot({includeMetadataChanges:false},snap=>{
        if(snap.metadata.fromCache||!snap.exists) return;
        const d=snap.data();
        if(!d||!Array.isArray(d.lista)) return;
        const db=ld();
        if(!db[fid]) db[fid]={};
        db[fid][col]=d.lista;
        _cache=db;
        localStorage.setItem(K,JSON.stringify(db));
        if(S.fid===fid&&typeof render==="function") render();
      },e=>console.warn("[FS RT]",fid,col,e.code));
    _listeners.push(unsub);
  });
}

function _stopRealtimeListeners(){
  _listeners.forEach(u=>{try{u();}catch(e){}});
  _listeners=[];
  _lastServerUpdate={};
}

});

const bdg=(s)=>{const m={Pago:'g',Recebido:'g',Pendente:'a',Vencido:'r',Cancelado:'gr',Emitida:'b',Paga:'g',Ativo:'g',Inativo:'gr',Afastado:'a',Aprovado:'g',Rascunho:'gr','Check-out':'b',Confirmada:'g',Agendado:'b','Reserva efetuada':'a',Realizado:'g',Concluído:'g'};const cl={g:'bg',a:'ba',r:'br',b:'bb',gr:'bgr'};return`<span class="bdg ${cl[m[s]||'gr']||'bgr'}">${esc(s||'—')}</span>`};
const fi=(id,lbl,tp='text',vl='',ex='')=>`<div class="f"><label>${lbl}</label><input id="${id}" type="${tp}" value="${esc(vl)}" ${ex}/></div>`;
const fsel=(id,lbl,opts,vl='')=>`<div class="f"><label>${lbl}</label><select id="${id}">${opts.map(([v,l])=>`<option value="${v}"${v===vl?' selected':''}>${esc(l)}</option>`).join('')}</select></div>`;
const gv=id=>{const e=document.getElementById(id);return e?e.value:''};
const by=id=>document.getElementById(id);
const on=(s,e,f)=>document.querySelectorAll(s).forEach(el=>el.addEventListener(e,f));

/* ── RENDER MAIN ── */
function render(){
  const root=by('root');
  if(!S.ok){root.innerHTML=renderLogin();bindLogin();return}
  const fils=gfil();
  if(!S.fid)S.fid=fils[0]?.id;
  const fil=fils.find(f=>f.id===S.fid)||fils[0];
  const hab=gfm(fil);
  // Permissões do usuário logado (admin = tudo; usuario = verifica S.user.modulos)
  const isAdmin=S.user?.perfil==='admin';
  const userMods=isAdmin?MODS.map(m=>m.id):(S.user?.modulos||MODS.map(m=>m.id));
  // Admin sempre vê tudo. Usuário normal: filial E módulo liberado
  const canSee=id=>isAdmin||(hab.includes(id)&&userMods.includes(id));
  const canSeeConfig=isAdmin||userMods.includes('configuracoes');
  const opH=canSee('op-docs');
  const ageH=['agendas-pousada','agendas-voo'].some(id=>canSee(id));
  const finH=['dashboard','dre','contas-pagar','contas-receber','despesas','vendas','escala'].some(id=>canSee(id));
  const rhH=isAdmin||['rh-funcionarios','rh-folha','rh-ferias','rh-ponto'].some(id=>canSee(id));
  const ni=(m)=>`<button class="ni${S.page===m.id?' act':''}" data-pg="${m.id}"><span class="ni-ic">${m.ic}</span><span>${m.label}</span></button>`;
  const nav=MENU.map(m=>{
    if(!m)return`<div class="sep"></div>`;
    if(m.id==='configuracoes')return canSeeConfig?ni(m):'';
    if(m.id==='operacional')return opH?ni(m):'';
    if(m.id==='agendas')return ageH?ni(m):'';
    if(m.id==='financeiro')return finH?ni(m):'';
    if(m.id==='rh')return rhH?ni(m):'';
    if(!canSee(m.id))return'';
    return ni(m);
  }).join('');
  const fopts=fils.map(f=>`<option value="${f.id}"${f.id===S.fid?' selected':''}>${esc(f.nome)}</option>`).join('');
  const app=gapp();
  const logoIc=esc((app.nome||'GF').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'GF');
  const curPageLabel=MENU.find(m=>m&&m.id===S.page)?.label||(S.page==='financeiro'?'Financeiro':S.page==='rh'?'RH':'');
  root.innerHTML=`
  <button class="sb-ham" id="btn-ham">☰</button>
  <div class="sb-overlay" id="sb-overlay"></div>
  <div class="mobile-topbar" id="mobile-topbar">
    <div class="mobile-topbar-logo">${logoIc}</div>
    <div class="mobile-topbar-title">${esc(curPageLabel||app.nome||'Sistema')}</div>
    <select class="sb-sel" id="fil-sel-top" style="width:auto;max-width:130px;font-size:12px;padding:5px 8px">${fopts}</select>
  </div>
  <div class="app">
    <div class="sb" id="sb-main">
      <div class="sb-logo"><div class="sb-logo-icon">${logoIc}</div><div><div class="sb-logo-txt">${esc(app.nome||'Gestão Financeira')}</div><div class="sb-logo-sub">${esc(app.sub||'Multi-Filial')}</div></div></div>
      <div class="sb-filial"><div class="sb-filial-lbl">Filial Ativa</div><select class="sb-sel" id="fil-sel">${fopts}</select></div>
      <nav>${nav}</nav>
      <div class="sb-user">
        <div style="font-size:10px;text-align:center;padding:4px 8px;margin-bottom:6px;border-radius:6px;${_fbReady&&_fbUid?'background:rgba(22,163,74,.15);color:#4ade80':'background:rgba(255,255,255,.05);color:var(--text3)'}">
          ${_fbReady&&_fbUid?'🔥 Firebase ativo':'💾 Modo local'}
        </div>
        <div class="sb-usr-row"><div class="av">${(S.user?.nome||'A')[0].toUpperCase()}</div><div><div style="font-size:12px;font-weight:700">${esc(S.user?.nome||'Admin')}</div><div style="font-size:11px;color:var(--text3)">${esc(S.user?.perfil||'admin')}</div></div></div>
        <button class="sb-out" id="btn-out">⏻ Sair</button>
      </div>
    </div>
    <div class="main">${renderPage(fil)}</div>
  </div>
  ${S.modal?renderModal():''}`;
  bindAll();
  bindMasks();
}

/* ── LOGIN (Firebase Auth: email/senha + Google + cadastro) ── */
function renderLogin(){
  const app=gapp();
  const ic=esc((app.nome||'GF').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'GF');
  const tab=S._authTab||'login';
  const googleSVG=`<svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.7 0 6.7 5.5 2.9 13.5l7.8 6C12.5 13.3 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.9 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.9c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/><path fill="#FBBC05" d="M10.7 28.5A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.5l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.7l8.2-6.2z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-4.1-13.1-9.6l-8.2 6.2C6.5 42.4 14.7 48 24 48z"/></svg>`;
  return`<div class="lw"><div class="lc">
  <div class="ll">
    <div class="li">${ic}</div>
    <div style="font-size:20px;font-weight:700">${esc(app.nome||'Gestão Financeira')}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(app.sub||'Multi-Filial')}</div>
  </div>

  <!-- TABS: Login / Criar Conta -->
  <div class="auth-tabs">
    <button class="auth-tab${tab==='login'?' act':''}" data-auth-tab="login">Entrar</button>
    <button class="auth-tab${tab==='register'?' act':''}" data-auth-tab="register">Criar Conta</button>
  </div>

  <!-- GOOGLE -->
  <button class="btn-google" id="btn-google" type="button">
    ${googleSVG}
    ${tab==='register'?'Cadastrar com Google':'Entrar com Google'}
  </button>

  <div class="auth-divider">ou</div>

  <!-- FORMULÁRIO EMAIL/SENHA -->
  <div style="display:flex;flex-direction:column;gap:12px">
    ${tab==='register'?`<div class="f"><label>Nome completo</label>
      <input id="l-nome" type="text" placeholder="Seu nome"
        autocapitalize="words" style="font-size:15px"/></div>`:''}
    <div class="f"><label>Email</label>
      <input id="l-em" type="text" inputmode="email"
        placeholder="seu@email.com"
        autocapitalize="none" autocorrect="off" spellcheck="false"
        style="font-size:15px"/>
    </div>
    <div class="f"><label>Senha</label>
      <div style="position:relative">
        <input id="l-pw" type="password"
          placeholder="${tab==='register'?'Mínimo 6 caracteres':'••••••••'}"
          autocorrect="off" autocapitalize="none" spellcheck="false"
          style="font-size:15px;width:100%;padding-right:44px"/>
        <button type="button" id="btn-show-pw"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px">👁</button>
      </div>
    </div>
    ${tab==='register'?`<div class="f"><label>Confirmar Senha</label>
      <input id="l-pw2" type="password" placeholder="Repita a senha"
        autocorrect="off" autocapitalize="none" style="font-size:15px"/></div>`:''}
    <div id="l-err" style="display:none" class="em"></div>
    <div id="l-ok" style="display:none" class="auth-success"></div>
    <button class="btn btn-p" id="btn-login" style="padding:13px;font-size:15px">
      ${tab==='register'?'Criar Conta':'Entrar'}
    </button>
    ${tab==='login'?`<div style="text-align:center">
      <button class="auth-link" id="btn-forgot">Esqueci minha senha</button>

</div></div>`}
function bindLogin(){
  // Tabs: Login / Criar Conta
  document.querySelectorAll('[data-auth-tab]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      S._authTab=e.currentTarget.dataset.authTab;
      render();
    });
  });

  // Mostrar/ocultar senha
  by('btn-show-pw')?.addEventListener('click',()=>{
    const pw=by('l-pw');if(!pw)return;
    pw.type=pw.type==='password'?'text':'password';
    by('btn-show-pw').textContent=pw.type==='password'?'👁':'🙈';
  });

  const errEl=by('l-err'),okEl=by('l-ok');
  const setErr=msg=>{if(errEl){errEl.style.display='block';errEl.textContent=msg;}if(okEl)okEl.style.display='none';};
  const setOk=msg=>{if(okEl){okEl.style.display='block';okEl.textContent=msg;}if(errEl)errEl.style.display='none';};
  const clearMsg=()=>{if(errEl)errEl.style.display='none';if(okEl)okEl.style.display='none';};
  const setLoading=v=>{const b=by('btn-login');if(b){b.disabled=v;b.style.opacity=v?'.6':'1';}};

  // ── Mensagens de erro Firebase traduzidas ──
  const fbMsg={
    'auth/user-not-found':'Usuário não encontrado.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-credential':'Email ou senha incorretos.',
    'auth/email-already-in-use':'Este email já está cadastrado.',
    'auth/weak-password':'Senha fraca (mínimo 6 caracteres).',
    'auth/invalid-email':'Formato de email inválido.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.',
    'auth/network-request-failed':'Sem conexão. Verifique sua internet.',
    'auth/popup-closed-by-user':'Login cancelado.',
    'auth/popup-blocked':'Popup bloqueado. Permita popups neste site.',
    'auth/cancelled-popup-request':'Login cancelado.',
  };

  // ── Função de login bem-sucedido ──
  const onLoginOk=async(fbUser)=>{
    setLoading(true);
    _fbUid=fbUser.uid;

    // Carrega dados do novo caminho compartilhado
    try{ await _fbLoadGlobal(); }
    catch(e){ console.warn("[Firebase] Usando cache local:",e.code||e.message); }

    // Migração automática se não há dados no novo caminho
    const temDados=gfil().some(f=>f.id!=='f1'||f.nome!=='Filial Principal');
    if(!temDados){
      const migrou=await _migrarDadosAntigos(fbUser.uid);
      if(migrou) await _fbLoadGlobal();
      else{ await _uploadLocalParaFirestore(); await _fbLoadGlobal(); }
    }

    // Registra usuário e renderiza IMEDIATAMENTE
    const u=await _registrarUsuario(fbUser);
    S.ok=true;S.user=u;
    render();

    // Carrega dados das filiais em background
    _fbLoadFiliais(()=>{ if(S.ok) render(); }).catch(e=>console.warn("[FS]",e.message));

    // Listeners em tempo real
    _startRealtimeListeners();
  };

  // ── LOGIN COM EMAIL E SENHA ──
  const doEmailLogin=async()=>{
    clearMsg();
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    const pw=(by('l-pw')?.value||'').replace(/\s+$/,'');
    if(!em){setErr('Informe o email.');return;}
    if(!pw){setErr('Informe a senha.');return;}
    if(!_fbReady){
      // Fallback local
      const users=gus();
      const u=users.find(x=>(x.email||'').replace(/\s/g,'').toLowerCase()===em&&(x.senha||'').replace(/\s+$/,'')===pw);
      if(u){S.ok=true;S.user=u;render();}
      else setErr('Email ou senha incorretos. (Modo offline)');
      return;
    }
    setLoading(true);
    try{
      const cred=await _fbAuth.signInWithEmailAndPassword(em,pw);
      await onLoginOk(cred.user);
    }catch(err){
      setLoading(false);
      setErr(fbMsg[err.code]||'Erro: '+err.message);
    }
  };

  // ── CRIAR CONTA ──
  const doRegister=async()=>{
    clearMsg();
    const nome=(by('l-nome')?.value||'').trim();
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    const pw=(by('l-pw')?.value||'').replace(/\s+$/,'');
    const pw2=(by('l-pw2')?.value||'').replace(/\s+$/,'');
    if(!nome){setErr('Informe seu nome.');return;}
    if(!em){setErr('Informe o email.');return;}
    if(!pw||pw.length<6){setErr('Senha deve ter pelo menos 6 caracteres.');return;}
    if(pw!==pw2){setErr('As senhas não coincidem.');return;}
    if(!_fbReady){setErr('Firebase não está disponível. Verifique sua conexão.');return;}
    setLoading(true);
    try{
      const cred=await _fbAuth.createUserWithEmailAndPassword(em,pw);
      // Salva nome no perfil
      await cred.user.updateProfile({displayName:nome}).catch(()=>{});
      setOk('✅ Conta criada! Fazendo login...');
      await onLoginOk({...cred.user,displayName:nome});
    }catch(err){
      setLoading(false);
      setErr(fbMsg[err.code]||'Erro: '+err.message);
    }
  };

  // ── LOGIN COM GOOGLE ──
  by('btn-google')?.addEventListener('click',async()=>{
    clearMsg();
    if(!_fbReady){setErr('Firebase não disponível.');return;}
    setLoading(true);
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({prompt:'select_account'});
      const result=await _fbAuth.signInWithPopup(provider);
      await onLoginOk(result.user);
    }catch(err){
      setLoading(false);
      if(err.code!=='auth/popup-closed-by-user'&&err.code!=='auth/cancelled-popup-request')
        setErr(fbMsg[err.code]||'Erro Google: '+err.message);
    }
  });

  // ── ESQUECI A SENHA ──
  by('btn-forgot')?.addEventListener('click',async()=>{
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    if(!em){setErr('Digite seu email para recuperar a senha.');return;}
    if(!_fbReady){setErr('Firebase não disponível.');return;}
    clearMsg();
    try{
      await _fbAuth.sendPasswordResetEmail(em);
      setOk('✅ Email de recuperação enviado para '+em+'. Verifique sua caixa de entrada.');
    }catch(err){
      setErr(fbMsg[err.code]||'Erro: '+err.message);
    }
  });

  // ── SUBMIT com Enter ──
  const tab=S._authTab||'login';
  by('btn-login')?.addEventListener('click',tab==='register'?doRegister:doEmailLogin);
  by('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')(tab==='register'?doRegister:doEmailLogin)();});
  by('l-em')?.addEventListener('keydown',e=>{if(e.key==='Enter')by('l-pw')?.focus();});
  by('l-pw2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
}

/* ── ROUTE ── */
function renderPage(fil){
  const db=ld(),fid=fil.id;
  switch(S.page){
    case'financeiro':return pgFinanceiro(db,fid,fil);
    case'dashboard':return pgDash(db,fid,fil);
    case'rh':return pgRH(db,fid,fil);
    case'dre':return pgDRE(db,fid,fil);
    case'despesas':return pgDesp(db,fid,fil);
    case'contas-pagar':return pgCP(db,fid,fil);
    case'contas-receber':return pgCR(db,fid,fil);
    case'vendas':return pgVendas(db,fid,fil);
    case'escala':return pgEscala(db,fid,fil);
    case'cadastros':return pgCad(db,fid,fil);
    case'estoque':return pgEstoque(db,fid,fil);
    case'agendas':return pgAgendas(db,fid,fil);
    case'operacional':return pgOp(db,fid,fil);
    case'configuracoes':return pgConfig(fil);
    default:return`<div class="page"><p style="color:var(--text3)">Selecione um módulo.</p></div>`;
  }
}

/* ── FINANCEIRO (hub page com navegação horizontal) ── */
function pgFinanceiro(db,fid,fil){
  const sub=S.finTab||'dashboard';

  // Dados resumo para os badges das tabs
  const cp=gfd(db,fid,'cp'),cr=gfd(db,fid,'cr');
  const desp=gfd(db,fid,'despesas'),vend=gfd(db,fid,'vendas');
  const escala=gfd(db,fid,'escala');
  const cpPend=cp.filter(i=>i.status==='Pendente').length;
  const crPend=cr.filter(i=>i.status==='Pendente').length;
  const despPend=desp.filter(i=>i.status==='Pendente').length;

  const tabs=[
    {id:'dashboard',ic:'📊',l:'Dashboard',badge:0},
    {id:'dre',      ic:'📈',l:'DRE',      badge:0},
    {id:'cp',       ic:'📤',l:'A Pagar',  badge:cpPend},
    {id:'cr',       ic:'📥',l:'A Receber',badge:crPend},
    {id:'despesas', ic:'💸',l:'Despesas', badge:despPend},
    {id:'vendas',   ic:'🏷️',l:'Vendas',  badge:0},
    {id:'escala',   ic:'🗓️',l:'Escala',  badge:0},
  ];

  const tabsHTML=tabs.map(t=>`
    <button class="fin-tab${sub===t.id?' act':''}" data-fin="${t.id}">
      <span class="fin-tab-ic">${t.ic}</span>
      <span class="fin-tab-lbl">${t.l}</span>
      ${t.badge>0?`<span class="fin-badge">${t.badge}</span>`:''}
    </button>`).join('');

  // Renderiza o conteúdo da sub-página
  const pages={
    dashboard:()=>pgDash(db,fid,fil),
    dre:      ()=>pgDRE(db,fid,fil),
    cp:       ()=>pgCP(db,fid,fil),
    cr:       ()=>pgCR(db,fid,fil),
    despesas: ()=>pgDesp(db,fid,fil),
    vendas:   ()=>pgVendas(db,fid,fil),
    escala:   ()=>pgEscala(db,fid,fil),
  };
  const inner=(pages[sub]||pages.dashboard)();
  const curTab=tabs.find(t=>t.id===sub)||tabs[0];

  return`
  <div class="fin-wrap">
    <div class="fin-header">
      <div class="fin-breadcrumb">
        <span class="fin-bc-root">💰 Financeiro</span>
        <span class="fin-bc-sep">›</span>
        <span class="fin-bc-cur">${curTab.ic} ${curTab.l}</span>
      </div>
      <nav class="fin-tabs">${tabsHTML}</nav>
    </div>
    <div class="fin-body">${inner}</div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════════
   CÁLCULO DE FÉRIAS — CLT + Tabelas 2026
   INSS: Método alíquota × base − dedução acumulada (2026)
   Validado: base R$ 2.000 → R$ 2.000×9% − R$ 24,32 = R$ 155,68
   IRRF: Lei 14.848/2024 | FGTS: Lei 8.036/90 — 8% patronal
══════════════════════════════════════════════════════════════ */
function calcINSS(base){
  // Tabela INSS 2026 — alíquota da faixa × base − dedução acumulada
  // Faixas reajustadas pelo INPC (~6,8% sobre tabela 2025)
  // Dedução = diferença acumulada das alíquotas nas faixas anteriores
  //
  // Faixa 1: até R$ 1.621,33 → 7,5% − R$ 0,00
  // Faixa 2: até R$ 3.082,16 → 9,0% − R$ 24,32  ← ex: R$2.000×9%−24,32=R$155,68 ✓
  // Faixa 3: até R$ 4.476,23 → 12%  − R$ 116,78
  // Faixa 4: até R$ 8.712,93 → 14%  − R$ 206,30
  const T=[
    {ate:1621.33, aliq:0.075, ded:  0.00},
    {ate:3082.16, aliq:0.090, ded: 24.32},
    {ate:4476.23, aliq:0.120, ded:116.78},
    {ate:8712.93, aliq:0.140, ded:206.30},
  ];
  for(const f of T){
    if(base<=f.ate) return Math.max(0,parseFloat((base*f.aliq-f.ded).toFixed(2)));
  }
  return parseFloat((8712.93*0.14-206.30).toFixed(2)); // teto máximo
}

function calcIRRF(baseCalculo){
  // Tabela IRRF 2026 — Lei 14.848/2024
  // Isento até R$ 2.428,80 (atualizado 2026)
  const T=[
    {ate:2428.80,  aliq:0.000, ded:   0.00},  // isento
    {ate:2826.65,  aliq:0.075, ded: 182.16},
    {ate:3751.05,  aliq:0.150, ded: 394.16},
    {ate:4664.68,  aliq:0.225, ded: 675.49},
    {ate:Infinity, aliq:0.275, ded: 908.73},
  ];
  for(const f of T){
    if(baseCalculo<=f.ate)
      return Math.max(0,parseFloat((baseCalculo*f.aliq-f.ded).toFixed(2)));
  }
  return 0;
}

function calcFerias(salario, dias){
  // 1. Valor proporcional (CLT Art. 129 — salário/30 × dias)
  const valorDiario = parseFloat((salario/30).toFixed(6));
  const valorFerias = parseFloat((valorDiario*dias).toFixed(2));

  // 2. 1/3 constitucional (CF/88 Art. 7º, XVII)
  const tercoConstitucional = parseFloat((valorFerias/3).toFixed(2));

  // 3. Total bruto (base de cálculo)
  const totalBruto = parseFloat((valorFerias+tercoConstitucional).toFixed(2));

  // 4. INSS — incide sobre o total bruto das férias
  const inss = calcINSS(totalBruto);

  // 5. FGTS — 8% sobre total bruto (encargo do empregador, não desconta do funcionário)
  const fgts = parseFloat((totalBruto*0.08).toFixed(2));

  // 6. Base IRRF = total bruto − INSS
  const baseIRRF = parseFloat((totalBruto-inss).toFixed(2));

  // 7. IRRF
  const irrf = calcIRRF(baseIRRF);

  // 8. Líquido a receber
  const liquido = parseFloat((totalBruto-inss-irrf).toFixed(2));

  return{
    valorDiario:parseFloat(valorDiario.toFixed(2)),
    valorFerias, tercoConstitucional, totalBruto,
    inss, fgts, baseIRRF, irrf, liquido
  };
}

/* ══════════════════════════════════════════════════════════════
   CÁLCULO DE RESCISÃO — CLT 2026
   Arts. 477, 478, 479, 480, 484-A, 487, 488 e 496 da CLT
   Lei 8.036/90 (FGTS) | Lei 9.491/97 | Dec. 99.684/90
══════════════════════════════════════════════════════════════ */
function calcRescisao(sal, mesesTrab, motivo, avisoPrevioTrabalhado, saldoDias, feriasVencDias, feriasProDias){
  const r2=v=>parseFloat(v.toFixed(2));
  const sd=Number(saldoDias||0);
  const fv=Number(feriasVencDias||0);
  const fp=Number(feriasProDias||0);
  const dm=new Date().getDate();

  // ── Saldo de salário (dias trabalhados no mês de desligamento) ──
  const saldoSalario = r2(sal/30*sd);

  // ── Aviso Prévio (CLT Art. 487 + Lei 12.506/2011) ──
  // 30 dias + 3 dias por ano trabalhado, máximo 90 dias
  const diasAviso=Math.min(90, 30+Math.floor(mesesTrab/12)*3);
  const valorAviso=r2(sal/30*diasAviso);

  // ── 13º Salário proporcional (Lei 4.090/62) ──
  const meses13=Math.min(12, mesesTrab%12||12);
  const decimo3=r2(sal/12*meses13);

  // ── Férias vencidas + 1/3 (CLT Art. 148) ──
  const valorFeriasVenc=fv>0?r2(sal/30*fv):0;
  const tercoFV=r2(valorFeriasVenc/3);

  // ── Férias proporcionais + 1/3 (CLT Art. 147) ──
  const valorFeriasProp=fp>0?r2(sal/30*fp):0;
  const tercoFP=r2(valorFeriasProp/3);

  // ── FGTS sobre saldo (Lei 8.036/90 — 8% mês a mês) ──
  const fgtsAcumulado=r2(sal*mesesTrab*0.08); // estimativa

  // ── Multa FGTS (Dec. 99.684/90) ──
  let multaFGTS=0;
  if(motivo==='Sem Justa Causa') multaFGTS=r2(fgtsAcumulado*0.40);  // 40% (empregador paga)
  else if(motivo==='Acordo Mutuo') multaFGTS=r2(fgtsAcumulado*0.20); // 20% acordo mútuo

  // ── O que o funcionário RECEBE por tipo de desligamento ──
  let recebeSaldoSal=false,recebeAviso=false,recebe13=false;
  let recebeFV=false,recebeFP=false,recebeMulta=false,deveAviso=false;

  if(motivo==='Sem Justa Causa'){
    recebeSaldoSal=true;recebeAviso=true;recebe13=true;recebeFV=true;recebeFP=true;recebeMulta=true;
  } else if(motivo==='Com Justa Causa'){
    recebeSaldoSal=true; // só saldo de dias trabalhados
    // Não recebe: aviso prévio, 13º, férias proporcionais, multa FGTS
    recebeFV=true; // férias vencidas sempre (Súmula 171 TST)
  } else if(motivo==='Pedido de Demissao'){
    recebeSaldoSal=true;recebe13=true;recebeFV=true;recebeFP=true;
    // Aviso: se não trabalhar, desconta do acerto
    if(!avisoPrevioTrabalhado) deveAviso=true;
  } else if(motivo==='Acordo Mutuo'){
    recebeSaldoSal=true;recebe13=true;recebeFV=true;recebeFP=true;recebeMulta=true;
    recebeAviso=true; // 50% do aviso (art. 484-A)
  } else if(motivo==='Aposentadoria'||motivo==='Termino Contrato'){
    recebeSaldoSal=true;recebe13=true;recebeFV=true;recebeFP=true;
  }

  // ── Totais brutos ──
  const totalBruto=r2(
    (recebeSaldoSal?saldoSalario:0)+
    (recebeAviso?(motivo==='Acordo Mutuo'?valorAviso*0.5:valorAviso):0)+
    (recebe13?decimo3:0)+
    (recebeFV?(valorFeriasVenc+tercoFV):0)+
    (recebeFP?(valorFeriasProp+tercoFP):0)-
    (deveAviso?valorAviso:0)
  );

  // ── Descontos ──
  const inssResc=calcINSS(totalBruto>0?totalBruto:0);
  const baseIRRF=r2(totalBruto-inssResc);
  const irrfResc=calcIRRF(baseIRRF>0?baseIRRF:0);
  const liquido=r2(totalBruto-inssResc-irrfResc);

  return{
    saldoSalario,valorAviso:recebeAviso?(motivo==='Acordo Mutuo'?r2(valorAviso*0.5):valorAviso):0,
    decimo3:recebe13?decimo3:0,diasAviso,
    valorFeriasVenc:recebeFV?valorFeriasVenc:0,tercoFV:recebeFV?tercoFV:0,
    valorFeriasProp:recebeFP?valorFeriasProp:0,tercoFP:recebeFP?tercoFP:0,
    fgtsAcumulado,multaFGTS,
    deveAviso:deveAviso?valorAviso:0,
    totalBruto,inssResc,irrfResc,liquido,
    recebeSaldoSal,recebeAviso,recebe13,recebeFV,recebeFP,recebeMulta,deveAviso
  };
}

function renderCalcRescisao(c, sal, meses, motivo, aviso){
  const row=(l,v,color)=>`<div class="calc-row" ${color?`style="color:${color}"`:''}><span>${l}</span><span>${fmt(v)}</span></div>`;
  const sep=`<div style="border-top:1px solid var(--border);margin:4px 0"></div>`;
  let html='';
  html+=`<div class="calc-row" style="color:var(--text3);font-size:10px"><span>Salário base:</span><span>${fmt(sal)} | ${meses}m serviço</span></div>`;
  html+=sep;
  if(c.recebeSaldoSal) html+=row('Saldo de Salário',c.saldoSalario);
  if(c.recebeAviso)    html+=row('Aviso Prévio ('+c.diasAviso+'d)'+(motivo==='Acordo Mutuo'?' 50%':''),c.valorAviso);
  if(c.recebe13)       html+=row('13º Salário Proporcional',c.decimo3);
  if(c.recebeFV&&c.valorFeriasVenc>0) html+=row('Férias Vencidas',c.valorFeriasVenc)+row('+ 1/3 Férias Vencidas',c.tercoFV);
  if(c.recebeFP&&c.valorFeriasProp>0) html+=row('Férias Proporcionais',c.valorFeriasProp)+row('+ 1/3 Férias Proporcionais',c.tercoFP);
  if(c.deveAviso>0)    html+=row('− Aviso Prévio não cumprido',-c.deveAviso,'var(--red-t)');
  html+=sep;
  html+=row('<strong>= Total Bruto</strong>',c.totalBruto);
  html+=row('− INSS (progressivo)',c.inssResc,'var(--red-t)');
  html+=row('− IRRF',c.irrfResc,'var(--red-t)');
  html+=`<div class="calc-row" style="border-top:2px solid var(--border);padding-top:6px;margin-top:4px"><span style="font-size:13px"><strong>= Líquido Rescisório</strong></span><span style="color:var(--green-t);font-weight:700;font-size:15px">${fmt(c.liquido)}</span></div>`;
  html+=sep;
  html+=`<div style="background:rgba(251,191,36,.08);border-radius:6px;padding:8px 10px;margin-top:4px">`;
  html+=`<div style="font-size:10px;font-weight:700;color:var(--amber-t);margin-bottom:4px">FGTS (encargo patronal)</div>`;
  html+=row('FGTS acumulado estimado (8%)',c.fgtsAcumulado,'var(--amber-t)');
  if(c.multaFGTS>0) html+=row('Multa FGTS ('+(motivo==='Acordo Mutuo'?'20%':'40%')+')',c.multaFGTS,'var(--amber-t)');
  html+=`</div>`;
  return html;
}

/* ── CONTAS A PAGAR ── */
function pgCP(db,fid,fil){
  const CATS=['','Fornecedor','Colaborador','Prestador de Serviço','Atração Artística','Operacional','Administrativo','Folha de Pagamento','Férias','Outros'];
  let lista=gfd(db,fid,'cp');

  // ── Filtros ──
  const fs=S.fs||'', fc=S.fc||'';

  if(fs)  lista=lista.filter(i=>i.status===fs);
  if(fc)  lista=lista.filter(i=>i.categoria===fc);
  if(fdDe) lista=lista.filter(i=>i.vencimento&&i.vencimento>=fdDe);
  if(fdAte) lista=lista.filter(i=>i.vencimento&&i.vencimento<=fdAte);

  // ── Totalizadores ──

  const totVenc   = lista.filter(i=>i.status==='Vencido').reduce((s,i)=>s+Number(i.valor||0),0);

    <div class="sc"><div class="sl">Pago</div><div class="sv" style="color:var(--green-t)">${fmt(totPago)}</div></div>
    <div class="sc"><div class="sl">Pendente</div><div class="sv" style="color:var(--amber-t)">${fmt(totPend)}</div></div>
    <div class="sc"><div class="sl">Vencido</div><div class="sv" style="color:var(--red-t)">${fmt(totVenc)}</div></div>

  <!-- Barra de filtros -->

        <select id="f-status">
          <option value="">Todos</option>
          ${['Pago','Pendente','Vencido','Cancelado'].map(s=>`<option${fs===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="f" style="flex:1;min-width:150px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Categoria</label>
        <select id="f-cat">
          <option value="">Todas</option>
          ${CATS.filter(Boolean).map(c=>`<option${fc===c?' selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="f" style="min-width:130px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Venc. de</label>

      <div class="f" style="min-width:130px;margin:0">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Venc. até</label>

    </div>

  <!-- Tabela -->
  <div class="card">${lista.length===0?`<div class="empty">Nenhuma conta encontrada com os filtros aplicados.</div>`:`
  <table><thead><tr>
    <th>Nome</th><th>Categoria</th><th>Referência</th><th>Valor</th>
    <th>Vencimento</th><th>Pgto</th><th>Parcelas</th><th>Status</th><th>Anexo</th><th></th>

  </tbody></table>`}</div>

}

/* ── ESTOQUE ── */
function pgEstoque(db,fid,fil){
  const tab=S.tab||'prod';
  const hab=gfm(fil);
  const prods=gfd(db,fid,'prod'),ents=gfd(db,fid,'ent'),conts=gfd(db,fid,'cont');
  return`<div class="page">
  <div class="ph"><div><div class="pt">Controle de Estoque</div><div class="ps">${esc(fil.nome)}</div></div>
  <div style="display:flex;gap:8px">
    <button class="btn" id="btn-est-pdf" title="Relatório PDF do estoque">📄 PDF</button>
    <button class="btn" id="btn-est-modelo" title="Baixar modelo CSV">📥 Modelo</button>
    <label class="btn" id="lbl-est-import" title="Importar via CSV" style="cursor:pointer">⬆ Importar<input type="file" id="inp-est-import" accept=".csv" style="display:none"/></label>
    <button class="btn btn-p" id="btn-new">+ Novo</button>
  </div></div>
  <div class="tabs">
    <button class="tab${tab==='prod'?' act':''}" data-tab="prod">Produtos</button>
    <button class="tab${tab==='ent'?' act':''}" data-tab="ent">Entradas</button>
    <button class="tab${tab==='said'?' act':''}" data-tab="said">Saídas/Vendas</button>
    <button class="tab${tab==='cont'?' act':''}" data-tab="cont">Contagens</button>
    ${hab.includes('op-pedidos')?`<button class="tab${tab==='pedidos'?' act':''}" data-tab="pedidos">Pedidos de Compra</button>`:''}
  </div>
  <div class="card">
  ${tab==='prod'?prods.length===0?`<div class="empty">Nenhum produto.</div>`:`
  <table><thead><tr><th>Produto</th><th>Categoria</th><th>Saldo</th><th>Custo</th><th>Venda</th><th>Última Contagem</th><th></th></tr></thead><tbody>
  ${prods.map(i=>`<tr><td>${esc(i.produto)}</td><td>${esc(i.categoria||'—')}</td><td style="font-weight:700;color:var(--blue-t)">${i.quantidade||0}</td><td>${i.valorCusto?fmt(i.valorCusto):'—'}</td><td>${i.valorVenda?fmt(i.valorVenda):'—'}</td><td>${fmtD(i.dataUltimaContagem)}</td>
  <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="prod">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="prod">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`
  :tab==='ent'?ents.length===0?`<div class="empty">Nenhuma entrada.</div>`:`
  <table><thead><tr><th>Produto</th><th>Qtd</th><th>Data</th><th>Responsável</th><th>Fornecedor/Origem</th><th>Status</th><th></th></tr></thead><tbody>
  ${ents.map(i=>`<tr><td>${esc(i.prodNome||'—')}</td><td>${i.quantidade}</td><td>${fmtD(i.data)}</td><td>${esc(i.responsavel||'—')}</td><td>${i.pedidoDesc?`<span class="bdg bgr">Pedido: ${esc(i.pedidoDesc)}</span>`:esc(i.fornecedor||'—')}</td><td>${bdg(i.status||'Pendente')}</td>
  <td><div class="ar">${i.status!=='Aprovado'?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="ent">✓ Confirmar</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="ent">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="ent">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`
  :tab==='pedidos'?(()=>{const pedidos=gfd(db,fid,'pedidos');return pedidos.length===0?`<div class="empty">Nenhum pedido de compra.</div>`:`
  <table><thead><tr><th>Fornecedor</th><th>Data</th><th>Status</th><th>Itens</th><th></th></tr></thead><tbody>
  ${pedidos.map(i=>`<tr><td>${esc(i.fornecedor||i.descricao||'—')}</td><td>${fmtD(i.data)}</td><td>${bdg(i.status)}</td><td>${(i.itens||[]).length}</td>
  <td><div class="ar">${(i.status==='Pendente'||i.status==='Rascunho')?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="pedidos" title="Aprovar pedido — cria entradas pendentes">✓ Aprovar</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="pedidos">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="pedidos">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`;})()
  :tab==='said'?(()=>{
    const saids=gfd(db,fid,'said');
    // Verifica divergências: saldo produto - saídas vs última contagem
    const alertas=[];
    prods.forEach(p=>{
      const totalSaid=saids.filter(s=>s.prodId===p.id).reduce((a,s)=>a+Number(s.quantidade||0),0);
      const saldoCalc=Number(p.quantidade||0)-totalSaid;
      const ultCont=conts.filter(c=>c.prodId===p.id&&c.status==='Aprovado').sort((a,b)=>b.data>a.data?1:-1)[0];
      if(ultCont&&Math.abs(saldoCalc-Number(ultCont.quantidadeContada||0))>0){
        alertas.push({prod:p.produto,saldoCalc,contagem:Number(ultCont.quantidadeContada),diff:saldoCalc-Number(ultCont.quantidadeContada)});
      }
    });

    </div>`;
  }

  /* RH — FÉRIAS */
  else if(modal==='rh_ferias'){
    title=(eid?'Editar':'Nova')+' Férias';
    const funcs=gfd(db,fid,'rh_func').filter(f=>f.status==='Ativo');
    const STATUS_F=[['Pendente','Pendente'],['Aprovada','Aprovada'],['Ativo','Em Andamento'],['Concluída','Concluída']];

        </div>

      <div class="f gf"><label>Observações</label><textarea id="f-obs">${esc(form.observacoes||'')}</textarea></div>
    </div>`;
  }

  /* RH — DESLIGAMENTO */
  else if(modal==='rh_deslig'){
    title=(eid?'Editar':'Novo')+' Desligamento';
    const funcs=gfd(db,fid,'rh_func').filter(f=>f.status==='Ativo'||f.status==='Afastado');
    const MOTIVOS=[
      ['Sem Justa Causa','Sem Justa Causa (empregador)'],
      ['Com Justa Causa','Com Justa Causa (empregador)'],
      ['Pedido de Demissao','Pedido de Demissão (funcionário)'],
      ['Acordo Mutuo','Acordo Mútuo (art. 484-A CLT)'],
      ['Aposentadoria','Aposentadoria'],
      ['Termino Contrato','Término de Contrato']

    const funcSel=form.funcId?funcs.find(f=>f.id===form.funcId):null;
    const sal=Number(funcSel?.salario||0);
    const admissao=funcSel?.dataAdmissao||'';
    const desligDate=form.dataDesligamento||td();
    // Calcula tempo de serviço
    let mesesTrab=0,anosStr='';

      const dtA=new Date(admissao+'T12:00:00');
      const dtD=new Date(desligDate+'T12:00:00');
      mesesTrab=Math.max(0,Math.round((dtD-dtA)/(30.44*86400000)));
      const a=Math.floor(mesesTrab/12),m=mesesTrab%12;

    }
    const motivo=form.motivo||'Sem Justa Causa';
    const aviso=form.avisoPrevio!==false;
    // Cálculo rescisão
    const calc=calcRescisao(sal,mesesTrab,motivo,aviso,form.saldoDias||0,form.feriasVencidas||0,form.feriasProporcionais||0);
    body=`<div class="g2">
      <div class="f"><label>Funcionário *</label><select id="f-func-id" required>
        <option value="">— Selecione —</option>
        ${funcs.map(f=>`<option value="${f.id}"
          data-salario="${f.salario||0}"
          data-admissao="${f.dataAdmissao||''}"
          ${form.funcId===f.id?' selected':''}>${esc(f.nome)}</option>`).join('')}
      </select></div>
      <div class="f"><label>Data de Desligamento *</label><input id="f-deslig-data" type="date" value="${esc(desligDate)}"/></div>
      ${funcSel?`<div class="f"><label>Admissão</label><div style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;color:var(--text2)">${fmtD(admissao)}</div></div>
      <div class="f"><label>Tempo de Serviço</label><div style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;font-weight:700;color:var(--blue-t)">${anosStr||'—'}</div></div>`:''}
      ${fsel('f-motivo','Motivo do Desligamento',MOTIVOS,motivo)}
      <div class="f"><label>Aviso Prévio</label>
        <select id="f-aviso">

        </select>
      </div>
      ${fi('f-saldo-dias','Saldo de Dias a Receber','number',form.saldoDias||0,'min="0" max="31"')}
      ${fi('f-ferias-vencidas','Férias Vencidas (dias)','number',form.feriasVencidas||0,'min="0" max="30"')}
      ${fi('f-ferias-prop','Férias Proporcionais (dias)','number',form.feriasProporcionais||0,'min="0" max="30"')}
      <div class="f gf"><label>Cálculo de Rescisão — CLT 2026</label>
        <div id="deslig-calc-box" style="background:var(--bg4);border-radius:8px;padding:12px 14px;font-size:12px">
          ${sal?renderCalcRescisao(calc,sal,mesesTrab,motivo,aviso):
            '<span style="color:var(--text3)">Selecione o funcionário para calcular</span>'}
        </div>
      </div>
      ${fsel('f-modal-status','Status',[['Pendente','Pendente'],['Processado','Processado'],['Pago','Pago']],form.status||'Pendente')}
      <div class="f gf"><label>Observações</label><textarea id="f-obs">${esc(form.observacoes||'')}</textarea></div>
    </div>`;
  }

  /* RH — PONTO */
  else if(modal==='rh_ponto'){
    title=(eid?'Editar':'Registrar')+' Ponto';
    const funcs=gfd(db,fid,'rh_func').filter(f=>f.status==='Ativo');
    const STATUS_P=[['Normal','Normal'],['Falta','Falta'],['Atestado','Atestado'],['Folga','Folga']];
    body=`<div class="g2">
      <div class="f"><label>Funcionário *</label><select id="f-func-id" required>
        <option value="">— Selecione —</option>
        ${funcs.map(f=>`<option value="${f.id}" ${form.funcId===f.id?' selected':''}>${esc(f.nome)}</option>`).join('')}
      </select></div>
      ${fi('f-data','Data','date',form.data||td())}
      ${fi('f-entrada','Horário de Entrada','time',form.entrada||'')}
      ${fi('f-saida','Horário de Saída','time',form.saida||'')}
      <div class="f"><label>Intervalo — Saída</label><input id="f-int-saida" type="time" value="${esc(form.intervaloSaida||'')}"/></div>
      <div class="f"><label>Intervalo — Retorno</label><input id="f-int-retorno" type="time" value="${esc(form.intervaloRetorno||'')}"/></div>
      <div class="f"><label>Horas Trabalhadas</label>
        <div id="ponto-horas-calc" style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:14px;font-weight:700;color:var(--blue-t)">${form.horasTrabalhadas||'—'}</div>
      </div>
      <div class="f"><label>Horas Extras</label>
        <div id="ponto-hextra-calc" style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:14px;font-weight:700;color:var(--amber-t)">${form.horasExtras||'0:00'}</div>
      </div>
      ${fsel('f-modal-status','Status',STATUS_P,form.status||'Normal')}
      <div class="f gf"><label>Observações</label><textarea id="f-obs">${esc(form.observacoes||'')}</textarea></div>
    </div>`;
  }

  /* PLANO DE CONTAS */
  else if(modal==='plano'){
    title=(eid?'Editar':'Novo')+' Plano de Contas';
    const TIPOS=[['Despesa','Despesa'],['Receita','Receita'],['Ativo','Ativo'],['Passivo','Passivo']];
    body=`<div class="g2">
      ${fi('f-cod','Código *','text',form.codigo||'','required')}
      ${fsel('f-tipo','Tipo',TIPOS,form.tipo||'Despesa')}
      ${fi('f-nome','Nome *','text',form.nome||'','required')}
      <div class="f gf"><label>Descrição</label><textarea id="f-desc">${esc(form.descricao||'')}</textarea></div>
    </div>`;

  return`<div class="ov" id="ov">
    <div class="modal"${wide?' style="max-width:780px"':''}>
      <div class="mh"><span class="mt">${title}</span><button class="mc" id="modal-x">×</button></div>
      <div class="mb">${body}
        <div class="fa"><button class="btn" id="modal-cancel">Cancelar</button><button class="btn btn-p" id="modal-save">💾 Salvar</button></div>
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   COLLECT FORM
═══════════════════════════════════════════════ */
function collectForm(){
  const gr=n=>{const e=document.querySelector(`input[name="${n}"]:checked`);return e?e.value:''};
  const m=S.modal,f=S.form;
  const pc=gpc();
  if(m==='cp'){
    const pcId=gv('f-pc');
    const pcNome=pcId?(pc.find(p=>p.id===pcId)?.nome||''):'';
