<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gestão Financeira</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1929;--bg2:#1a2740;--bg3:#1e2f4a;--bg4:#243452;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --blue:#1a56db;--blue-bg:rgba(26,86,219,0.15);--blue-t:#60a5fa;
  --green:#16a34a;--green-bg:rgba(22,163,74,0.15);--green-t:#4ade80;
  --red:#dc2626;--red-bg:rgba(220,38,38,0.15);--red-t:#f87171;
  --amber-bg:rgba(180,83,9,0.15);--amber-t:#fbbf24;
  --gray-bg:rgba(100,116,139,0.15);--gray-t:#94a3b8;
  --r:10px;--rl:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sb{width:232px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:50;transition:width .2s}
.main{margin-left:232px;flex:1;min-height:100vh}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.sb-logo-txt{font-size:13px;font-weight:700}
.sb-logo-sub{font-size:10px;color:var(--text3)}
.sb-filial{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-filial-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:5px}
.sb-sel{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--text);cursor:pointer}
.sb-sel option{background:#1e2f4a}
nav{padding:8px;flex:1}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.ni.act{background:var(--blue-bg);color:var(--blue-t)}
.ni-ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sep{height:1px;background:var(--border);margin:6px 2px}
.sb-user{padding:10px 12px;border-top:1px solid var(--border)}
.sb-usr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.av{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);color:var(--blue-t);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-out{width:100%;background:var(--red-bg);color:var(--red-t);border:1px solid rgba(220,38,38,0.25);border-radius:7px;padding:7px;font-size:12px;cursor:pointer;font-weight:600}
.page{padding:26px 30px;min-height:100vh}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.pt{font-size:21px;font-weight:700}
.ps{font-size:12px;color:var(--text3);margin-top:3px}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,0.06);color:var(--text);transition:all .15s}
.btn:hover{background:rgba(255,255,255,0.1)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#1447b5}
.btn-d{background:var(--red-bg);color:var(--red-t);border-color:rgba(220,38,38,0.3)}
.btn-s{background:var(--green-bg);color:var(--green-t);border-color:rgba(22,163,74,0.3)}
.btn-sm{padding:4px 10px;font-size:12px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px}
.sl{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600}
.sv{font-size:22px;font-weight:700}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:16px}
.ct{font-size:14px;font-weight:700;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{font-size:13px;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.bdg{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700}
.bg{background:var(--green-bg);color:var(--green-t)}
.ba{background:var(--amber-bg);color:var(--amber-t)}
.br{background:var(--red-bg);color:var(--red-t)}
.bb{background:var(--blue-bg);color:var(--blue-t)}
.bgr{background:var(--gray-bg);color:var(--gray-t)}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,0.05);border-radius:9px;padding:3px;width:fit-content;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:7px;border:none;background:none;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500;transition:all .15s}
.tab.act{background:var(--bg2);color:var(--text);font-weight:700}
.fr{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.fr select,.fr input[type=month],.fr input[type=date]{background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--text);min-width:120px}
.fr select option{background:#1e2f4a}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.55)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mt{font-size:15px;font-weight:700}
.mc{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.mb{padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.gf{grid-column:span 2}
.gf3{grid-column:span 3}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
input:not([type=radio]):not([type=checkbox]),select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:rgba(255,255,255,0.06);color:var(--text);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select option{background:#1e2f4a}
textarea{resize:vertical;min-height:64px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.ar{display:flex;gap:5px;align-items:center}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px}
.lc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:34px;width:100%;max-width:390px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
@media(max-width:420px){.lc{padding:24px}}
.ll{text-align:center;margin-bottom:24px}
.li{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;font-weight:700;margin:0 auto 12px}
.em{background:var(--red-bg);color:var(--red-t);border:1px solid rgba(220,38,38,.3);border-radius:7px;padding:9px 12px;font-size:13px}
.dre-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:9px 14px;background:rgba(255,255,255,.04);color:var(--text3);border-bottom:1px solid var(--border)}
.dre-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.dre-row.tot{font-weight:700;font-size:14px}
.opc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;cursor:pointer;transition:all .2s}
.opc:hover{border-color:var(--blue);background:var(--bg3)}
.opc h3{font-size:14px;font-weight:700;margin-bottom:4px}
.opc p{font-size:12px;color:var(--text3)}
.calc-box{background:rgba(26,86,219,.1);border:1px solid rgba(26,86,219,.25);border-radius:8px;padding:12px 16px;margin-top:8px}
.calc-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.calc-row:last-child{margin-bottom:0;font-weight:700;font-size:15px;color:var(--green-t)}
.mod-row{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:background .15s}
.mod-row:hover{background:rgba(255,255,255,.05)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
@media(max-width:768px){
  .sb{width:56px}.main{margin-left:56px}
  .sb-logo-txt,.sb-logo-sub,.sb-filial,.ni span:not(.ni-ic),.sb-usr-row div,.sb-out{display:none}
  .sg{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.gf{grid-column:span 1}
  .page{padding:14px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const K='gf_v3';
const ld=()=>{try{return JSON.parse(localStorage.getItem(K)||'{}')}catch{return{}}};
const sv=d=>localStorage.setItem(K,JSON.stringify(d));
const gfd=(db,fid,col)=>(db[fid]&&db[fid][col])||[];
const sfd=(db,fid,col,d)=>{if(!db[fid])db[fid]={};db[fid][col]=d};
const uid=()=>'_'+Math.random().toString(36).slice(2)+Date.now().toString(36);

/* Masks */
const maskCPF=v=>{v=v.replace(/\D/g,'').slice(0,11);if(v.length<=3)return v;if(v.length<=6)return v.replace(/(\d{3})(\d+)/,'$1.$2');if(v.length<=9)return v.replace(/(\d{3})(\d{3})(\d+)/,'$1.$2.$3');return v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/,'$1.$2.$3-$4')};
const maskCNPJ=v=>{v=v.replace(/\D/g,'').slice(0,14);if(v.length<=2)return v;if(v.length<=5)return v.replace(/(\d{2})(\d+)/,'$1.$2');if(v.length<=8)return v.replace(/(\d{2})(\d{3})(\d+)/,'$1.$2.$3');if(v.length<=12)return v.replace(/(\d{2})(\d{3})(\d{3})(\d+)/,'$1.$2.$3/$4');return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d+)/,'$1.$2.$3/$4-$5')};
const maskCelular=v=>{v=v.replace(/\D/g,'').slice(0,11);if(!v.length)return'';if(v.length<=2)return`(${v}`;if(v.length<=7)return v.replace(/(\d{2})(\d+)/,'($1) $2');return v.replace(/(\d{2})(\d{5})(\d+)/,'($1) $2-$3')};
const maskCPFouCNPJ=v=>{const d=v.replace(/\D/g,'');return d.length<=11?maskCPF(v):maskCNPJ(v)};
function bindMasks(){
  document.querySelectorAll('.mask-cpf').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{const s=e.target.selectionStart,prev=e.target.value.length,val=maskCPF(e.target.value);e.target.value=val;})});
  document.querySelectorAll('.mask-cnpj').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{e.target.value=maskCNPJ(e.target.value);})});
  document.querySelectorAll('.mask-cpfcnpj').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{e.target.value=maskCPFouCNPJ(e.target.value);})});
  document.querySelectorAll('.mask-cel').forEach(el=>{if(el._mb)return;el._mb=true;el.addEventListener('input',e=>{e.target.value=maskCelular(e.target.value);})});
}
const fmt=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>{if(!d||d==='—')return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d};
const td=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gfil=()=>{const db=ld();return db['__fil__']||[{id:'f1',nome:'Filial Principal'},{id:'f2',nome:'Filial 2'}]};
const sfil=f=>{const db=ld();db['__fil__']=f;sv(db)};
const gus=()=>{const db=ld();return db['__usr__']||[{id:'u1',nome:'Administrador',email:'admin@empresa.com',senha:'123456',perfil:'admin',filiais:[]}]};
const sus=u=>{const db=ld();db['__usr__']=u;sv(db)};
const gpc=()=>{const db=ld();return db['__pc__']||[]};
const spc=p=>{const db=ld();db['__pc__']=p;sv(db)};
const gapp=()=>{const db=ld();return db['__app__']||{nome:'Gestão Financeira',sub:'Multi-Filial'}};
const sapp=a=>{const db=ld();db['__app__']=a;sv(db);document.title=a.nome||'Gestão Financeira'};

const MODS=[
  {id:'dashboard',label:'Dashboard',grp:'fin'},
  {id:'dre',label:'DRE',grp:'fin'},
  {id:'despesas',label:'Despesas',grp:'fin'},
  {id:'contas-pagar',label:'Contas a Pagar',grp:'fin'},
  {id:'contas-receber',label:'Contas a Receber',grp:'fin'},
  {id:'vendas',label:'Vendas',grp:'fin'},
  {id:'escala',label:'Escala de Trabalho',grp:'fin'},
  {id:'agendas-pousada',label:'Pousadas',grp:'age'},
  {id:'agendas-voo',label:'Balão',grp:'age'},
  {id:'cadastros',label:'Cadastros',grp:'ger'},
  {id:'estoque',label:'Estoque',grp:'ger'},
  {id:'op-docs',label:'Documentos',grp:'ger'},
  {id:'configuracoes',label:'Configurações',grp:'adm'},
];
const MENU=[
  {id:'dashboard',label:'Dashboard',ic:'📊'},
  {id:'dre',label:'DRE',ic:'📈'},
  {id:'despesas',label:'Despesas',ic:'💸'},
  {id:'contas-pagar',label:'Contas a Pagar',ic:'📤'},
  {id:'contas-receber',label:'Contas a Receber',ic:'📥'},
  {id:'vendas',label:'Vendas',ic:'🏷️'},
  {id:'escala',label:'Escala de Trabalho',ic:'🗓️'},
  null,
  {id:'agendas',label:'Agendas',ic:'📅'},
  null,
  {id:'cadastros',label:'Cadastros',ic:'👥'},
  {id:'estoque',label:'Estoque',ic:'📦'},
  {id:'operacional',label:'Documentos',ic:'📁'},
  null,
  {id:'configuracoes',label:'Configurações',ic:'🔧'},
];

const gfm=fil=>{if(!fil||!fil.modulos||!fil.modulos.length)return MODS.map(m=>m.id);return fil.modulos};

let S={ok:false,user:null,page:'dashboard',fid:null,modal:null,eid:null,tab:'',form:{},fs:'',fc:'',fm:'',fb:'',op:''};

/* ── HELPERS ── */
const bdg=(s)=>{const m={Pago:'g',Recebido:'g',Pendente:'a',Vencido:'r',Cancelado:'gr',Emitida:'b',Paga:'g',Ativo:'g',Inativo:'gr',Afastado:'a',Aprovado:'g',Rascunho:'gr','Check-out':'b',Confirmada:'g',Agendado:'b','Reserva efetuada':'a',Realizado:'g',Concluído:'g'};const cl={g:'bg',a:'ba',r:'br',b:'bb',gr:'bgr'};return`<span class="bdg ${cl[m[s]||'gr']||'bgr'}">${esc(s||'—')}</span>`};
const fi=(id,lbl,tp='text',vl='',ex='')=>`<div class="f"><label>${lbl}</label><input id="${id}" type="${tp}" value="${esc(vl)}" ${ex}/></div>`;
const fsel=(id,lbl,opts,vl='')=>`<div class="f"><label>${lbl}</label><select id="${id}">${opts.map(([v,l])=>`<option value="${v}"${v===vl?' selected':''}>${esc(l)}</option>`).join('')}</select></div>`;
const gv=id=>{const e=document.getElementById(id);return e?e.value:''};
const by=id=>document.getElementById(id);
const on=(s,e,f)=>document.querySelectorAll(s).forEach(el=>el.addEventListener(e,f));

/* ── RENDER MAIN ── */
function render(){
  const root=by('root');
  if(!S.ok){root.innerHTML=renderLogin();bindLogin();return}
  const fils=gfil();
  if(!S.fid)S.fid=fils[0]?.id;
  const fil=fils.find(f=>f.id===S.fid)||fils[0];
  const hab=gfm(fil);
  // Permissões do usuário logado (admin = tudo; usuario = verifica S.user.modulos)
  const isAdmin=S.user?.perfil==='admin';
  const userMods=isAdmin?MODS.map(m=>m.id):(S.user?.modulos||MODS.map(m=>m.id));
  // Um módulo aparece se: habilitado na filial E liberado para o usuário
  const canSee=id=>hab.includes(id)&&userMods.includes(id);
  const canSeeConfig=isAdmin||userMods.includes('configuracoes');
  const opH=canSee('op-docs');
  const ageH=['agendas-pousada','agendas-voo'].some(id=>canSee(id));
  const ni=(m)=>`<button class="ni${S.page===m.id?' act':''}" data-pg="${m.id}"><span class="ni-ic">${m.ic}</span><span>${m.label}</span></button>`;
  const nav=MENU.map(m=>{
    if(!m)return`<div class="sep"></div>`;
    if(m.id==='configuracoes')return canSeeConfig?ni(m):'';
    if(m.id==='operacional')return opH?ni(m):'';
    if(m.id==='agendas')return ageH?ni(m):'';
    if(!canSee(m.id))return'';
    return ni(m);
  }).join('');
  const fopts=fils.map(f=>`<option value="${f.id}"${f.id===S.fid?' selected':''}>${esc(f.nome)}</option>`).join('');
  const app=gapp();
  const logoIc=esc((app.nome||'GF').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'GF');
  root.innerHTML=`
  <div class="app">
    <div class="sb">
      <div class="sb-logo"><div class="sb-logo-icon">${logoIc}</div><div><div class="sb-logo-txt">${esc(app.nome||'Gestão Financeira')}</div><div class="sb-logo-sub">${esc(app.sub||'Multi-Filial')}</div></div></div>
      <div class="sb-filial"><div class="sb-filial-lbl">Filial Ativa</div><select class="sb-sel" id="fil-sel">${fopts}</select></div>
      <nav>${nav}</nav>
      <div class="sb-user">
        <div class="sb-usr-row"><div class="av">${(S.user?.nome||'A')[0].toUpperCase()}</div><div><div style="font-size:12px;font-weight:700">${esc(S.user?.nome||'Admin')}</div><div style="font-size:11px;color:var(--text3)">${esc(S.user?.perfil||'admin')}</div></div></div>
        <button class="sb-out" id="btn-out">⏻ Sair</button>
      </div>
    </div>
    <div class="main">${renderPage(fil)}</div>
  </div>
  ${S.modal?renderModal():''}`;
  bindAll();
  bindMasks();
}

/* ── LOGIN ── */
function renderLogin(){
  const app=gapp();
  const ic=esc((app.nome||'GF').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'GF');
  return`<div class="lw"><div class="lc">
  <div class="ll">
    <div class="li">${ic}</div>
    <div style="font-size:19px;font-weight:700">${esc(app.nome||'Gestão Financeira')}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(app.sub||'Multi-Filial')}</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px">
    <div class="f">
      <label>Email</label>
      <input id="l-em" type="text" inputmode="email" autocomplete="username"
        placeholder="seu@email.com"
        autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false"
        style="font-size:16px"/>
    </div>
    <div class="f">
      <label>Senha</label>
      <div style="position:relative">
        <input id="l-pw" type="password" autocomplete="current-password"
          placeholder="••••••••" autocorrect="off" autocapitalize="none" spellcheck="false"
          style="font-size:16px;width:100%;padding-right:44px"/>
        <button type="button" id="btn-show-pw"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px">
          👁
        </button>
      </div>
    </div>
    <div id="l-err" style="display:none" class="em"></div>

      <strong style="color:var(--text2)">Acesso padrão inicial:</strong><br>
      Email: <strong style="color:var(--blue-t);user-select:all">admin@empresa.com</strong><br>
      Senha: <strong style="color:var(--blue-t);user-select:all">123456</strong><br>

function bindLogin(){
  // Mostrar/ocultar senha
  by('btn-show-pw')?.addEventListener('click',()=>{
    const pw=by('l-pw');if(!pw)return;
    pw.type=pw.type==='password'?'text':'password';
    by('btn-show-pw').textContent=pw.type==='password'?'👁':'🙈';
  });
  const go=()=>{
    // Remove TODOS os tipos de espaço e caracteres invisíveis
    const em=(by('l-em')?.value||'').replace(/\s/g,'').toLowerCase();
    const pw=(by('l-pw')?.value||'').replace(/\s+$/,''); // só trim direita na senha
    const errEl=by('l-err');
    if(!em||!pw){
      if(errEl){errEl.style.display='block';errEl.textContent='Preencha email e senha.';}
      return;
    }
    if(errEl)errEl.style.display='none';
    const users=gus();
    const u=users.find(x=>{
      const xem=(x.email||'').replace(/\s/g,'').toLowerCase();
      const xpw=(x.senha||'').replace(/\s+$/,'');
      return xem===em&&xpw===pw;
    });
    if(u){
      S.ok=true;S.user=u;
      if(errEl)errEl.style.display='none';
      render();
    } else {
      // Debug: mostra qual email foi digitado para ajudar o usuário
      if(errEl){
        errEl.style.display='block';
        errEl.innerHTML='Email ou senha incorretos.<br><span style="font-size:10px;opacity:.7">Tentativa: '+em+'</span>';
      }
    }
  };
  by('btn-login')?.addEventListener('click',go);
  by('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')go()});
  by('l-em')?.addEventListener('keydown',e=>{if(e.key==='Enter')by('l-pw')?.focus()});
}

function renderPage(fil){
  const db=ld(),fid=fil.id;

  ${prods.map(i=>`<tr><td>${esc(i.produto)}</td><td>${esc(i.categoria||'—')}</td><td style="font-weight:700;color:var(--blue-t)">${i.quantidade||0}</td><td>${i.valorCusto?fmt(i.valorCusto):'—'}</td><td>${i.valorVenda?fmt(i.valorVenda):'—'}</td><td>${fmtD(i.dataUltimaContagem)}</td>
  <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="prod">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="prod">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`
  :tab==='ent'?ents.length===0?`<div class="empty">Nenhuma entrada.</div>`:`
  <table><thead><tr><th>Produto</th><th>Qtd</th><th>Data</th><th>Responsável</th><th>Fornecedor/Origem</th><th>Status</th><th></th></tr></thead><tbody>
  ${ents.map(i=>`<tr><td>${esc(i.prodNome||'—')}</td><td>${i.quantidade}</td><td>${fmtD(i.data)}</td><td>${esc(i.responsavel||'—')}</td><td>${i.pedidoDesc?`<span class="bdg bgr">Pedido: ${esc(i.pedidoDesc)}</span>`:esc(i.fornecedor||'—')}</td><td>${bdg(i.status||'Pendente')}</td>
  <td><div class="ar">${i.status!=='Aprovado'?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="ent">✓ Confirmar</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="ent">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="ent">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`
  :tab==='pedidos'?(()=>{const pedidos=gfd(db,fid,'pedidos');return pedidos.length===0?`<div class="empty">Nenhum pedido de compra.</div>`:`
  <table><thead><tr><th>Fornecedor</th><th>Data</th><th>Status</th><th>Itens</th><th></th></tr></thead><tbody>
  ${pedidos.map(i=>`<tr><td>${esc(i.fornecedor||i.descricao||'—')}</td><td>${fmtD(i.data)}</td><td>${bdg(i.status)}</td><td>${(i.itens||[]).length}</td>
  <td><div class="ar">${(i.status==='Pendente'||i.status==='Rascunho')?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="pedidos" title="Aprovar pedido — cria entradas pendentes">✓ Aprovar</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="pedidos">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="pedidos">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`;})()
  :tab==='said'?(()=>{
    const saids=gfd(db,fid,'said');
    // Verifica divergências: saldo produto - saídas vs última contagem
    const alertas=[];
    prods.forEach(p=>{
      const totalSaid=saids.filter(s=>s.prodId===p.id).reduce((a,s)=>a+Number(s.quantidade||0),0);
      const saldoCalc=Number(p.quantidade||0)-totalSaid;
      const ultCont=conts.filter(c=>c.prodId===p.id&&c.status==='Aprovado').sort((a,b)=>b.data>a.data?1:-1)[0];
      if(ultCont&&Math.abs(saldoCalc-Number(ultCont.quantidadeContada||0))>0){
        alertas.push({prod:p.produto,saldoCalc,contagem:Number(ultCont.quantidadeContada),diff:saldoCalc-Number(ultCont.quantidadeContada)});
      }
    });
    return(alertas.length>0?`<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:8px">⚠ DIVERGÊNCIA DE ESTOQUE DETECTADA</div>
      ${alertas.map(a=>`<div style="font-size:12px;color:var(--text2);margin-bottom:4px">
        <strong>${esc(a.prod)}</strong>: Saldo calculado <strong style="color:var(--amber-t)">${a.saldoCalc}</strong> × Última contagem <strong style="color:var(--blue-t)">${a.contagem}</strong>
        — Diferença: <strong style="color:#f87171">${a.diff>0?'+':''}${a.diff}</strong>
        <button class="btn btn-sm" style="margin-left:8px" data-ajuste="${esc(a.prod)}">Ajustar manualmente</button>
      </div>`).join('')}
    </div>`:'')
    +(saids.length===0?`<div class="empty">Nenhuma saída registrada.</div>`:`
    <table><thead><tr><th>Produto</th><th>Qtd Saída</th><th>Data</th><th>Responsável</th><th>Motivo</th><th>Obs</th><th></th></tr></thead><tbody>
    ${saids.map(i=>`<tr>
      <td>${esc(i.prodNome||'—')}</td>
      <td style="color:#f87171;font-weight:700">-${i.quantidade}</td>
      <td>${fmtD(i.data)}</td>
      <td>${esc(i.responsavel||'—')}</td>
      <td>${esc(i.motivo||'—')}</td>
      <td>${esc(i.observacoes||'—')}</td>
      <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="said">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="said">✕</button></div></td>
    </tr>`).join('')}</tbody></table>`);
  })()
  :conts.length===0?`<div class="empty">Nenhuma contagem.</div>`:`
  <table><thead><tr><th>Produto</th><th>Qtd Contada</th><th>Data</th><th>Responsável</th><th>Status</th><th></th></tr></thead><tbody>
  ${conts.map(i=>`<tr><td>${esc(i.prodNome||'—')}</td><td>${i.quantidadeContada}</td><td>${fmtD(i.data)}</td><td>${esc(i.responsavel||'—')}</td><td>${bdg(i.status||'Pendente')}</td>
  <td><div class="ar">${i.status!=='Aprovado'?`<button class="btn btn-sm btn-s" data-ap="${i.id}" data-col="cont">✓</button>`:''}<button class="btn btn-sm" data-ed="${i.id}" data-col="cont">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="cont">✕</button></div></td>
  </tr>`).join('')}</tbody></table>`}
  </div></div>`;
}

    <td><div class="ar"><button class="btn btn-sm" data-ed="${i.id}" data-col="pousada">✏</button><button class="btn btn-sm btn-d" data-dl="${i.id}" data-col="pousada">✕</button></div></td>

  <td><div class="ar"><button class="btn btn-sm" data-edp="${p.id}">✏</button><button class="btn btn-sm btn-d" data-dlp="${p.id}">✕</button></div></td></tr>`).join('');

    <button class="tab${S.tab==='ap'?' act':''}" data-tab="ap">Aparência</button>

function renderModal(){
  const {modal,eid,form}=S;

  /* ESCALA DE TRABALHO */

    // Calcula próxima segunda-feira a partir de hoje para exibir no vencimento
    const hoje=new Date();
    const dow=hoje.getDay();
    const daysToMon=dow===1?7:(8-dow)%7||7;
    const proxSeg=new Date(hoje);proxSeg.setDate(hoje.getDate()+daysToMon);
    const proxSegStr=proxSeg.toISOString().slice(0,10);
    body=`<div class="g2">
      <div class="f"><label>Selecionar Colaborador cadastrado</label>
        <select id="f-colab-id">
          <option value="">— Preencher manualmente —</option>
          ${colabs.map(c=>`<option value="${c.id}"
            data-nome="${esc(c.nome)}"
            data-funcao="${esc(c.cargo||c.funcao||'')}"
            data-valor="${esc(c.salario||c.valorDiaria||'')}"
            ${form.colaboradorId===c.id?' selected':''}>${esc(c.nome)}</option>`).join('')}
        </select>
      </div>
      ${fi('f-nome','Nome *','text',form.nome||'','required placeholder="Nome do colaborador"')}
      ${fi('f-funcao','Função','text',form.funcao||'','placeholder="Ex: Piloto, Auxiliar..."')}
      ${fi('f-data','Data de Trabalho *','date',form.dataTrabalho||td())}
      ${fi('f-valor','Valor (R$) *','number',form.valor||'','min="0" step="0.01" placeholder="0,00"')}
      <div class="f"><label>Vencimento CP <span style="font-size:10px;color:var(--blue-t)">(próxima segunda-feira)</span></label>
        <div style="padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;font-weight:700;color:var(--blue-t)">${fmtD(form.vencimentoCP||proxSegStr)}</div>

      </div>
      <div id="usr-mods-box">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;margin-top:4px;border-bottom:1px solid var(--border);padding-bottom:6px">

          <span style="font-weight:400;text-transform:none;font-size:10px;color:var(--text3);margin-left:8px">Selecione os módulos que este usuário pode acessar</span>

        <div id="usr-admin-note" style="${form.perfil==='admin'?'':'display:none'};background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.25);border-radius:7px;padding:8px 12px;font-size:11px;color:var(--green-t);margin-bottom:10px">
          ✓ Perfil Admin tem acesso total a todos os módulos por padrão. Você pode restringir abaixo se necessário.

        <div style="display:flex;gap:8px;margin-bottom:10px">

          const userMods=form.modulos||(form.perfil==='admin'?MODS.map(x=>x.id):MODS.filter(x=>x.grp!=='adm').map(x=>x.id));

            return`<div style="margin-bottom:14px">

  /* PLANO DE CONTAS */
  else if(modal==='plano'){
    title=(eid?'Editar':'Novo')+' Plano de Contas';
    const TIPOS=[['Despesa','Despesa'],['Receita','Receita'],['Ativo','Ativo'],['Passivo','Passivo']];
    body=`<div class="g2">

        <div class="fa"><button class="btn" id="modal-cancel">Cancelar</button><button class="btn btn-p" id="modal-save">💾 Salvar</button></div>

/* ═══════════════════════════════════════════════
   COLLECT FORM
═══════════════════════════════════════════════ */
function collectForm(){
  const gr=n=>{const e=document.querySelector(`input[name="${n}"]:checked`);return e?e.value:''};
  const m=S.modal,f=S.form;
  const pc=gpc();
  if(m==='cp'){
    const pcId=gv('f-pc');
    const pcNome=pcId?(pc.find(p=>p.id===pcId)?.nome||''):'';
    return{nome:gv('f-nome'),categoria:gv('f-modal-cat'),planoContaId:pcId,planoConta:pcNome,valor:gv('f-valor'),referencia:gv('f-ref2'),vencimento:gv('f-venc'),dataPagamento:gv('f-pgto'),parcelamento:gv('f-parc'),status:gv('f-modal-status')};
  }
  if(m==='cr'){const vl=Number(gv('f-valor')||0),en=Number(gv('f-entrada')||0);return{nome:gv('f-nome'),valor:vl,entrada:en,saldo:Math.max(0,vl-en),descricao:gv('f-desc'),vencimento:gv('f-venc'),dataRecebimento:gv('f-recv'),formaPagamento:gv('f-forma'),status:gv('f-modal-status')}}
  if(m==='vendas')return{nfe:gv('f-nfe'),dataEmissao:gv('f-data'),clienteEvento:gv('f-cliente'),cnpjCpf:gv('f-doc'),valor:gv('f-valor'),formaPagamento:gv('f-forma'),status:gv('f-modal-status'),observacoes:gv('f-obs')};
  if(m==='forn'||m==='prest')return{nome:gv('f-nome'),tipo:gv('f-tipo'),tipoCpfCnpj:gr('doctp')||'CNPJ',cpfCnpj:gv('f-doc'),categoria:gv('f-modal-cat'),dadosPagamento:gv('f-pix'),email:gv('f-email'),telefone:gv('f-tel')};
  if(m==='colab')return{nome:gv('f-nome'),cpf:gv('f-cpf'),cargo:gv('f-cargo'),departamento:gv('f-depto'),salario:gv('f-sal'),dadosPagamento:gv('f-pix'),status:gv('f-modal-status')};
  if(m==='atrac')return{nome:gv('f-nome'),cpfCnpj:gv('f-doc'),categoria:gv('f-modal-cat'),dadosPagamento:gv('f-pix'),celular:gv('f-cel')};
  if(m==='hosp')return{nome:gv('f-nome'),cpf:gv('f-cpf'),celular:gv('f-cel'),email:gv('f-email'),observacoes:gv('f-obs')};
  if(m==='prod')return{produto:gv('f-prod'),categoria:gv('f-modal-cat'),quantidade:Number(gv('f-qtd')||0),valorCusto:gv('f-custo'),valorVenda:gv('f-venda'),dataUltimaContagem:gv('f-data')};
  if(m==='ent'){const ps=by('f-prod'),fs=by('f-forn');return{prodId:ps?.value||'',prodNome:ps?.options[ps.selectedIndex]?.text||'',quantidade:Number(gv('f-qtd')||0),data:gv('f-data'),responsavel:gv('f-resp'),fornId:fs?.value||'',fornecedor:fs?.options[fs.selectedIndex]?.text||'',observacoes:gv('f-obs'),status:'Pendente'}}
  if(m==='cont'){const ps=by('f-prod');return{prodId:ps?.value||'',prodNome:ps?.options[ps.selectedIndex]?.text||'',quantidadeContada:Number(gv('f-qtd')||0),data:gv('f-data'),responsavel:gv('f-resp'),observacoes:gv('f-obs'),status:'Pendente'}}
  if(m==='said'){
    const ps=by('f-prod');
    const prodId=ps?.value||'';
    const prodNome=ps&&ps.selectedIndex>0?ps.options[ps.selectedIndex].text.split(' (Saldo:')[0]:'';
    const saldo=Number(ps?.options[ps?.selectedIndex]?.dataset?.saldo||0);
    const qtd=Number(gv('f-qtd')||0);
    const novoSaldo=saldo-qtd;
    return{prodId,prodNome,quantidade:qtd,saldoAnterior:saldo,novoSaldo,data:gv('f-data'),responsavel:gv('f-resp'),motivo:gv('f-motivo'),observacoes:gv('f-obs')};
  }
  if(m==='escala'){
    const colSel=by('f-colab-id');
    const colaboradorId=colSel?.value||'';
    const colaboradorNome=colSel&&colSel.selectedIndex>0?(colSel.options[colSel.selectedIndex].dataset.nome||colSel.options[colSel.selectedIndex].text):'';
    const dataT=gv('f-data')||td();
    const dt=new Date(dataT+'T12:00:00');
    const dow=dt.getDay();
    const daysToMon=dow===1?7:(8-dow)%7||7;
    dt.setDate(dt.getDate()+daysToMon);
    const venc=dt.toISOString().slice(0,10);
    return{nome:gv('f-nome'),colaboradorId,colaboradorNome,funcao:gv('f-funcao'),dataTrabalho:dataT,valor:Number(gv('f-valor')||0),vencimentoCP:venc,status:gv('f-modal-status'),observacoes:gv('f-obs')};
  }
  if(m==='pousada'){
    const ci=gv('f-ci'),co=gv('f-co'),dias=ci&&co?Math.max(0,Math.round((new Date(co)-new Date(ci))/86400000)):0;
    const vDiaria=Number(gv('f-diaria')||0);
    const vR=Number(gv('f-vr')||0),vE=Number(gv('f-ve')||0),vT=Math.max(0,vR-vE);
    const vendSel=by('f-vend-id');
    const vendedorId=vendSel?.value||'';
    const vendedorNome=vendSel&&vendSel.selectedIndex>0?vendSel.options[vendSel.selectedIndex].text:'';
    const pct=Number(gv('f-pct-com')||0);
    const vCom=parseFloat((vR*pct/100).toFixed(2));
    // Coleta hóspedes adicionais
    const hospsAdic=[];
    document.querySelectorAll('#hosp-lista>div').forEach((row,i)=>{
      const nome=row.querySelector('.ha-nome')?.value||'';
      const cpf=row.querySelector('.ha-cpf')?.value||'';
      const cel=row.querySelector('.ha-cel')?.value||'';
      const hospId=row.querySelector('.ha-sel')?.value||'';
      if(nome||hospId)hospsAdic.push({nome,cpf,celular:cel,hospId});
    });
    return{nomeHospede:gv('f-hpnome'),cpf:gv('f-cpf'),celular:gv('f-cel'),acomodacao:gv('f-acom'),vendedorId,vendedorNome,pctComissao:pct,valorComissao:vCom,checkIn:ci,checkInHora:gv('f-cih'),checkOut:co,checkOutHora:gv('f-coh'),diasHospedagem:dias,qtdHospedes:Number(gv('f-nhsp')||1),valorDiaria:vDiaria,plataforma:gv('f-plat'),formaPagamento:gv('f-forma'),valorReserva:vR,valorEntrada:vE,valorTotal:vT,status:gv('f-modal-status'),cafeManha:gv('f-cafe'),observacoes:gv('f-obs'),hospedes:hospsAdic};
  }
  if(m==='voo'){
    syncPass();
    const vPorPass=Number(gv('f-vppass')||0);
    const vV=Number(gv('f-vv')||0),vRes=Number(gv('f-vres')||0),vT=Math.max(0,vV-vRes);
    const vendSel=by('f-vend-id');
    const vendedorId=vendSel?.value||'';
    const vendedorNome=vendSel&&vendSel.selectedIndex>0?vendSel.options[vendSel.selectedIndex].text:'';
    const pct=Number(gv('f-pct-com')||0);
    const vCom=parseFloat((vV*pct/100).toFixed(2));
    return{piloto:gv('f-piloto'),prefixo:gv('f-pref'),vendedorId,vendedorNome,pctComissao:pct,valorComissao:vCom,dataVoo:gv('f-data'),horaVoo:gv('f-hora'),decolagem:gv('f-dec'),pouso:gv('f-pou'),plataforma:gv('f-plat'),status:gv('f-modal-status'),valorPorPassageiro:vPorPass,valorVoo:vV,valorReserva:vRes,valorTotal:vT,passageiros:S.form.passageiros||[],observacoes:gv('f-obs')};
  }
  if(m==='pedidos'){
    const fornSel=by('f-forn-id');
    const fornecedorId=fornSel?.value||'';
    const fornecedor=gv('f-forn-nome')||'';
    return{fornecedorId,fornecedor,data:gv('f-data'),status:gv('f-modal-status'),itens:S.form.itens||[],observacoes:gv('f-obs')};
  }
  if(m==='filial'){const chks=document.querySelectorAll('.mod-chk');return{nome:gv('f-nome'),modulos:Array.from(chks).filter(c=>c.checked).map(c=>c.value)}}
  if(m==='usuario'){
    const filChks=document.querySelectorAll('.fil-chk');
    const modChks=document.querySelectorAll('.mod-usr-chk');
    const emailRaw=gv('f-email')||'';
    const senhaRaw=gv('f-senha')||'';
    // Normaliza email: remove todos os espaços e converte para minúsculo
    const email=emailRaw.replace(/\s/g,'').toLowerCase();
    // Senha: remove espaços no final apenas
    const senha=senhaRaw.replace(/\s+$/,'');
    return{
      nome:gv('f-nome'),
      email,
      senha, // pode ser '' em edição (tratado no save)
      perfil:gv('f-perfil'),
      filiais:Array.from(filChks).filter(c=>c.checked).map(c=>c.value),
      modulos:Array.from(modChks).filter(c=>c.checked).map(c=>c.value),
    };
  }
  if(m==='plano')return{codigo:gv('f-cod'),tipo:gv('f-tipo'),nome:gv('f-nome'),descricao:gv('f-desc')};
  return{};
}

   SAVE / DELETE

function saveRec(col,data){
  const db=ld(),fid=S.fid;
  let l=gfd(db,fid,col);
  if(S.eid)l=l.map(i=>i.id===S.eid?{...i,...data}:i);
  else l=[...l,{id:uid(),...data}];
  sfd(db,fid,col,l);sv(db);
}
function delRec(col,id){const db=ld(),fid=S.fid;sfd(db,fid,col,gfd(db,fid,col).filter(i=>i.id!==id));sv(db)}

function aprovarEnt(id){
  const db=ld(),fid=S.fid;
  const ents=gfd(db,fid,'ent'),e=ents.find(x=>x.id===id);if(!e)return;
  const ps=gfd(db,fid,'prod');
  // Tenta por prodId, fallback por nome
  let pi=e.prodId?ps.findIndex(p=>p.id===e.prodId):-1;
  if(pi<0&&e.prodNome)pi=ps.findIndex(p=>p.produto?.toLowerCase()===e.prodNome?.toLowerCase());
  if(pi>=0){
    ps[pi].quantidade=Number(ps[pi].quantidade||0)+Number(e.quantidade||0);
    ps[pi].dataUltimaContagem=e.data;
  }
  const ei=ents.findIndex(x=>x.id===id);
  ents[ei]={...ents[ei],status:'Aprovado',dataAprovacao:td()};
  sfd(db,fid,'prod',ps);sfd(db,fid,'ent',ents);sv(db);
}
function aprovarCont(id){
  const db=ld(),fid=S.fid;
  const cs=gfd(db,fid,'cont'),c=cs.find(x=>x.id===id);if(!c)return;
  const ps=gfd(db,fid,'prod'),pi=ps.findIndex(p=>p.id===c.prodId);
  if(pi>=0){ps[pi].quantidade=Number(c.quantidadeContada||0);ps[pi].dataUltimaContagem=c.data}
  const ci=cs.findIndex(x=>x.id===id);cs[ci]={...cs[ci],status:'Aprovado',dataAprovacao:td()};
  sfd(db,fid,'prod',ps);sfd(db,fid,'cont',cs);sv(db);
}
function aprovarPed(id){
  const db=ld(),fid=S.fid;
  const ps=gfd(db,fid,'pedidos'),pi=ps.findIndex(p=>p.id===id);if(pi<0)return;
  const ped=ps[pi];ps[pi]={...ped,status:'Aprovado',dataAprovacao:td()};
  const prods=gfd(db,fid,'prod');
  const ents=gfd(db,fid,'ent');
  for(const it of(ped.itens||[])){
    // Tenta linkar ao produto cadastrado pelo nome
    const prodCad=prods.find(p=>p.produto?.toLowerCase()===it.nome?.toLowerCase());
    ents.push({
      id:uid(),
      prodId:prodCad?.id||'',
      prodNome:it.nome,
      quantidade:Number(it.qtd||0),
      data:td(),
      origem:'pedido',
      pedidoId:id,
      pedidoDesc:ped.fornecedor||ped.descricao||'',
      fornecedor:ped.fornecedor||ped.descricao||'',
      responsavel:'Pedido de Compra',
      status:'Pendente',
      observacoes:'Pedido: '+(ped.fornecedor||ped.descricao||''),
    });
  }
  sfd(db,fid,'pedidos',ps);sfd(db,fid,'ent',ents);sv(db);
}

/* ── Busca plano de contas de comissão (nome contendo "comiss") ── */
function pcComissao(){
  const pcs=gpc();
  return pcs.find(p=>p.nome?.toLowerCase().includes('comiss'))||null;
}

/* ── Lança CP de comissão garantindo categoria=Colaborador ── */
function lancarCpComissao(db,fid,vendedorId,vendedorNome,valorComissao,referencia,refId,origem){
  if(!vendedorId||!valorComissao||valorComissao<=0)return;
  // Verifica se já foi lançado para este refId+origem
  const cpAtual=gfd(db,fid,'cp');
  if(cpAtual.find(c=>c.origem===origem&&c.refId===refId))return;
  const pc=pcComissao();
  cpAtual.push({
    id:uid(),
    nome:vendedorNome,
    categoria:'Colaborador',           // sempre Colaborador
    referencia,
    valor:Number(valorComissao),
    vencimento:td(),
    status:'Pendente',
    parcelamento:'À vista',
    origem,
    refId,
    planoContaId:pc?.id||'',
    planoConta:pc?.nome||'Comissão de Vendas',
  });
  sfd(db,fid,'cp',cpAtual);
}

/* ── Pousada: salva e reage a mudanças de status ── */
function salvarPousada(data,eid){
  // Lê o DB uma única vez — todas as operações neste objeto, salva ao final
  const db=ld();
  const fid=S.fid;

  if(eid){
    const lista=gfd(db,fid,'pousada');
    const anterior=lista.find(i=>i.id===eid)||{};
    const statusAnterior=anterior.status||'';
    const statusNovo=data.status||'';
    const concluindo=statusNovo==='Concluído'&&statusAnterior!=='Concluído';

    // Atualiza registro da pousada
    sfd(db,fid,'pousada',lista.map(i=>i.id===eid?{...i,...data}:i));

    if(concluindo){
      // Marca CR vinculados como Recebido
      const cr=gfd(db,fid,'cr');
      sfd(db,fid,'cr',cr.map(r=>{
        const vinc=r.origem==='pousada'&&(r.refId===eid||r.nome?.includes(anterior.nomeHospede||'\x00'));
        return vinc?{...r,status:'Recebido',dataRecebimento:td()}:r;
      }));

      // Lança comissão no CP (categoria=Colaborador automático)
      lancarCpComissao(
        db,fid,
        data.vendedorId,
        data.vendedorNome||anterior.vendedorNome,
        data.valorComissao??anterior.valorComissao,
        `Comissão pousada — ${data.nomeHospede||anterior.nomeHospede} (${data.acomodacao||anterior.acomodacao})`,
        eid,
        'pousada_comissao'
      );
    }

  } else {
    // Novo registro
    const novoId=uid();
    const lista=gfd(db,fid,'pousada');
    lista.push({id:novoId,...data});
    sfd(db,fid,'pousada',lista);

    // Entrada → CR Recebido
    if(Number(data.valorEntrada)>0){
      const cr=gfd(db,fid,'cr');
      cr.push({id:uid(),nome:`Entrada — ${data.nomeHospede} (${data.acomodacao})`,
        descricao:'Entrada de reserva pousada',valor:Number(data.valorEntrada),
        entrada:0,saldo:0,status:'Recebido',vencimento:td(),
        origem:'pousada',refId:novoId,formaPagamento:data.formaPagamento});
      sfd(db,fid,'cr',cr);
    }
    // Saldo → CR Pendente
    if(Number(data.valorTotal)>0){
      const cr=gfd(db,fid,'cr');
      cr.push({id:uid(),nome:`Saldo — ${data.nomeHospede} (${data.acomodacao})`,
        descricao:'Saldo restante da reserva',valor:Number(data.valorTotal),
        entrada:0,saldo:Number(data.valorTotal),status:'Pendente',
        vencimento:data.checkOut||td(),origem:'pousada',refId:novoId,
        formaPagamento:data.formaPagamento});
      sfd(db,fid,'cr',cr);
    }
    // Comissão → CP Pendente (categoria=Colaborador automático)
    lancarCpComissao(
      db,fid,
      data.vendedorId,data.vendedorNome,data.valorComissao,
      `Comissão pousada — ${data.nomeHospede} (${data.acomodacao})`,
      novoId,'pousada_comissao'
    );
  }

  // Salva tudo de uma vez (garante isolamento de filial)
  sv(db);
}

/* ── Voo: salva e reage a mudanças de status ── */
function salvarVoo(data,eid){
  const db=ld();
  const fid=S.fid;
  const piloto=data.piloto||'';
  const dataVoo=data.dataVoo||td();
  const nPassageiros=(data.passageiros||[]).length;
  const prefixo=data.prefixo||'—';
  const valorVoo=Number(data.valorVoo||0);
  const valorRes=Number(data.valorReserva||0);
  const valorTot=Number(data.valorTotal||0);

  /* Gera termo PDF (base64) quando status = Agendado */
  const virouAgendado=(stAnt,stNovo)=>stNovo==='Agendado'&&stAnt!=='Agendado';
  const gerarEsalvarTermo=(lista,id,passageiros,dVoo)=>{
    if(!passageiros||!passageiros.length)return lista;
    const b64=gerarTermoBase64(passageiros,dVoo);
    if(!b64)return lista;
    return lista.map(i=>i.id===id?{...i,termoGerado:b64,termoDataGeracao:td()}:i);
  };

  if(eid){
    let lista=gfd(db,fid,'voo');
    const ant=lista.find(i=>i.id===eid)||{};
    const stAnt=ant.status||'';
    const stNovo=data.status||'';

    // Atualiza registro
    lista=lista.map(i=>i.id===eid?{...i,...data}:i);

    // ── Agendado → gera termo PDF e salva no registro
    if(virouAgendado(stAnt,stNovo)){
      const pass=data.passageiros||ant.passageiros||[];
      const dV=data.dataVoo||ant.dataVoo||dataVoo;
      lista=gerarEsalvarTermo(lista,eid,pass,dV);
    }

    sfd(db,fid,'voo',lista);

    // ── Reserva efetuada → lança valor da reserva como Recebido no CR
    const virouReserva=stNovo==='Reserva efetuada'&&stAnt!=='Reserva efetuada'&&stAnt!=='Realizado';
    if(virouReserva&&valorRes>0){
      const cr=gfd(db,fid,'cr');
      const jaExiste=cr.find(r=>r.origem==='voo_reserva'&&r.refId===eid);
      if(!jaExiste){
        cr.push({
          id:uid(),
          nome:`Reserva voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Entrada de reserva | Prefixo: ${ant.prefixo||prefixo}`,
          valor:valorRes,
          entrada:0,saldo:0,
          status:'Recebido',
          vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:eid,
        });
        sfd(db,fid,'cr',cr);
      }
    }

    // ── Realizado → lança saldo restante como Recebido no CR
    const virouRealizado=stNovo==='Realizado'&&stAnt!=='Realizado';
    if(virouRealizado){
      const vVoo=Number(data.valorVoo||ant.valorVoo||0);
      const vRe=Number(data.valorReserva||ant.valorReserva||0);
      const vSaldo=Math.max(0,vVoo-vRe);
      const cr=gfd(db,fid,'cr');

      // Se reserva ainda não foi lançada (veio direto para Realizado), lança tudo
      const temReserva=cr.find(r=>r.origem==='voo_reserva'&&r.refId===eid);
      if(!temReserva&&vRe>0){
        cr.push({
          id:uid(),
          nome:`Reserva voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Reserva | Prefixo: ${ant.prefixo||prefixo}`,
          valor:vRe,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:eid,
        });
      }

      // Lança saldo (valor total − reserva)
      const temSaldo=cr.find(r=>r.origem==='voo_saldo'&&r.refId===eid);
      if(!temSaldo&&vSaldo>0){
        cr.push({
          id:uid(),
          nome:`Saldo voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
          descricao:`Passageiros: ${(data.passageiros||ant.passageiros||[]).length} | Prefixo: ${ant.prefixo||prefixo}`,
          valor:vSaldo,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_saldo',refId:eid,
        });
      } else if(temSaldo){
        cr.forEach((r,i)=>{if(r.origem==='voo_saldo'&&r.refId===eid)cr[i]={...r,status:'Recebido',dataRecebimento:td()}});
      }

      sfd(db,fid,'cr',cr);

      // Comissão → CP
      lancarCpComissao(
        db,fid,
        data.vendedorId||ant.vendedorId,
        data.vendedorNome||ant.vendedorNome,
        data.valorComissao??ant.valorComissao,
        `Comissão voo — ${ant.piloto||piloto} (${fmtD(ant.dataVoo||dataVoo)})`,
        eid,'voo_comissao'
      );
    }

  } else {
    // Novo voo
    const novoId=uid();
    let lista=gfd(db,fid,'voo');
    lista.push({id:novoId,...data});

    // ── Agendado → gera termo PDF e salva no registro
    if(data.status==='Agendado'&&data.passageiros&&data.passageiros.length){
      lista=gerarEsalvarTermo(lista,novoId,data.passageiros,data.dataVoo);
    }

    sfd(db,fid,'voo',lista);

    // ── Reserva efetuada → lança valor da reserva no CR
    if(data.status==='Reserva efetuada'&&valorRes>0){
      const cr=gfd(db,fid,'cr');
      cr.push({
        id:uid(),
        nome:`Reserva voo — ${piloto} (${fmtD(dataVoo)})`,
        descricao:`Entrada de reserva | Prefixo: ${prefixo}`,
        valor:valorRes,entrada:0,saldo:0,
        status:'Recebido',vencimento:td(),dataRecebimento:td(),
        origem:'voo_reserva',refId:novoId,
      });
      sfd(db,fid,'cr',cr);
    }

    // ── Realizado direto → lança reserva + saldo no CR
    if(data.status==='Realizado'){
      const cr=gfd(db,fid,'cr');
      if(valorRes>0){
        cr.push({
          id:uid(),nome:`Reserva voo — ${piloto} (${fmtD(dataVoo)})`,
          descricao:`Reserva | Prefixo: ${prefixo}`,
          valor:valorRes,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_reserva',refId:novoId,
        });
      }
      const vSaldo=Math.max(0,valorVoo-valorRes);
      if(vSaldo>0){
        cr.push({
          id:uid(),nome:`Saldo voo — ${piloto} (${fmtD(dataVoo)})`,
          descricao:`Passageiros: ${nPassageiros} | Prefixo: ${prefixo}`,
          valor:vSaldo,entrada:0,saldo:0,
          status:'Recebido',vencimento:td(),dataRecebimento:td(),
          origem:'voo_saldo',refId:novoId,
        });
      }
      sfd(db,fid,'cr',cr);
    }

    // Comissão → CP
    lancarCpComissao(
      db,fid,
      data.vendedorId,data.vendedorNome,data.valorComissao,
      `Comissão voo — ${piloto} (${fmtD(dataVoo)})`,
      novoId,'voo_comissao'
    );
  }

  sv(db);
}

/* ── syncPass ── */
function syncPass(){
  if(S.modal!=='voo')return;
  const ns=document.querySelectorAll('.p-nome'),cs=document.querySelectorAll('.p-cpf'),ces=document.querySelectorAll('.p-cel'),ps=document.querySelectorAll('.p-peso'),hs=document.querySelectorAll('.p-hosp');
  if(!ns.length)return;
  S.form.passageiros=Array.from(ns).map((e,i)=>({nome:e.value,cpf:cs[i]?.value||'',celular:ces[i]?.value||'',peso:ps[i]?.value||'',hospId:hs[i]?.value||''}));
}

/* ── modalFor ── */
function mFor(){
  const p=S.page,t=S.tab||'forn';
  if(p==='cadastros')return t;
  if(p==='estoque')return S.tab||'prod';
  if(p==='agendas'){if(S.op==='pousada')return'pousada';if(S.op==='voo')return'voo';}
  if(p==='estoque'){const tabMap={'prod':'prod','ent':'ent','cont':'cont','said':'said','pedidos':'pedidos'};return tabMap[S.tab]||'prod';}
  const m={'contas-pagar':'cp','contas-receber':'cr',vendas:'vendas'};
  return m[p]||p;
}

    });

  /* ── Pousada: diária × dias = reserva; reserva − entrada = saldo ── */
  const recalcPousada=()=>{
    const diaria=Number(gv('f-diaria')||0);
    const dc=by('dias-calc');
    const dias=dc?Number(dc.textContent||0):0;
    if(diaria>0&&dias>0){
      const vr=parseFloat((diaria*dias).toFixed(2));
      const el=by('f-vr');if(el)el.value=vr;
      const sh=by('ps-vr-show');if(sh)sh.textContent=fmt(vr);
      const vE=Number(gv('f-ve')||0);
      const sc=by('vt-calc');if(sc)sc.textContent=fmt(Math.max(0,vr-vE));
      const ve2=by('ps-ve-show');if(ve2)ve2.textContent=fmt(vE);
      const pct=Number(gv('f-pct-com')||0);
      const com=by('vcom-ps');if(com)com.textContent=fmt(parseFloat((vr*pct/100).toFixed(2)));
      const base=by('com-base-ps');if(base)base.textContent=fmt(vr);
    }
  };
  const recalcSaldoPs=()=>{
    const vR=Number(gv('f-vr')||0),vE=Number(gv('f-ve')||0);
    const sc=by('vt-calc');if(sc)sc.textContent=fmt(Math.max(0,vR-vE));
    const sh=by('ps-vr-show');if(sh)sh.textContent=fmt(vR);
    const ve2=by('ps-ve-show');if(ve2)ve2.textContent=fmt(vE);
    const pct=Number(gv('f-pct-com')||0);
    const com=by('vcom-ps');if(com)com.textContent=fmt(parseFloat((vR*pct/100).toFixed(2)));
    const base=by('com-base-ps');if(base)base.textContent=fmt(vR);

  /* ── Voo: valor por passageiro × qtd passageiros = valor total voo ── */

    const vPorPass=Number(gv('f-vppass')||0);

  function refreshPassLista(){
    const db=ld(),fid=S.fid;
    const hosp=gfd(db,fid,'hosp');
    const lista=by('pass-lista');
    if(!lista)return;
    lista.innerHTML=(S.form.passageiros||[]).map((p,i)=>passRowHTML(p,i,hosp)).join('');
    // re-bind hosp selects
    // p-hosp change é tratado por event delegation global — sem necessidade de rebind
    lista.querySelectorAll('[data-rp]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        syncPass();
        const i=Number(e.currentTarget.dataset.rp);
        S.form.passageiros=S.form.passageiros.filter((_,idx)=>idx!==i);
        refreshPassLista();
        updatePassCount();
        recalcVooLocal();
      });
    });
    updatePassCount();
  }

  function updatePassCount(){
    const qtd=(S.form.passageiros||[]).length;
    const qc=by('qtd-pass-calc');if(qc)qc.textContent=qtd;
    const lbl=by('pass-count-lbl');if(lbl)lbl.textContent=`(${qtd})`;
  }

  function recalcVooLocal(){
    const vPorPass=Number(gv('f-vppass')||0);
    const qtd=Math.max((S.form.passageiros||[]).length,1);
    updatePassCount();
    if(vPorPass>0){
      const vv=parseFloat((vPorPass*qtd).toFixed(2));
      const el=by('f-vv');if(el)el.value=vv;
      const sh=by('voo-vv-show');if(sh)sh.textContent=fmt(vv);
      const vRes=Number(gv('f-vres')||0);
      const sc=by('vt-voo');if(sc)sc.textContent=fmt(Math.max(0,vv-vRes));
      const pct=Number(gv('f-pct-com')||0);
      const com=by('vcom-voo');if(com)com.textContent=fmt(parseFloat((vv*pct/100).toFixed(2)));
      const base=by('com-base-voo');if(base)base.textContent=fmt(vv);
    }
  }

  /* ── Event delegation: ha-sel (hóspede adicional pousada) ── */
  document.addEventListener('change',e=>{
    if(!e.target.classList.contains('ha-sel'))return;
    const idx=Number(e.target.dataset.idx),hospId=e.target.value;
    if(!hospId)return;
    const h=gfd(ld(),S.fid,'hosp').find(x=>x.id===hospId);
    if(!h)return;
    const row=e.target.closest('div[style*="grid"]');
    if(!row)return;
    const nEl=row.querySelector('.ha-nome');if(nEl)nEl.value=h.nome||'';
    const cEl=row.querySelector('.ha-cpf');if(cEl)cEl.value=maskCPF(h.cpf||'');
    const celEl=row.querySelector('.ha-cel');if(celEl)celEl.value=maskCelular(h.celular||'');
  },true);

  /* ── Event delegation: ha-del (remover hóspede adicional) ── */
  document.addEventListener('click',e=>{
    const btn=e.target.closest('.ha-del');
    if(!btn)return;
    const idx=Number(btn.dataset.idx);
    S.form.hospedes=(S.form.hospedes||[]).filter((_,i)=>i!==idx);
    refreshHospLista();
  });

  /* Render lista hóspedes adicionais */
  function refreshHospLista(){
    const lista=by('hosp-lista');if(!lista)return;
    const db=ld(),fid=S.fid;
    const hosps=gfd(db,fid,'hosp');
    const hads=S.form.hospedes||[];
    const lbl=by('hosp-count-lbl');if(lbl)lbl.textContent='('+hads.length+')';
    lista.innerHTML=hads.length===0
      ?'<p style="font-size:12px;color:var(--text3);padding:6px 0">Nenhum hóspede adicional.</p>'
      :hads.map((h,i)=>`
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:7px;margin-bottom:7px;align-items:center">
          <div style="display:flex;gap:6px">
            <select class="ha-sel" data-idx="${i}" style="flex:0 0 130px;font-size:12px">
              <option value="">Buscar cadastrado</option>
              ${hosps.map(x=>`<option value="${x.id}"${h.hospId===x.id?' selected':''}>${esc(x.nome)}</option>`).join('')}
            </select>
            <input class="ha-nome" data-idx="${i}" value="${esc(h.nome||'')}" placeholder="Nome" style="flex:1"/>
          </div>
          <input class="ha-cpf mask-cpf" data-idx="${i}" value="${maskCPF(h.cpf||String())}" placeholder="000.000.000-00"/>
          <input class="ha-cel mask-cel" data-idx="${i}" value="${maskCelular(h.celular||String())}" placeholder="(00) 00000-0000"/>
          <button class="btn btn-sm btn-d ha-del" data-idx="${i}" type="button">✕</button>
        </div>`).join('');
    bindMasks();
  }

  /* Adicionar hóspede adicional pousada */
  by('btn-add-hosp')?.addEventListener('click',()=>{
    if(!S.form.hospedes)S.form.hospedes=[];
    S.form.hospedes.push({nome:'',cpf:'',celular:'',hospId:''});
    refreshHospLista();
  });

  /* Adicionar passageiro */
  by('btn-add-pass')?.addEventListener('click',()=>{
    syncPass();
    S.form.passageiros=[...(S.form.passageiros||[]),{nome:'',cpf:'',celular:'',peso:'',hospId:''}];
    refreshPassLista();
    recalcVooLocal();
  });
  on('[data-rp]','click',e=>{
    syncPass();
    const i=Number(e.currentTarget.dataset.rp);
    S.form.passageiros=(S.form.passageiros||[]).filter((_,idx)=>idx!==i);
    refreshPassLista();
    recalcVooLocal();
  });

  /* Selecionar/desmarcar todos os módulos */
  by('btn-sel-all')?.addEventListener('click',()=>document.querySelectorAll('.mod-chk').forEach(c=>c.checked=true));
  by('btn-des-all')?.addEventListener('click',()=>document.querySelectorAll('.mod-chk').forEach(c=>c.checked=false));
  by('btn-usr-all')?.addEventListener('click',()=>document.querySelectorAll('.mod-usr-chk').forEach(c=>c.checked=true));
  by('btn-usr-none')?.addEventListener('click',()=>document.querySelectorAll('.mod-usr-chk').forEach(c=>c.checked=false));
  // Mostrar/ocultar senha no modal de usuário
  by('btn-show-usr-pw')?.addEventListener('click',()=>{
    const pw=by('f-senha');if(!pw)return;
    pw.type=pw.type==='password'?'text':'password';
    by('btn-show-usr-pw').textContent=pw.type==='password'?'👁':'🙈';
  });

  /* Fornecedor select → preenche nome */
  by('f-forn-id')?.addEventListener('change',e=>{
    const opt=e.target.options[e.target.selectedIndex];
    const nEl=by('f-forn-nome');
    if(nEl&&opt?.value)nEl.value=opt.text;
    else if(nEl&&!opt?.value)nEl.value='';
  });

  /* Render itens lista helper */
  function renderItensLista(){
    const l=by('itens-lista');if(!l)return;
    const itens=S.form.itens||[];
    l.innerHTML=itens.length===0
      ?'<p style="font-size:12px;color:var(--text3);text-align:center;padding:10px 0">Nenhum item adicionado.</p>'
      :itens.map((it,i)=>`
        <div style="display:grid;grid-template-columns:1fr 70px 80px auto;gap:6px;align-items:center;padding:7px 8px;background:rgba(255,255,255,.03);border-radius:6px;margin-bottom:4px">
          <span style="font-size:13px">${esc(it.nome)}</span>
          <input class="item-qtd-inp" data-idx="${i}" type="number" min="1" value="${it.qtd}" style="font-size:13px;text-align:center"/>
          <span style="font-size:11px;color:var(--text3)">${it.prodId?'✔ Cadastrado':'Manual'}</span>
          <button class="btn btn-sm btn-d item-del" data-idx="${i}" type="button">✕</button>
        </div>`).join('');
    // Re-bind qty and del inside lista
    l.querySelectorAll('.item-qtd-inp').forEach(inp=>{
      inp.addEventListener('change',e=>{
        const idx=Number(e.target.dataset.idx);
        if(S.form.itens&&S.form.itens[idx])S.form.itens[idx].qtd=e.target.value;
      });
    });
    l.querySelectorAll('.item-del').forEach(btn=>{
      btn.addEventListener('click',e=>{
        const idx=Number(e.currentTarget.dataset.idx);
        S.form.itens=(S.form.itens||[]).filter((_,i)=>i!==idx);
        renderItensLista();
      });
    });
  }

  /* Adicionar item ao pedido */
  by('btn-add-item')?.addEventListener('click',()=>{
    const ps=by('f-prod-sel');
    const manualNome=gv('f-item-nome-manual')?.trim();
    const q=gv('f-item-qtd');
    const nome=ps?.value
      ? (ps.options[ps.selectedIndex]?.dataset?.nome||ps.options[ps.selectedIndex]?.text||'')
      : manualNome;
    if(!nome){alert('Selecione um produto ou digite o nome do item.');return;}
    if(!q||Number(q)<1){alert('Informe a quantidade.');return;}
    if(!S.form.itens)S.form.itens=[];
    S.form.itens.push({id:uid(),nome,qtd:Number(q),prodId:ps?.value||''});
    if(ps)ps.value='';
    const qEl=by('f-item-qtd');if(qEl)qEl.value='';
    const mEl=by('f-item-nome-manual');if(mEl)mEl.value='';
    renderItensLista();
  });

  /* SALVAR MODAL */
  by('modal-save')?.addEventListener('click',()=>{
    const data=collectForm();
    const m=S.modal;
    if(m==='filial'){
      if(!data.nome){alert('Informe o nome.');return}
      const fs=gfil();
      if(S.eid){const i=fs.findIndex(f=>f.id===S.eid);if(i>=0)fs[i]={...fs[i],...data}}
      else fs.push({id:uid(),...data});
      sfil(fs);
    } else if(m==='usuario'){
      if(!data.nome){alert('Informe o nome do usuário.');return}
      if(!data.email){alert('Informe o email.');return}
      const us=gus();
      if(S.eid){
        // Edição: preserva senha atual se campo ficou em branco
        const idx=us.findIndex(u=>u.id===S.eid);
        if(idx>=0){
          const senhaFinal=data.senha||us[idx].senha||'';
          us[idx]={...us[idx],...data,senha:senhaFinal};
        }
      } else {
        // Novo usuário: senha obrigatória
        if(!data.senha||data.senha.length<1){alert('Informe a senha do usuário.');return}
        // Verifica email duplicado
        if(us.find(u=>(u.email||'').replace(/\s/g,'').toLowerCase()===data.email)){
          alert('Já existe um usuário com este email.');return;
        }
        us.push({id:uid(),...data});
      }
      sus(us);
    } else if(m==='plano'){
      if(!data.codigo||!data.nome){alert('Preencha código e nome.');return}
      const pc=gpc();
      if(S.eid){const i=pc.findIndex(p=>p.id===S.eid);if(i>=0)pc[i]={...pc[i],...data}}
      else pc.push({id:uid(),...data});
      spc(pc);
    } else if(m==='said'){
      // Salva a saída e desconta do saldo do produto
      const dbS=ld(),fidS=S.fid;
      let saids=gfd(dbS,fidS,'said');
      let prods=gfd(dbS,fidS,'prod');
      if(S.eid){
        // Edição: restitui saldo anterior e aplica novo
        const old=saids.find(s=>s.id===S.eid);
        if(old){const pi=prods.findIndex(p=>p.id===old.prodId);if(pi>=0)prods[pi].quantidade=(Number(prods[pi].quantidade||0)+Number(old.quantidade||0));}
        saids=saids.map(s=>s.id===S.eid?{...s,...data}:s);
      } else {
        saids.push({id:uid(),...data});
      }
      // Desconta do produto
      const pi=prods.findIndex(p=>p.id===data.prodId);
      if(pi>=0){
        const novoSaldo=Math.max(0,Number(prods[pi].quantidade||0)-Number(data.quantidade||0));
        prods[pi].quantidade=novoSaldo;
        // Verifica divergência com última contagem
        const conts=gfd(dbS,fidS,'cont');
        const ultCont=conts.filter(c=>c.prodId===data.prodId&&c.status==='Aprovado').sort((a,b)=>b.data>a.data?1:-1)[0];
        if(ultCont&&Math.abs(novoSaldo-Number(ultCont.quantidadeContada||0))>0){
          // Guarda flag de divergência no produto
          prods[pi]._divergencia=true;
          prods[pi]._divergenciaDiff=novoSaldo-Number(ultCont.quantidadeContada);
        } else {
          delete prods[pi]._divergencia;
        }
      }
      sfd(dbS,fidS,'said',saids);
      sfd(dbS,fidS,'prod',prods);
      sv(dbS);
    } else if(m==='escala'){
      saveRec('escala',data);
      // Lança automaticamente no Contas a Pagar com vencimento na próxima segunda
      if(!S.eid&&data.valor>0){
        const dbE=ld(),fidE=S.fid;
        const cp=gfd(dbE,fidE,'cp');
        cp.push({
          id:uid(),
          nome:data.nome||data.colaboradorNome,
          categoria:'Colaborador',
          referencia:`Escala ${fmtD(data.dataTrabalho)} — ${data.funcao||''}`.trim().replace(/—\s*$/,''),
          valor:Number(data.valor),
          vencimento:data.vencimentoCP,
          status:'Pendente',
          parcelamento:'À vista',
          origem:'escala',
          observacoes:data.observacoes||'',
        });
        sfd(dbE,fidE,'cp',cp);
        sv(dbE);
      }
    } else if(m==='pousada'){
      salvarPousada(data,S.eid);
    } else if(m==='voo'){
      salvarVoo(data,S.eid);
      // PDF do Termo é gerado automaticamente dentro de salvarVoo quando status=Agendado
    } else {
      const req={cp:'nome',cr:'nome',vendas:'clienteEvento',forn:'nome',colab:'nome',prest:'nome',atrac:'nome',hosp:'nome',prod:'produto',pedidos:'fornecedor',voo:'piloto'};
      const rf=req[m];if(rf&&!data[rf]){alert('Preencha os campos obrigatórios.');return}
      saveRec(m,data);
    }
    S.modal=null;render();
  });
  bindMasks();
}

/* ═══════════════════════════════════════════════
   PDF HELPERS
═══════════════════════════════════════════════ */
function pdfAddHeader(doc,titulo,subtitulo){
  const PW=210;
  doc.setFillColor(13,35,56);doc.rect(0,0,PW,16,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text(titulo,18,10);
  doc.setFontSize(7);doc.setFont('helvetica','normal');
  doc.text(subtitulo,PW-18,10,{align:'right'});
  doc.setTextColor(40,40,40);
  return 24;
}
function pdfTable(doc,y,headers,rows,colWidths){
  const ML=18,PW=210,MR=18,TW=PW-ML-MR;
  const ROW_H=7,HEAD_H=8;
  // Header row
  doc.setFillColor(26,47,74);doc.rect(ML,y,TW,HEAD_H,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
  let x=ML;
  headers.forEach((h,i)=>{doc.text(h,x+2,y+5.5);x+=colWidths[i];});
  y+=HEAD_H;doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');
  rows.forEach((row,ri)=>{
    if(y>270){doc.addPage();y=pdfAddHeader(doc,'(continuação)','');}
    doc.setFillColor(ri%2===0?248:255,ri%2===0?250:255,ri%2===0?252:255);
    doc.rect(ML,y,TW,ROW_H,'F');
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.1);doc.rect(ML,y,TW,ROW_H);
    doc.setFontSize(7);x=ML;
    row.forEach((cell,i)=>{
      const txt=String(cell||'—').slice(0,40);
      doc.text(txt,x+2,y+4.8);x+=colWidths[i];
    });
    y+=ROW_H;
  });
  return y+4;
}

/* ── PDF de Cadastros ── */
function gerarPdfCadastros(tab,lista,colsMap){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const app=gapp();
  const nomes={forn:'Fornecedores',colab:'Colaboradores',prest:'Prestadores',atrac:'Atrações',hosp:'Hóspedes'};
  let y=pdfAddHeader(doc,app.nome||'Gestão Financeira','Relatório de Cadastros — '+(nomes[tab]||tab));
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
  doc.text('Relatório: '+(nomes[tab]||tab),18,y);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,100,100);
  doc.text('Gerado em: '+fmtD(td())+' | Total: '+lista.length+' registros',18,y+5);
  y+=12;
  const cols=colsMap[tab]||[];
  const headers=cols.map(c=>c.l);
  const PW=297,ML=18,MR=18,TW=PW-ML-MR;
  const colW=Math.floor(TW/Math.max(cols.length,1));
  const colWidths=cols.map(()=>colW);
  const rows=lista.map(i=>cols.map(c=>i[c.k]||'—'));
  pdfTable(doc,y,headers,rows,colWidths);
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text('Total de registros: '+lista.length,18,200);
  doc.save('cadastros_'+(tab)+'_'+td()+'.pdf');
}

/* ── PDF de Estoque ── */
function gerarPdfEstoque(tab,db,fid){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const app=gapp();
  const nomes={prod:'Produtos',ent:'Entradas',said:'Saídas',cont:'Contagens',pedidos:'Pedidos'};
  let y=pdfAddHeader(doc,app.nome||'Gestão Financeira','Relatório de Estoque — '+(nomes[tab]||tab));
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
  doc.text('Controle de Estoque — '+(nomes[tab]||tab),18,y);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,100,100);
  doc.text('Gerado em: '+fmtD(td()),18,y+5);y+=12;
  const PW=297,TW=PW-36;
  if(tab==='prod'){
    const lista=gfd(db,fid,'prod');
    const saids=gfd(db,fid,'said');
    const headers=['Produto','Categoria','Saldo','Saídas','Custo','Venda','Últ. Contagem'];
    const colWidths=[70,40,25,25,30,30,35];
    const rows=lista.map(p=>{
      const totalSaid=saids.filter(s=>s.prodId===p.id).reduce((a,s)=>a+Number(s.quantidade||0),0);
      return[p.produto,p.categoria||'—',p.quantidade||0,totalSaid,p.valorCusto?'R$ '+Number(p.valorCusto).toFixed(2):'—',p.valorVenda?'R$ '+Number(p.valorVenda).toFixed(2):'—',fmtD(p.dataUltimaContagem)];
    });
    pdfTable(doc,y,headers,rows,colWidths);
  } else if(tab==='ent'){
    const lista=gfd(db,fid,'ent');
    const headers=['Produto','Qtd','Data','Responsável','Fornecedor','Status'];
    const colWidths=[80,25,30,50,50,25];
    pdfTable(doc,y,headers,lista.map(i=>[i.prodNome,i.quantidade,fmtD(i.data),i.responsavel||'—',i.fornecedor||'—',i.status||'—']),colWidths);
  } else if(tab==='said'){
    const lista=gfd(db,fid,'said');
    const headers=['Produto','Qtd','Data','Responsável','Motivo','Observações'];
    const colWidths=[75,25,30,50,35,45];
    pdfTable(doc,y,headers,lista.map(i=>[i.prodNome,i.quantidade,fmtD(i.data),i.responsavel||'—',i.motivo||'—',i.observacoes||'—']),colWidths);
  } else if(tab==='cont'){
    const lista=gfd(db,fid,'cont');
    const headers=['Produto','Qtd Contada','Data','Responsável','Status'];
    const colWidths=[90,30,35,70,35];
    pdfTable(doc,y,headers,lista.map(i=>[i.prodNome,i.quantidadeContada,fmtD(i.data),i.responsavel||'—',i.status||'—']),colWidths);
  }
  doc.save('estoque_'+(tab)+'_'+td()+'.pdf');
}

/* ═══════════════════════════════════════════════
   GERAÇÃO DE TERMO PDF — VOO BALÃO
═══════════════════════════════════════════════ */
function gerarTermoVoo(passageiros,dataVoo){
  const{jsPDF}=window.jspdf;
  const hoje=fmtD(td());
  const dataExib=fmtD(dataVoo)||hoje;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210,PH=297,ML=18,MR=18,MT=22,TW=210-18-18;

  const pass=(passageiros&&passageiros.length)?passageiros:[{nome:'',cpf:''}];

  pass.forEach((p,idx)=>{
    if(idx>0)doc.addPage();
    let y=MT;

    const para=(text,fs,yy,indent=0,bold=false)=>{
      doc.setFontSize(fs);doc.setFont('helvetica',bold?'bold':'normal');
      const lines=doc.splitTextToSize(text,TW-indent);
      doc.text(lines,ML+indent,yy);
      return yy+lines.length*(fs*0.3528+1.3)+1;
    };

    // Cabeçalho
    doc.setFillColor(13,35,56);
    doc.rect(0,0,PW,14,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('TOPFLY BALONISMO',ML,9);
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    doc.text('Termo de Ciência de Riscos — Voo de Balão',PW-MR,9,{align:'right'});
    doc.setTextColor(40,40,40);

    // Título
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(13,35,56);
    const tit='Termo de Ciência dos Riscos Envolvidos na Operação de Balão sem certificado de aeronavegabilidade padrão ou por um piloto sem licença de piloto de balão livre';
    const tLines=doc.splitTextToSize(tit,TW);
    doc.text(tLines,ML,y);y+=tLines.length*5+4;
    doc.setDrawColor(26,86,219);doc.setLineWidth(0.5);doc.line(ML,y,PW-MR,y);y+=5;

    // Texto informativo
    doc.setTextColor(40,40,40);
    y=para('A prática de voo realizada em balões livres tripulados pode ser realizada de forma certificada ou desportiva. Nas operações certificadas pela ANAC:',8,y);
    y=para('• as aeronaves possuem certificado de aeronavegabilidade padrão;',8,y,5);
    y=para('• o piloto possui licença de piloto de balão livre, além de habilitação e certificado médico aeronáutico válidos; e',8,y,5);
